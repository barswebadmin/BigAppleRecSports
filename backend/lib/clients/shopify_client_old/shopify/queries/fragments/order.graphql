fragment Order on Order {
  id
  name
  email
  phone
  createdAt
  updatedAt
  cancelledAt
  cancelReason
  note
  tags
  totalPriceSet {
    shopMoney {
      amount
    }
  }
  totalDiscountsSet {
    shopMoney {
      amount
    }
  }
  totalRefundedSet {
    shopMoney {
      amount
    }
  }
  lineItems(first: 250) {
    nodes {
      id
      title
      customAttributes {
        key
        value
      }
      variant {
        id
        title
      }
      product {
        id
        title
      }
    }
  }
  transactions {
    id
    kind
    status
    gateway
    parentTransaction {
      id
    }
  }
  refunds {
    id
    note
    createdAt
    totalRefundedSet {
      shopMoney {
        amount
      }
    }
    transactions(first: 10) {
      nodes {
        id
        gateway
        kind
        status
        createdAt
        amountSet {
          shopMoney {
            amount
          }
        }
      }
    }
  }
}
