mutation TagsUpdate(
  $gid: ID!
  $tagsToAdd: [String!]!
  $tagsToRemove: [String!]!
) {
  added: tagsAdd(id: $gid, tags: $tagsToAdd) {
    node {
      id
    }
    userErrors {
      field
      message
    }
  }
  removed: tagsRemove(id: $gid, tags: $tagsToRemove) {
    node {
      id
    }
    userErrors {
      field
      message
    }
  }
}
