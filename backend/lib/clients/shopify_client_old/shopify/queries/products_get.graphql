query ProductsGet($query: String!, $first: Int!, $after: String) {
  products(query: $query, first: $first, after: $after) {
    nodes {
      id
      title
      handle
      descriptionHtml
      status
      tags
      totalInventory
      createdAt
      updatedAt
      importantDates: metafield(namespace: "custom", key: "important_dates") {
        reference {
          ... on Metaobject {
            fields {
              key
              type
              value
            }
          }
        }
      }
      variants(first: 5) {
        nodes {
          id
          title
          sku
          price
          inventoryQuantity
          inventoryPolicy
          availableForSale
        }
      }
      publications: resourcePublicationsV2(first: 10) {
        nodes {
          isPublished
          publication {
            name
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
