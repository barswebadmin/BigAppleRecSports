query ProductsGet($query: String!, $first: Int!, $after: String) {
  products(query: $query, first: $first, after: $after) {
    nodes {
      id
      title
      handle
      status
      tags
      totalInventory
      createdAt
      updatedAt
      variants(first: 5) {
        nodes {
          id
          title
          sku
          price
          inventoryQuantity
          inventoryPolicy
          availableForSale
        }
      }
      publications: resourcePublicationsV2(first: 10) {
        nodes {
          isPublished
          publication {
            name
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
