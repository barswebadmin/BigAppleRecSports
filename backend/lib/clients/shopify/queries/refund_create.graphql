mutation RefundCreate($input: RefundInput!) {
  refundCreate(input: $input) {
    refund {
      id
      note
      createdAt
      totalRefundedSet {
        presentmentMoney {
          amount
          currencyCode
        }
      }
      order {
        id
        name
      }
    }
    userErrors {
      field
      message
    }
  }
}
