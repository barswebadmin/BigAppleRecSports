query OrdersGet($query: String!, $first: Int!, $after: String) {
  orders(query: $query, first: $first, after: $after) {
    nodes {
      id
      name
      email
      phone
      createdAt
      updatedAt
      cancelledAt
      cancelReason
      displayFinancialStatus
      displayFulfillmentStatus
      note
      tags
      totalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      subtotalPriceSet {
        shopMoney {
          amount
        }
      }
      totalTaxSet {
        shopMoney {
          amount
        }
      }
      totalDiscountsSet {
        shopMoney {
          amount
        }
      }
      totalRefundedSet {
        shopMoney {
          amount
        }
      }
      customAttributes {
        key
        value
      }
      customer {
        id
        email
        firstName
        lastName
        tags
      }
      lineItems(first: 250) {
        nodes {
          id
          title
          quantity
          customAttributes {
            key
            value
          }
          variant {
            id
            title
          }
          product {
            id
            title
            handle
            descriptionHtml
          }
        }
      }
      transactions {
        id
        kind
        status
        gateway
        parentTransaction {
          id
        }
      }
      refunds {
        id
        note
        createdAt
        totalRefundedSet {
          shopMoney {
            amount
            currencyCode
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
