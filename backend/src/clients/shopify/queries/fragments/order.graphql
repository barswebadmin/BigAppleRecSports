fragment Order on Order {
  id
  name
  email
  phone
  createdAt
  updatedAt
  cancelledAt
  cancelReason
  note
  tags
  totalPriceSet {
    ...MoneyBag
  }
  totalDiscountsSet {
    ...MoneyBag
  }
  totalRefundedSet {
    ...MoneyBag
  }
  lineItems(first: 250) {
    nodes {
      id
      title
      customAttributes {
        key
        value
      }
      variant {
        id
        title
      }
      product {
        id
        title
      }
    }
  }
  transactions {
    id
    kind
    status
    gateway
    parentTransaction {
      id
    }
  }
  customer {
    ...Customer
  }
  refunds {
    ...Refund
  }
}
