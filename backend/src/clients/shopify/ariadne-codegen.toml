[tool.ariadne-codegen]
# Run from lib/clients/shopify/ — paths are relative to this file.
# Invocation: `just codegen-shopify` from the repo root, or
# `uv run ariadne-codegen --config ariadne-codegen.toml` from this dir.
#
# Generates a typed async Shopify client (Pydantic models + Client class)
# from schema.graphql + each query in queries/*.graphql.

schema_path = "schema.graphql"
queries_path = "queries"
target_package_name = "generated"
target_package_path = "."
client_name = "ShopifyClient"
client_file_name = "client"
async_client = true
include_comments = "stable"
plugins = []

# Pydantic v2 settings
target_pydantic_version = "v2"

# Only generate input types / enums actually referenced by queries.
# Drops thousands of lines of unused Shopify Admin schema types.
include_all_inputs = false
include_all_enums = false

# Our slim base class (transport + paginate + construction). Codegen
# copies client_base.py into generated/ on every run, and the generated
# ShopifyClient inherits from ShopifyBase.
base_client_file_path = "client_base.py"
base_client_name = "ShopifyBase"

# Exceptions are not generated when a custom base client is provided,
# so we ship our own (lifted verbatim from ariadne's dependencies).
files_to_include = ["exceptions.py"]
