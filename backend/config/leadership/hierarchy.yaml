        match_patterns:
          keywords: ["wtnb", "sunday", "operations manager"]
        required: true
      
      - role_key: "sunday.open.ops_manager"
        title: "Operations Manager, Sunday Dodgeball (Advanced, Open)"
        match_patterns:
          keywords: ["sunday", "open", "operations manager"]
        required: true 

      - role_key: "monday.open.ops_manager"
        title: "Operations Manager, Monday Dodgeball (Open)"
        match_patterns:
          keywords: ["monday", "operations manager"]
        required: true

      - role_key: "tuesday.open.ops_manager"
        title: "Operations Manager, Tuesday Dodgeball (Open)"
        match_patterns:
          keywords: ["tuesday", "operations manager"]
        required: true
      
      - role_key: "wtnb_social.ops_manager"
        title: "Operations Manager, Wednesday Dodgeball (WTNB+)"
        match_patterns:
          keywords: ["wtnb", "social", "operations manager"]
        required: true
      
      - role_key: "thursday.open.ops_manager"
        title: "Operations Manager, Thursday Dodgeball (Open)"
        match_patterns:
          keywords: ["thursday", "operations manager"]
        required: true
      
      - role_key: "player_experience.open"
        title: "Director of Dodgeball Player Experience (Open)"
        match_patterns:
          keywords: ["player experience", "open"]
        required: true
      
      - role_key: "player_experience.wtnb"
        title: "Director of Dodgeball Player Experience (WTNB+)"
        match_patterns:
          keywords: ["player experience", "wtnb"]
        required: true
  

  # =============================================================================
  # KICKBALL LEADERSHIP TEAM
  # =============================================================================
  
  kickball:
    name: "Kickball Leadership Team"
    csv_section_headers:
      - "KICKBALL LEADERSHIP TEAM"
    positions:
      - role_key: "sunday.open.director"
        title: "Director of Kickball, Sunday (Open)"
