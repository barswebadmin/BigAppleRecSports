$schema: http://json-schema.org/draft-07/schema#
title: DataSource
description: Information about an external data source in the spreadsheet.
type: object
properties:
  dataSourceId:
    type: string
    description: 'The spreadsheet-scoped unique ID that identifies the data source.
      Example: 1080547365.'
  calculatedColumns:
    type: array
    description: All calculated columns in the data source.
    items:
      $ref: DataSourceColumn
  sheetId:
    type: integer
    description: The ID of the Sheet connected with the data source. The field cannot
      be changed once set. When creating a data source, an associated DATA_SOURCE
      sheet is also created, if the field is not specified, the ID of the created
      sheet will be randomly generated.
    format: int32
  spec:
    description: The DataSourceSpec for the data source connected with this spreadsheet.
    $ref: DataSourceSpec
