$schema: http://json-schema.org/draft-07/schema#
title: DataSourceRefreshWeeklySchedule
description: A weekly schedule for data to refresh on specific days in a given time
  interval.
type: object
properties:
  startTime:
    $ref: TimeOfDay
    description: The start time of a time interval in which a data source refresh
      is scheduled. Only `hours` part is used. The time interval size defaults to
      that in the Sheets editor.
  daysOfWeek:
    type: array
    description: Days of the week to refresh. At least one day must be specified.
    items:
      enum:
      - DAY_OF_WEEK_UNSPECIFIED
      - MONDAY
      - TUESDAY
      - WEDNESDAY
      - THURSDAY
      - FRIDAY
      - SATURDAY
      - SUNDAY
      type: string
      enumDescriptions:
      - The day of the week is unspecified.
      - Monday
      - Tuesday
      - Wednesday
      - Thursday
      - Friday
      - Saturday
      - Sunday
