$schema: http://json-schema.org/draft-07/schema#
title: BigQueryTableSpec
description: Specifies a BigQuery table definition. Only [native tables](https://cloud.google.com/bigquery/docs/tables-intro)
  are allowed.
type: object
properties:
  tableId:
    description: The BigQuery table id.
    type: string
  tableProjectId:
    type: string
    description: The ID of a BigQuery project the table belongs to. If not specified,
      the project_id is assumed.
  datasetId:
    type: string
    description: The BigQuery dataset id.
