description: 'Returns the spreadsheet at the given ID. The caller must specify the
  spreadsheet ID. For more information, see [Read, write, and search metadata](https://developers.google.com/workspace/sheets/api/guides/metadata).
  This method differs from GetSpreadsheet in that it allows selecting which subsets
  of spreadsheet data to return by specifying a dataFilters parameter. Multiple DataFilters
  can be specified. Specifying one or more data filters returns the portions of the
  spreadsheet that intersect ranges matched by any of the filters. By default, data
  within grids is not returned. You can include grid data in one of two ways: * Specify
  a [field mask](https://developers.google.com/workspace/sheets/api/guides/field-masks)
  listing your desired fields using the `fields` URL parameter in HTTP. * Set the
  includeGridData parameter to `true`. If a field mask is set, the `includeGridData`
  parameter is ignored. For large spreadsheets, as a best practice, retrieve only
  the specific spreadsheet fields that you want.'
httpMethod: POST
path: v4/spreadsheets/{spreadsheetId}:getByDataFilter
scopes:
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/drive.file
- https://www.googleapis.com/auth/spreadsheets
request:
  $ref: GetSpreadsheetByDataFilterRequest
parameters:
  spreadsheetId:
    required: true
    description: The spreadsheet to request.
    location: path
    type: string
response:
  $ref: Spreadsheet
