$schema: http://json-schema.org/draft-07/schema#
title: TrimWhitespaceRequest
description: Trims the whitespace (such as spaces, tabs, or new lines) in every cell
  in the specified range. This request removes all whitespace from the start and end
  of each cell's text, and reduces any subsequence of remaining whitespace characters
  to a single space. If the resulting trimmed text starts with a '+' or '=' character,
  the text remains as a string value and isn't interpreted as a formula.
type: object
properties:
  range:
    description: The range whose cells to trim.
    $ref: GridRange
