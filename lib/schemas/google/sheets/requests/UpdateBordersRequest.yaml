$schema: http://json-schema.org/draft-07/schema#
title: UpdateBordersRequest
description: 'Updates the borders of a range. If a field is not set in the request,
  that means the border remains as-is. For example, with two subsequent UpdateBordersRequest:
  1. range: A1:A5 `{ top: RED, bottom: WHITE }` 2. range: A1:A5 `{ left: BLUE }` That
  would result in A1:A5 having a borders of `{ top: RED, bottom: WHITE, left: BLUE
  }`. If you want to clear a border, explicitly set the style to NONE.'
type: object
properties:
  range:
    $ref: GridRange
    description: The range whose borders should be updated.
  bottom:
    $ref: Border
    description: The border to put at the bottom of the range.
  left:
    $ref: Border
    description: The border to put at the left of the range.
  innerHorizontal:
    $ref: Border
    description: The horizontal border to put within the range.
  right:
    $ref: Border
    description: The border to put at the right of the range.
  innerVertical:
    $ref: Border
    description: The vertical border to put within the range.
  top:
    $ref: Border
    description: The border to put at the top of the range.
