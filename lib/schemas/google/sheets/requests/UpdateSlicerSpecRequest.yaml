$schema: http://json-schema.org/draft-07/schema#
title: UpdateSlicerSpecRequest
description: Updates a slicer's specifications. (This does not move or resize a slicer.
  To move or resize a slicer use UpdateEmbeddedObjectPositionRequest.
type: object
properties:
  fields:
    type: string
    description: The fields that should be updated. At least one field must be specified.
      The root `SlicerSpec` is implied and should not be specified. A single "*"`
      can be used as short-hand for listing every field.
    format: google-fieldmask
  slicerId:
    type: integer
    description: The id of the slicer to update.
    format: int32
  spec:
    $ref: SlicerSpec
    description: The specification to apply to the slicer.
