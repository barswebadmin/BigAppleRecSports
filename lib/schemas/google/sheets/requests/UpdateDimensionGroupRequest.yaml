$schema: http://json-schema.org/draft-07/schema#
title: UpdateDimensionGroupRequest
description: Updates the state of the specified group.
type: object
properties:
  fields:
    type: string
    description: The fields that should be updated. At least one field must be specified.
      The root `dimensionGroup` is implied and should not be specified. A single `"*"`
      can be used as short-hand for listing every field.
    format: google-fieldmask
  dimensionGroup:
    $ref: DimensionGroup
    description: The group whose state should be updated. The range and depth of the
      group should specify a valid group on the sheet, and all other fields updated.
