$schema: http://json-schema.org/draft-07/schema#
title: AppendCellsRequest
description: Adds new cells after the last row with data in a sheet, inserting new
  rows into the sheet if necessary.
type: object
properties:
  fields:
    type: string
    description: The fields of CellData that should be updated. At least one field
      must be specified. The root is the CellData; 'row.values.' should not be specified.
      A single `"*"` can be used as short-hand for listing every field.
    format: google-fieldmask
  sheetId:
    type: integer
    description: The sheet ID to append the data to.
    format: int32
  tableId:
    description: The ID of the table to append data to. The data will be only appended
      to the table body. This field also takes precedence over the `sheet_id` field.
    type: string
  rows:
    description: The data to append.
    items:
      $ref: RowData
    type: array
