$schema: http://json-schema.org/draft-07/schema#
title: BatchClearValuesByDataFilterResponse
description: The response when clearing a range of values selected with DataFilters
  in a spreadsheet.
type: object
properties:
  spreadsheetId:
    description: The spreadsheet the updates were applied to.
    type: string
  clearedRanges:
    type: array
    description: The ranges that were cleared, in [A1 notation](https://developers.google.com/workspace/sheets/api/guides/concepts#cell).
      If the requests are for an unbounded range or a range larger than the bounds
      of the sheet, this is the actual ranges that were cleared, bounded to the sheet's
      limits.
    items:
      type: string
