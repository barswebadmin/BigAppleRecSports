$schema: http://json-schema.org/draft-07/schema#
title: TableRowsProperties
description: The table row properties.
type: object
properties:
  firstBandColorStyle:
    description: The first color that is alternating. If this field is set, the first
      banded row is filled with the specified color. Otherwise, the first banded row
      is filled with a default color.
    $ref: ColorStyle
  footerColorStyle:
    $ref: ColorStyle
    description: The color of the last row. If this field is not set a footer is not
      added, the last row is filled with either first_band_color_style or second_band_color_style,
      depending on the color of the previous row. If updating an existing table without
      a footer to have a footer, the range will be expanded by 1 row. If updating
      an existing table with a footer and removing a footer, the range will be shrunk
      by 1 row.
  headerColorStyle:
    description: The color of the header row. If this field is set, the header row
      is filled with the specified color. Otherwise, the header row is filled with
      a default color.
    $ref: ColorStyle
  secondBandColorStyle:
    description: The second color that is alternating. If this field is set, the second
      banded row is filled with the specified color. Otherwise, the second banded
      row is filled with a default color.
    $ref: ColorStyle
