$schema: http://json-schema.org/draft-07/schema#
title: DeveloperMetadataLookup
description: Selects DeveloperMetadata that matches all of the specified fields. For
  example, if only a metadata ID is specified this considers the DeveloperMetadata
  with that particular unique ID. If a metadata key is specified, this considers all
  developer metadata with that key. If a key, visibility, and location type are all
  specified, this considers all developer metadata with that key and visibility that
  are associated with a location of that type. In general, this selects all DeveloperMetadata
  that match the intersection of all the specified fields; any field or combination
  of fields may be specified.
type: object
properties:
  metadataId:
    type: integer
    description: Limits the selected developer metadata to that which has a matching
      DeveloperMetadata.metadata_id.
    format: int32
  metadataLocation:
    description: Limits the selected developer metadata to those entries associated
      with the specified location. This field either matches exact locations or all
      intersecting locations according the specified locationMatchingStrategy.
    $ref: DeveloperMetadataLocation
  metadataValue:
    description: Limits the selected developer metadata to that which has a matching
      DeveloperMetadata.metadata_value.
    type: string
  metadataKey:
    type: string
    description: Limits the selected developer metadata to that which has a matching
      DeveloperMetadata.metadata_key.
  locationMatchingStrategy:
    description: Determines how this lookup matches the location. If this field is
      specified as EXACT, only developer metadata associated on the exact location
      specified is matched. If this field is specified to INTERSECTING, developer
      metadata associated on intersecting locations is also matched. If left unspecified,
      this field assumes a default value of INTERSECTING. If this field is specified,
      a metadataLocation must also be specified.
    enum:
    - DEVELOPER_METADATA_LOCATION_MATCHING_STRATEGY_UNSPECIFIED
    - EXACT_LOCATION
    - INTERSECTING_LOCATION
    enumDescriptions:
    - Default value. This value must not be used.
    - Indicates that a specified location should be matched exactly. For example,
      if row three were specified as a location this matching strategy would only
      match developer metadata also associated on row three. Metadata associated on
      other locations would not be considered.
    - Indicates that a specified location should match that exact location as well
      as any intersecting locations. For example, if row three were specified as a
      location this matching strategy would match developer metadata associated on
      row three as well as metadata associated on locations that intersect row three.
      If, for instance, there was developer metadata associated on column B, this
      matching strategy would also match that location because column B intersects
      row three.
    type: string
  visibility:
    description: Limits the selected developer metadata to that which has a matching
      DeveloperMetadata.visibility. If left unspecified, all developer metadata visible
      to the requesting project is considered.
    enum:
    - DEVELOPER_METADATA_VISIBILITY_UNSPECIFIED
    - DOCUMENT
    - PROJECT
    enumDescriptions:
    - Default value.
    - Document-visible metadata is accessible from any developer project with access
      to the document.
    - Project-visible metadata is only visible to and accessible by the developer
      project that created the metadata.
    type: string
  locationType:
    enum:
    - DEVELOPER_METADATA_LOCATION_TYPE_UNSPECIFIED
    - ROW
    - COLUMN
    - SHEET
    - SPREADSHEET
    description: Limits the selected developer metadata to those entries which are
      associated with locations of the specified type. For example, when this field
      is specified as ROW this lookup only considers developer metadata associated
      on rows. If the field is left unspecified, all location types are considered.
      This field cannot be specified as SPREADSHEET when the locationMatchingStrategy
      is specified as INTERSECTING or when the metadataLocation is specified as a
      non-spreadsheet location. Spreadsheet metadata cannot intersect any other developer
      metadata location. This field also must be left unspecified when the locationMatchingStrategy
      is specified as EXACT.
    type: string
    enumDescriptions:
    - Default value.
    - Developer metadata associated on an entire row dimension.
    - Developer metadata associated on an entire column dimension.
    - Developer metadata associated on an entire sheet.
    - Developer metadata associated on the entire spreadsheet.
