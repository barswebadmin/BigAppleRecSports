$schema: http://json-schema.org/draft-07/schema#
title: Interval
description: Represents a time interval, encoded as a Timestamp start (inclusive)
  and a Timestamp end (exclusive). The start must be less than or equal to the end.
  When the start equals the end, the interval is empty (matches no time). When both
  start and end are unspecified, the interval matches any time.
type: object
properties:
  startTime:
    type: string
    description: Optional. Inclusive start of the interval. If specified, a Timestamp
      matching this interval will have to be the same or after the start.
    format: google-datetime
  endTime:
    description: Optional. Exclusive end of the interval. If specified, a Timestamp
      matching this interval will have to be before the end.
    format: google-datetime
    type: string
