$schema: http://json-schema.org/draft-07/schema#
title: ExtendedValue
description: The kinds of value that a cell in a spreadsheet can have.
type: object
properties:
  stringValue:
    type: string
    description: Represents a string value. Leading single quotes are not included.
      For example, if the user typed `'123` into the UI, this would be represented
      as a `stringValue` of `"123"`.
  errorValue:
    $ref: ErrorValue
    description: Represents an error. This field is read-only.
  formulaValue:
    type: string
    description: Represents a formula.
  numberValue:
    type: number
    description: 'Represents a double value. Note: Dates, Times and DateTimes are
      represented as doubles in SERIAL_NUMBER format.'
    format: double
  boolValue:
    type: boolean
    description: Represents a boolean value.
