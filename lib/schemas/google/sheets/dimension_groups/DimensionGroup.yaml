$schema: http://json-schema.org/draft-07/schema#
title: DimensionGroup
description: A group over an interval of rows or columns on a sheet, which can contain
  or be contained within other groups. A group can be collapsed or expanded as a unit
  on the sheet.
type: object
properties:
  depth:
    type: integer
    description: The depth of the group, representing how many groups have a range
      that wholly contains the range of this group.
    format: int32
  collapsed:
    type: boolean
    description: This field is true if this group is collapsed. A collapsed group
      remains collapsed if an overlapping group at a shallower depth is expanded.
      A true value does not imply that all dimensions within the group are hidden,
      since a dimension's visibility can change independently from this group property.
      However, when this property is updated, all dimensions within it are set to
      hidden if this field is true, or set to visible if this field is false.
  range:
    description: The range over which this group exists.
    $ref: DimensionRange
