$schema: http://json-schema.org/draft-07/schema#
title: ThemeColorPair
description: A pair mapping a spreadsheet theme color type to the concrete color it
  represents.
type: object
properties:
  color:
    description: The concrete color corresponding to the theme color type.
    $ref: ColorStyle
  colorType:
    enumDescriptions:
    - Unspecified theme color
    - Represents the primary text color
    - Represents the primary background color
    - Represents the first accent color
    - Represents the second accent color
    - Represents the third accent color
    - Represents the fourth accent color
    - Represents the fifth accent color
    - Represents the sixth accent color
    - Represents the color to use for hyperlinks
    type: string
    description: The type of the spreadsheet theme color.
    enum:
    - THEME_COLOR_TYPE_UNSPECIFIED
    - TEXT
    - BACKGROUND
    - ACCENT1
    - ACCENT2
    - ACCENT3
    - ACCENT4
    - ACCENT5
    - ACCENT6
    - LINK
