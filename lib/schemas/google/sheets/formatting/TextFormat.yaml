$schema: http://json-schema.org/draft-07/schema#
title: TextFormat
description: The format of a run of text in a cell. Absent values indicate that the
  field isn't specified.
type: object
properties:
  bold:
    description: True if the text is bold.
    type: boolean
  italic:
    type: boolean
    description: True if the text is italicized.
  fontSize:
    description: The size of the font.
    format: int32
    type: integer
  strikethrough:
    type: boolean
    description: True if the text has a strikethrough.
  foregroundColorStyle:
    description: The foreground color of the text. If foreground_color is also set,
      this field takes precedence.
    $ref: ColorStyle
  underline:
    description: True if the text is underlined.
    type: boolean
  fontFamily:
    description: The font family.
    type: string
  foregroundColor:
    $ref: Color
    description: 'The foreground color of the text. Deprecated: Use foreground_color_style.'
    deprecated: true
  link:
    description: The link destination of the text, if any. Setting the link field
      in a TextFormatRun will clear the cell's existing links or a cell-level link
      set in the same request. When a link is set, the text foreground color will
      be set to the default link color and the text will be underlined. If these fields
      are modified in the same request, those values will be used instead of the link
      defaults.
    $ref: Link
