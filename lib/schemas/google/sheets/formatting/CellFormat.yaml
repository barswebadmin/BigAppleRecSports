$schema: http://json-schema.org/draft-07/schema#
title: CellFormat
description: The format of a cell.
type: object
properties:
  padding:
    description: The padding of the cell.
    $ref: Padding
  textFormat:
    description: The format of the text in the cell (unless overridden by a format
      run). Setting a cell-level link here clears the cell's existing links. Setting
      the link field in a TextFormatRun takes precedence over the cell-level link.
    $ref: TextFormat
  verticalAlignment:
    enumDescriptions:
    - The vertical alignment is not specified. Do not use this.
    - The text is explicitly aligned to the top of the cell.
    - The text is explicitly aligned to the middle of the cell.
    - The text is explicitly aligned to the bottom of the cell.
    description: The vertical alignment of the value in the cell.
    type: string
    enum:
    - VERTICAL_ALIGN_UNSPECIFIED
    - TOP
    - MIDDLE
    - BOTTOM
  textDirection:
    description: The direction of the text in the cell.
    enumDescriptions:
    - The text direction is not specified. Do not use this.
    - The text direction of left-to-right was set by the user.
    - The text direction of right-to-left was set by the user.
    type: string
    enum:
    - TEXT_DIRECTION_UNSPECIFIED
    - LEFT_TO_RIGHT
    - RIGHT_TO_LEFT
  horizontalAlignment:
    description: The horizontal alignment of the value in the cell.
    enumDescriptions:
    - The horizontal alignment is not specified. Do not use this.
    - The text is explicitly aligned to the left of the cell.
    - The text is explicitly aligned to the center of the cell.
    - The text is explicitly aligned to the right of the cell.
    type: string
    enum:
    - HORIZONTAL_ALIGN_UNSPECIFIED
    - LEFT
    - CENTER
    - RIGHT
  borders:
    description: The borders of the cell.
    $ref: Borders
  backgroundColorStyle:
    description: The background color of the cell. If background_color is also set,
      this field takes precedence.
    $ref: ColorStyle
  hyperlinkDisplayType:
    enumDescriptions:
    - 'The default value: the hyperlink is rendered. Do not use this.'
    - A hyperlink should be explicitly rendered.
    - A hyperlink should not be rendered.
    description: If one exists, how a hyperlink should be displayed in the cell.
    type: string
    enum:
    - HYPERLINK_DISPLAY_TYPE_UNSPECIFIED
    - LINKED
    - PLAIN_TEXT
  numberFormat:
    description: A format describing how number values should be represented to the
      user.
    $ref: NumberFormat
  backgroundColor:
    description: 'The background color of the cell. Deprecated: Use background_color_style.'
    $ref: Color
    deprecated: true
  textRotation:
    description: The rotation applied to text in the cell.
    $ref: TextRotation
  wrapStrategy:
    type: string
    enum:
    - WRAP_STRATEGY_UNSPECIFIED
    - OVERFLOW_CELL
    - LEGACY_WRAP
    - CLIP
    - WRAP
    description: The wrap strategy for the value in the cell.
    enumDescriptions:
    - The default value, do not use.
    - 'Lines that are longer than the cell width will be written in the next cell
      over, so long as that cell is empty. If the next cell over is non-empty, this
      behaves the same as `CLIP`. The text will never wrap to the next line unless
      the user manually inserts a new line. Example: | First sentence. | | Manual
      newline that is very long. <- Text continues into next cell | Next newline.
      |'
    - 'This wrap strategy represents the old Google Sheets wrap strategy where words
      that are longer than a line are clipped rather than broken. This strategy is
      not supported on all platforms and is being phased out. Example: | Cell has
      a | | loooooooooo| <- Word is clipped. | word. |'
    - 'Lines that are longer than the cell width will be clipped. The text will never
      wrap to the next line unless the user manually inserts a new line. Example:
      | First sentence. | | Manual newline t| <- Text is clipped | Next newline. |'
    - 'Words that are longer than a line are wrapped at the character level rather
      than clipped. Example: | Cell has a | | loooooooooo| <- Word is broken. | ong
      word. |'
