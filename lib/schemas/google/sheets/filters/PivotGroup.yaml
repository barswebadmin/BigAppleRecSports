$schema: http://json-schema.org/draft-07/schema#
title: PivotGroup
description: A single grouping (either row or column) in a pivot table.
type: object
properties:
  sourceColumnOffset:
    description: The column offset of the source range that this grouping is based
      on. For example, if the source was `C10:E15`, a `sourceColumnOffset` of `0`
      means this group refers to column `C`, whereas the offset `1` would refer to
      column `D`.
    format: int32
    type: integer
  groupLimit:
    description: The count limit on rows or columns to apply to this pivot group.
    $ref: PivotGroupLimit
  sortOrder:
    description: The order the values in this group should be sorted.
    enum:
    - SORT_ORDER_UNSPECIFIED
    - ASCENDING
    - DESCENDING
    enumDescriptions:
    - Default value, do not use this.
    - Sort ascending.
    - Sort descending.
    type: string
  dataSourceColumnReference:
    $ref: DataSourceColumnReference
    description: The reference to the data source column this grouping is based on.
  valueBucket:
    description: The bucket of the opposite pivot group to sort by. If not specified,
      sorting is alphabetical by this group's values.
    $ref: PivotGroupSortValueBucket
  valueMetadata:
    description: Metadata about values in the grouping.
    items:
      $ref: PivotGroupValueMetadata
    type: array
  label:
    description: The labels to use for the row/column groups which can be customized.
      For example, in the following pivot table, the row label is `Region` (which
      could be renamed to `State`) and the column label is `Product` (which could
      be renamed `Item`). Pivot tables created before December 2017 do not have header
      labels. If you'd like to add header labels to an existing pivot table, please
      delete the existing pivot table and then create a new pivot table with same
      parameters. +--------------+---------+-------+ | SUM of Units | Product | |
      | Region | Pen | Paper | +--------------+---------+-------+ | New York | 345
      | 98 | | Oregon | 234 | 123 | | Tennessee | 531 | 415 | +--------------+---------+-------+
      | Grand Total | 1110 | 636 | +--------------+---------+-------+
    type: string
  groupRule:
    $ref: PivotGroupRule
    description: The group rule to apply to this row/column group.
  showTotals:
    description: True if the pivot table should include the totals for this grouping.
    type: boolean
  repeatHeadings:
    type: boolean
    description: True if the headings in this pivot group should be repeated. This
      is only valid for row groupings and is ignored by columns. By default, we minimize
      repetition of headings by not showing higher level headings where they are the
      same. For example, even though the third row below corresponds to "Q1 Mar",
      "Q1" is not shown because it is redundant with previous rows. Setting repeat_headings
      to true would cause "Q1" to be repeated for "Feb" and "Mar". +--------------+
      | Q1 | Jan | | | Feb | | | Mar | +--------+-----+ | Q1 Total | +--------------+
