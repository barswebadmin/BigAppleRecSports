$schema: http://json-schema.org/draft-07/schema#
title: Slicer
description: A slicer in a sheet.
type: object
properties:
  position:
    $ref: EmbeddedObjectPosition
    description: The position of the slicer. Note that slicer can be positioned only
      on existing sheet. Also, width and height of slicer can be automatically adjusted
      to keep it within permitted limits.
  slicerId:
    description: The ID of the slicer.
    format: int32
    type: integer
  spec:
    $ref: SlicerSpec
    description: The specification of the slicer.
