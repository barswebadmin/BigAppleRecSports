$schema: http://json-schema.org/draft-07/schema#
title: ChartSpec
description: The specifications of a chart.
type: object
properties:
  filterSpecs:
    type: array
    description: The filters applied to the source data of the chart. Only supported
      for data source charts.
    items:
      $ref: FilterSpec
  altText:
    type: string
    description: The alternative text that describes the chart. This is often used
      for accessibility.
  treemapChart:
    $ref: TreemapChartSpec
    description: A treemap chart specification.
  dataSourceChartProperties:
    $ref: DataSourceChartProperties
    description: If present, the field contains data source chart specific properties.
  bubbleChart:
    $ref: BubbleChartSpec
    description: A bubble chart specification.
  title:
    description: The title of the chart.
    type: string
  backgroundColorStyle:
    $ref: ColorStyle
    description: The background color of the entire chart. Not applicable to Org charts.
      If background_color is also set, this field takes precedence.
  titleTextPosition:
    description: The title text position. This field is optional.
    $ref: TextPosition
  maximized:
    description: True to make a chart fill the entire space in which it's rendered
      with minimum padding. False to use the default padding. (Not applicable to Geo
      and Org charts.)
    type: boolean
  basicChart:
    description: A basic chart specification, can be one of many kinds of charts.
      See BasicChartType for the list of all charts this supports.
    $ref: BasicChartSpec
  subtitle:
    description: The subtitle of the chart.
    type: string
  subtitleTextFormat:
    description: The subtitle text format. Strikethrough, underline, and link are
      not supported.
    $ref: TextFormat
  waterfallChart:
    $ref: WaterfallChartSpec
    description: A waterfall chart specification.
  sortSpecs:
    type: array
    description: The order to sort the chart data by. Only a single sort spec is supported.
      Only supported for data source charts.
    items:
      $ref: SortSpec
  histogramChart:
    $ref: HistogramChartSpec
    description: A histogram chart specification.
  fontName:
    type: string
    description: The name of the font to use by default for all chart text (e.g. title,
      axis labels, legend). If a font is specified for a specific part of the chart
      it will override this font name.
  scorecardChart:
    $ref: ScorecardChartSpec
    description: A scorecard chart specification.
  backgroundColor:
    $ref: Color
    description: 'The background color of the entire chart. Not applicable to Org
      charts. Deprecated: Use background_color_style.'
    deprecated: true
  candlestickChart:
    description: A candlestick chart specification.
    $ref: CandlestickChartSpec
  orgChart:
    $ref: OrgChartSpec
    description: An org chart specification.
  hiddenDimensionStrategy:
    description: Determines how the charts will use hidden rows or columns.
    enum:
    - CHART_HIDDEN_DIMENSION_STRATEGY_UNSPECIFIED
    - SKIP_HIDDEN_ROWS_AND_COLUMNS
    - SKIP_HIDDEN_ROWS
    - SKIP_HIDDEN_COLUMNS
    - SHOW_ALL
    enumDescriptions:
    - Default value, do not use.
    - Charts will skip hidden rows and columns.
    - Charts will skip hidden rows only.
    - Charts will skip hidden columns only.
    - Charts will not skip any hidden rows or columns.
    type: string
  pieChart:
    $ref: PieChartSpec
    description: A pie chart specification.
  titleTextFormat:
    description: The title text format. Strikethrough, underline, and link are not
      supported.
    $ref: TextFormat
  subtitleTextPosition:
    $ref: TextPosition
    description: The subtitle text position. This field is optional.
