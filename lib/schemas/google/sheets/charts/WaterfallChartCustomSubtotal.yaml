$schema: http://json-schema.org/draft-07/schema#
title: WaterfallChartCustomSubtotal
description: A custom subtotal column for a waterfall chart series.
type: object
properties:
  subtotalIndex:
    type: integer
    description: The zero-based index of a data point within the series. If data_is_subtotal
      is true, the data point at this index is the subtotal. Otherwise, the subtotal
      appears after the data point with this index. A series can have multiple subtotals
      at arbitrary indices, but subtotals do not affect the indices of the data points.
      For example, if a series has three data points, their indices will always be
      0, 1, and 2, regardless of how many subtotals exist on the series or what data
      points they are associated with.
    format: int32
  label:
    description: A label for the subtotal column.
    type: string
  dataIsSubtotal:
    description: True if the data point at subtotal_index is the subtotal. If false,
      the subtotal will be computed and appear after the data point.
    type: boolean
