$schema: http://json-schema.org/draft-07/schema#
title: ChartData
description: The data included in a domain or series.
type: object
properties:
  groupRule:
    description: The rule to group the data by if the ChartData backs the domain of
      a data source chart. Only supported for data source charts.
    $ref: ChartGroupRule
  aggregateType:
    enumDescriptions:
    - Default value, do not use.
    - Average aggregate function.
    - Count aggregate function.
    - Maximum aggregate function.
    - Median aggregate function.
    - Minimum aggregate function.
    - Sum aggregate function.
    type: string
    description: The aggregation type for the series of a data source chart. Only
      supported for data source charts.
    enum:
    - CHART_AGGREGATE_TYPE_UNSPECIFIED
    - AVERAGE
    - COUNT
    - MAX
    - MEDIAN
    - MIN
    - SUM
  columnReference:
    description: The reference to the data source column that the data reads from.
    $ref: DataSourceColumnReference
  sourceRange:
    $ref: ChartSourceRange
    description: The source ranges of the data.
