$schema: http://json-schema.org/draft-07/schema#
title: BasicChartSpec
description: The specification for a basic chart. See BasicChartType for the list
  of charts this supports.
type: object
properties:
  domains:
    type: array
    description: The domain of data this is charting. Only a single domain is supported.
    items:
      $ref: BasicChartDomain
  stackedType:
    description: The stacked type for charts that support vertical stacking. Applies
      to Area, Bar, Column, Combo, and Stepped Area charts.
    enum:
    - BASIC_CHART_STACKED_TYPE_UNSPECIFIED
    - NOT_STACKED
    - STACKED
    - PERCENT_STACKED
    enumDescriptions:
    - Default value, do not use.
    - Series are not stacked.
    - Series values are stacked, each value is rendered vertically beginning from
      the top of the value below it.
    - Vertical stacks are stretched to reach the top of the chart, with values laid
      out as percentages of each other.
    type: string
  totalDataLabel:
    $ref: DataLabel
    description: Controls whether to display additional data labels on stacked charts
      which sum the total value of all stacked values at each value along the domain
      axis. These data labels can only be set when chart_type is one of AREA, BAR,
      COLUMN, COMBO or STEPPED_AREA and stacked_type is either STACKED or PERCENT_STACKED.
      In addition, for COMBO, this will only be supported if there is only one type
      of stackable series type or one type has more series than the others and each
      of the other types have no more than one series. For example, if a chart has
      two stacked bar series and one area series, the total data labels will be supported.
      If it has three bar series and two area series, total data labels are not allowed.
      Neither CUSTOM nor placement can be set on the total_data_label.
  legendPosition:
    type: string
    enumDescriptions:
    - Default value, do not use.
    - The legend is rendered on the bottom of the chart.
    - The legend is rendered on the left of the chart.
    - The legend is rendered on the right of the chart.
    - The legend is rendered on the top of the chart.
    - No legend is rendered.
    enum:
    - BASIC_CHART_LEGEND_POSITION_UNSPECIFIED
    - BOTTOM_LEGEND
    - LEFT_LEGEND
    - RIGHT_LEGEND
    - TOP_LEGEND
    - NO_LEGEND
    description: The position of the chart legend.
  chartType:
    enum:
    - BASIC_CHART_TYPE_UNSPECIFIED
    - BAR
    - LINE
    - AREA
    - COLUMN
    - SCATTER
    - COMBO
    - STEPPED_AREA
    description: The type of the chart.
    type: string
    enumDescriptions:
    - Default value, do not use.
    - A bar chart.
    - A line chart.
    - An area chart.
    - A column chart.
    - A scatter chart.
    - A combo chart.
    - A stepped area chart.
  compareMode:
    type: string
    enumDescriptions:
    - Default value, do not use.
    - Only the focused data element is highlighted and shown in the tooltip.
    - All data elements with the same category (e.g., domain value) are highlighted
      and shown in the tooltip.
    enum:
    - BASIC_CHART_COMPARE_MODE_UNSPECIFIED
    - DATUM
    - CATEGORY
    description: The behavior of tooltips and data highlighting when hovering on data
      and chart area.
  threeDimensional:
    type: boolean
    description: True to make the chart 3D. Applies to Bar and Column charts.
  lineSmoothing:
    type: boolean
    description: Gets whether all lines should be rendered smooth or straight by default.
      Applies to Line charts.
  headerCount:
    type: integer
    description: The number of rows or columns in the data that are "headers". If
      not set, Google Sheets will guess how many rows are headers based on the data.
      (Note that BasicChartAxis.title may override the axis title inferred from the
      header values.)
    format: int32
  axis:
    type: array
    description: The axis on the chart.
    items:
      $ref: BasicChartAxis
  series:
    type: array
    description: The data this chart is visualizing.
    items:
      $ref: BasicChartSeries
  interpolateNulls:
    description: If some values in a series are missing, gaps may appear in the chart
      (e.g, segments of lines in a line chart will be missing). To eliminate these
      gaps set this to true. Applies to Line, Area, and Combo charts.
    type: boolean
