$schema: http://json-schema.org/draft-07/schema#
title: GoogleAppsScriptTypeWebAppConfig
description: Web app entry point configuration.
type: object
properties:
  access:
    description: Who has permission to run the web app.
    type: string
    enumDescriptions:
    - Default value, should not be used.
    - Only the user who deployed the web app or executable can access it. Note that
      this is not necessarily the owner of the script project.
    - Only users in the same domain as the user who deployed the web app or executable
      can access it.
    - Any logged in user can access the web app or executable.
    - Any user, logged in or not, can access the web app or executable.
    enum:
    - UNKNOWN_ACCESS
    - MYSELF
    - DOMAIN
    - ANYONE
    - ANYONE_ANONYMOUS
  executeAs:
    description: Who to execute the web app as.
    type: string
    enumDescriptions:
    - Default value, should not be used.
    - The script runs as the user accessing the web app.
    - The script runs as the user who deployed the web app. Note that this is not
      necessarily the owner of the script project.
    enum:
    - UNKNOWN_EXECUTE_AS
    - USER_ACCESSING
    - USER_DEPLOYING
