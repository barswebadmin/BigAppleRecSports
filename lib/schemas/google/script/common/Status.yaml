$schema: http://json-schema.org/draft-07/schema#
title: Status
description: If a `run` call succeeds but the script function (or Apps Script itself)
  throws an exception, the response body's error field contains this `Status` object.
type: object
properties:
  code:
    description: 'The status code. For this API, this value either: - 10, indicating
      a `SCRIPT_TIMEOUT` error, - 3, indicating an `INVALID_ARGUMENT` error, or -
      1, indicating a `CANCELLED` execution. '
    type: integer
    format: int32
  message:
    description: A developer-facing error message, which is in English. Any user-facing
      error message is localized and sent in the details field, or localized by the
      client.
    type: string
  details:
    description: An array that contains a single ExecutionError object that provides
      information about the nature of the error.
    type: array
    items:
      type: object
      additionalProperties:
        type: any
        description: Properties of the object. Contains field @type with type URL.
