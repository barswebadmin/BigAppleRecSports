$schema: http://json-schema.org/draft-07/schema#
title: ChromeOsDevice
description: Google Chrome devices run on the [Chrome OS](https://support.google.com/chromeos).
  For more information about common API tasks, see the [Developer's Guide](https://developers.google.com/workspace/admin/directory/v1/guides/manage-chrome-devices).
type: object
properties:
  deviceId:
    description: The unique ID of the Chrome device.
    type: string
  serialNumber:
    description: The Chrome device serial number entered when the device was enabled.
      This value is the same as the Admin console's *Serial Number* in the *Chrome
      OS Devices* tab.
    type: string
  status:
    description: The status of the device.
    type: string
  lastSync:
    description: Date and time the device was last synchronized with the policy settings
      in the G Suite administrator control panel (Read-only)
    type: string
    format: date-time
  supportEndDate:
    description: Final date the device will be supported (Read-only)
    type: string
    format: date-time
  annotatedUser:
    description: The user of the device as noted by the administrator. Maximum length
      is 100 characters. Empty values are allowed.
    type: string
  annotatedLocation:
    description: The address or location of the device as noted by the administrator.
      Maximum length is `200` characters. Empty values are allowed.
    type: string
  notes:
    description: Notes about this device added by the administrator. This property
      can be [searched](https://support.google.com/chrome/a/answer/1698333) with the
      [list](https://developers.google.com/workspace/admin/directory/v1/reference/chromeosdevices/list)
      method's `query` parameter. Maximum length is 500 characters. Empty values are
      allowed.
    type: string
  model:
    description: The device's model information. If the device does not have this
      information, this property is not included in the response.
    type: string
  meid:
    description: The Mobile Equipment Identifier (MEID) or the International Mobile
      Equipment Identity (IMEI) for the 3G mobile card in a mobile device. A MEID/IMEI
      is typically used when adding a device to a wireless carrier's post-pay service
      plan. If the device does not have this information, this property is not included
      in the response. For more information on how to export a MEID/IMEI list, see
      the [Developer's Guide](https://developers.google.com/workspace/admin/directory/v1/guides/manage-chrome-devices.html#export_meid).
    type: string
  orderNumber:
    description: The device's order number. Only devices directly purchased from Google
      have an order number.
    type: string
  willAutoRenew:
    description: Determines if the device will auto renew its support after the support
      end date. This is a read-only property.
    type: boolean
  osVersion:
    description: The Chrome device's operating system version.
    type: string
  platformVersion:
    description: The Chrome device's platform version.
    type: string
  firmwareVersion:
    description: The Chrome device's firmware version.
    type: string
  macAddress:
    description: The device's wireless MAC address. If the device does not have this
      information, it is not included in the response.
    type: string
  bootMode:
    description: 'The boot mode for the device. The possible values are: * `Verified`:
      The device is running a valid version of the Chrome OS. * `Dev`: The devices''s
      developer hardware switch is enabled. When booted, the device has a command
      line shell. For an example of a developer switch, see the [Chromebook developer
      information](https://www.chromium.org/chromium-os/developer-information-for-chrome-os-devices/samsung-series-5-chromebook#TOC-Developer-switch).'
    type: string
  lastEnrollmentTime:
    description: Date and time the device was last enrolled (Read-only)
    type: string
    format: date-time
  kind:
    description: The type of resource. For the Chromeosdevices resource, the value
      is `admin#directory#chromeosdevice`.
    default: admin#directory#chromeosdevice
    type: string
  recentUsers:
    description: A list of recent device users, in descending order, by last login
      time.
    type: array
    items:
      description: A list of recent device users, in descending order, by last login
        time.
      type: object
      properties:
        type:
          description: The type of the user.
          type: string
        email:
          description: The user's email address. This is only present if the user
            type is `USER_TYPE_MANAGED`.
          type: string
  activeTimeRanges:
    description: A list of active time ranges (Read-only).
    type: array
    items:
      type: object
      properties:
        activeTime:
          description: Duration of usage in milliseconds.
          type: integer
          format: int32
        date:
          description: Date of usage
          type: string
          format: date
  ethernetMacAddress:
    description: The device's MAC address on the ethernet network interface.
    type: string
  annotatedAssetId:
    description: The asset identifier as noted by an administrator or specified during
      enrollment.
    type: string
  etag:
    description: ETag of the resource.
    type: string
  diskVolumeReports:
    description: Reports of disk space and other info about mounted/connected volumes.
    type: array
    items:
      type: object
      properties:
        volumeInfo:
          description: Disk volumes
          type: array
          items:
            type: object
            properties:
              volumeId:
                description: Volume id
                type: string
              storageTotal:
                description: Total disk space [in bytes]
                type: string
                format: int64
              storageFree:
                description: Free disk space [in bytes]
                type: string
                format: int64
  systemRamTotal:
    description: Total RAM on the device [in bytes] (Read-only)
    type: string
    format: int64
  cpuStatusReports:
    description: Reports of CPU utilization and temperature (Read-only)
    type: array
    items:
      type: object
      properties:
        reportTime:
          description: Date and time the report was received.
          type: string
          format: date-time
        cpuUtilizationPercentageInfo:
          type: array
          items:
            type: integer
            format: int32
        cpuTemperatureInfo:
          description: A list of CPU temperature samples.
          type: array
          items:
            type: object
            properties:
              temperature:
                description: Temperature in Celsius degrees.
                type: integer
                format: int32
              label:
                description: CPU label
                type: string
  cpuInfo:
    description: Information regarding CPU specs in the device.
    type: array
    items:
      description: CPU specs for a CPU.
      type: object
      properties:
        model:
          description: The CPU model name.
          type: string
        architecture:
          description: The CPU architecture.
          type: string
        maxClockSpeedKhz:
          description: The max CPU clock speed in kHz.
          type: integer
          format: int32
        logicalCpus:
          description: Information for the Logical CPUs
          type: array
          items:
            description: Status of a single logical CPU.
            type: object
            properties:
              maxScalingFrequencyKhz:
                description: Maximum frequency the CPU is allowed to run at, by policy.
                type: integer
                format: int32
              currentScalingFrequencyKhz:
                description: Current frequency the CPU is running at.
                type: integer
                format: int32
              idleDuration:
                description: Idle time since last boot.
                type: string
                format: google-duration
              cStates:
                description: C-States indicate the power consumption state of the
                  CPU. For more information look at documentation published by the
                  CPU maker.
                type: array
                items:
                  description: Status of a single C-state. C-states are various modes
                    the CPU can transition to in order to use more or less power.
                  type: object
                  properties:
                    displayName:
                      description: Name of the state.
                      type: string
                    sessionDuration:
                      description: Time spent in the state since the last reboot.
                      type: string
                      format: google-duration
  deviceFiles:
    description: A list of device files to download (Read-only)
    type: array
    items:
      type: object
      properties:
        name:
          description: File name
          type: string
        type:
          description: File type
          type: string
        downloadUrl:
          description: File download URL
          type: string
        createTime:
          description: Date and time the file was created
          type: string
          format: date-time
  systemRamFreeReports:
    description: Reports of amounts of available RAM memory (Read-only)
    type: array
    items:
      type: object
      properties:
        reportTime:
          description: Date and time the report was received.
          type: string
          format: date-time
        systemRamFreeInfo:
          type: array
          items:
            type: string
            format: int64
  lastKnownNetwork:
    description: Contains last known network (Read-only)
    type: array
    items:
      description: Information for an ip address.
      type: object
      properties:
        ipAddress:
          description: The IP address.
          type: string
        wanIpAddress:
          description: The WAN IP address.
          type: string
  autoUpdateExpiration:
    description: (Read-only) The timestamp after which the device will stop receiving
      Chrome updates or support. Please use "autoUpdateThrough" instead.
    deprecated: true
    type: string
    format: int64
  ethernetMacAddress0:
    description: "(Read-only) MAC address used by the Chromebook\u2019s internal ethernet\
      \ port, and for onboard network (ethernet) interface. The format is twelve (12)\
      \ hexadecimal digits without any delimiter (uppercase letters). This is only\
      \ relevant for some devices."
    type: string
  dockMacAddress:
    description: (Read-only) Built-in MAC address for the docking station that the
      device connected to. Factory sets Media access control address (MAC address)
      assigned for use by a dock. It is reserved specifically for MAC pass through
      device policy. The format is twelve (12) hexadecimal digits without any delimiter
      (uppercase letters). This is only relevant for some devices.
    type: string
  manufactureDate:
    description: (Read-only) The date the device was manufactured in yyyy-mm-dd format.
    type: string
  orgUnitPath:
    description: The full parent path with the organizational unit's name associated
      with the device. Path names are case insensitive. If the parent organizational
      unit is the top-level organization, it is represented as a forward slash, `/`.
      This property can be [updated](https://developers.google.com/workspace/admin/directory/v1/guides/manage-chrome-devices#move_chrome_devices_to_ou)
      using the API. For more information about how to create an organizational structure
      for your device, see the [administration help center](https://support.google.com/a/answer/182433).
    type: string
  tpmVersionInfo:
    description: Trusted Platform Module (TPM) (Read-only)
    type: object
    properties:
      family:
        description: 'TPM family. We use the TPM 2.0 style encoding, e.g.: TPM 1.2:
          "1.2" -> 312e3200 TPM 2.0: "2.0" -> 322e3000'
        type: string
      specLevel:
        description: TPM specification level. See Library Specification for TPM 2.0
          and Main Specification for TPM 1.2.
        type: string
      manufacturer:
        description: TPM manufacturer code.
        type: string
      tpmModel:
        description: TPM model number.
        type: string
      firmwareVersion:
        description: TPM firmware version.
        type: string
      vendorSpecific:
        description: Vendor-specific information such as Vendor ID.
        type: string
  screenshotFiles:
    description: A list of screenshot files to download. Type is always "SCREENSHOT_FILE".
      (Read-only)
    type: array
    items:
      type: object
      properties:
        name:
          description: File name
          type: string
        type:
          description: File type
          type: string
        downloadUrl:
          description: File download URL
          type: string
        createTime:
          description: Date and time the file was created
          type: string
          format: date-time
  orgUnitId:
    description: The unique ID of the organizational unit. orgUnitPath is the human
      readable version of orgUnitId. While orgUnitPath may change by renaming an organizational
      unit within the path, orgUnitId is unchangeable for one organizational unit.
      This property can be [updated](https://developers.google.com/workspace/admin/directory/v1/guides/manage-chrome-devices#move_chrome_devices_to_ou)
      using the API. For more information about how to create an organizational structure
      for your device, see the [administration help center](https://support.google.com/a/answer/182433).
    type: string
  osUpdateStatus:
    description: The status of the OS updates for the device.
    $ref: OsUpdateStatus
  firstEnrollmentTime:
    description: Date and time for the first time the device was enrolled.
    type: string
  lastDeprovisionTimestamp:
    description: (Read-only) Date and time for the last deprovision of the device.
    type: string
  deprovisionReason:
    description: (Read-only) Deprovision reason.
    type: string
    enumDescriptions:
    - The deprovision reason is unknown.
    - Same model replacement. You have return materials authorization (RMA) or you
      are replacing a malfunctioning device under warranty with the same device model.
    - The device was upgraded.
    - The device's domain was changed.
    - Service expired for the device.
    - The device was deprovisioned for a legacy reason that is no longer supported.
    - Different model replacement. You are replacing this device with an upgraded
      or newer device model.
    - Retiring from fleet. You are donating, discarding, or otherwise removing the
      device from use.
    - ChromeOS Flex upgrade transfer. This is a ChromeOS Flex device that you are
      replacing with a Chromebook within a year.
    - A reason was not required. For example, the licenses were returned to the customer's
      license pool.
    - The device was deprovisioned by the Repair Service Center. Can only be set by
      Repair Service Center during RMA.
    enumDeprecated:
    - false
    - false
    - true
    - true
    - true
    - true
    - false
    - false
    - false
    - false
    - false
    enum:
    - DEPROVISION_REASON_UNSPECIFIED
    - DEPROVISION_REASON_SAME_MODEL_REPLACEMENT
    - DEPROVISION_REASON_UPGRADE
    - DEPROVISION_REASON_DOMAIN_MOVE
    - DEPROVISION_REASON_SERVICE_EXPIRATION
    - DEPROVISION_REASON_OTHER
    - DEPROVISION_REASON_DIFFERENT_MODEL_REPLACEMENT
    - DEPROVISION_REASON_RETIRING_DEVICE
    - DEPROVISION_REASON_UPGRADE_TRANSFER
    - DEPROVISION_REASON_NOT_REQUIRED
    - DEPROVISION_REASON_REPAIR_CENTER
  deviceLicenseType:
    description: Output only. Device license type.
    readOnly: true
    type: string
    enumDescriptions:
    - The license type is unknown.
    - The device is bundled with a perpetual Chrome Enterprise Upgrade.
    - The device has an annual standalone Chrome Enterprise Upgrade.
    - The device has a perpetual standalone Chrome Education Upgrade.
    - The device is bundled with a perpetual Chrome Education Upgrade.
    - The device has an annual Kiosk Upgrade.
    - Indicates that the device is consuming a standalone, perpetual Chrome Enterprise
      Upgrade, a Chrome Enterprise license.
    - Indicates that the device is consuming a standalone, fixed-term Chrome Enterprise
      Upgrade, a Chrome Enterprise license.
    - Indicates that the device is consuming a standalone, perpetual Chrome Education
      Upgrade(AKA Chrome EDU perpetual license).
    - Indicates that the device is consuming a standalone, fixed-term Chrome Education
      Upgrade(AKA Chrome EDU fixed-term license).
    enumDeprecated:
    - false
    - false
    - true
    - true
    - false
    - false
    - false
    - false
    - false
    - false
    enum:
    - deviceLicenseTypeUnspecified
    - enterprise
    - enterpriseUpgrade
    - educationUpgrade
    - education
    - kioskUpgrade
    - enterpriseUpgradePerpetual
    - enterpriseUpgradeFixedTerm
    - educationUpgradePerpetual
    - educationUpgradeFixedTerm
  backlightInfo:
    description: Output only. Contains backlight information for the device.
    readOnly: true
    type: array
    items:
      $ref: BacklightInfo
  autoUpdateThrough:
    description: Output only. The timestamp after which the device will stop receiving
      Chrome updates or support.
    readOnly: true
    type: string
  extendedSupportEligible:
    description: Output only. Whether or not the device requires the extended support
      opt in.
    readOnly: true
    type: boolean
  extendedSupportStart:
    description: Output only. Date of the device when extended support policy for
      automatic updates starts.
    readOnly: true
    type: string
  extendedSupportEnabled:
    description: Output only. Whether extended support policy is enabled on the device.
    readOnly: true
    type: boolean
  fanInfo:
    description: Output only. Fan information for the device.
    readOnly: true
    type: array
    items:
      $ref: FanInfo
  chromeOsType:
    description: Output only. Chrome OS type of the device.
    readOnly: true
    type: string
    enumDescriptions:
    - Chrome OS Type unspecified.
    - Chrome OS Type Chrome OS Flex.
    - Chrome OS Type Chrome OS.
    enum:
    - chromeOsTypeUnspecified
    - chromeOsFlex
    - chromeOs
  diskSpaceUsage:
    description: Output only. How much disk space the device has available and is
      currently using.
    readOnly: true
    $ref: ByteUsage
  osVersionCompliance:
    description: Output only. Device policy compliance status of the OS version.
    readOnly: true
    type: string
    enumDescriptions:
    - Compliance status unspecified.
    - Compliance status compliant.
    - Compliance status pending.
    - Compliance status not compliant.
    enum:
    - complianceUnspecified
    - compliant
    - pending
    - notCompliant
  bluetoothAdapterInfo:
    description: Output only. Information about Bluetooth adapters of the device.
    readOnly: true
    type: array
    items:
      $ref: BluetoothAdapterInfo
