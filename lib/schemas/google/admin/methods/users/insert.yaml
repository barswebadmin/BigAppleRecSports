description: Creates a user. Mutate calls immediately following user creation might
  sometimes fail as the user isn't fully created due to propagation delay in our backends.
  Check the error details for the "User creation is not complete" message to see if
  this is the case. Retrying the calls after some time can help in this case. If `resolveConflictAccount`
  is set to `true`, a `202` response code means that a conflicting unmanaged account
  exists and was invited to join the organization. A `409` response code means that
  a conflicting account exists so the user wasn't created based on the [handling unmanaged
  user accounts](https://support.google.com/a/answer/11112794) option selected.
httpMethod: POST
path: admin/directory/v1/users
scopes:
- https://www.googleapis.com/auth/admin.directory.user
request:
  $ref: User
parameters:
  resolveConflictAccount:
    description: 'Optional. If set to `true`, the option selected for [handling unmanaged
      user accounts](https://support.google.com/a/answer/11112794) will apply. Default:
      `false`'
    location: query
    type: boolean
response:
  $ref: User
