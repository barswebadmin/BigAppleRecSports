description: Lists the supported printer models.
httpMethod: GET
path: admin/directory/v1/{+parent}/chrome/printers:listPrinterModels
scopes:
- https://www.googleapis.com/auth/admin.chrome.printers
- https://www.googleapis.com/auth/admin.chrome.printers.readonly
parameters:
  parent:
    description: 'Required. The name of the customer who owns this collection of printers.
      Format: customers/{customer_id}'
    pattern: ^customers/[^/]+$
    location: path
    required: true
    type: string
  pageSize:
    description: The maximum number of objects to return. The service may return fewer
      than this value.
    location: query
    type: integer
    format: int32
  pageToken:
    description: A page token, received from a previous call.
    location: query
    type: string
  filter:
    description: 'Filer to list only models by a given manufacturer in format: "manufacturer:Brother".
      Search syntax is shared between this api and Admin Console printers pages.'
    location: query
    type: string
response:
  $ref: ListPrinterModelsResponse
