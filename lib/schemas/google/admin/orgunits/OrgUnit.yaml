$schema: http://json-schema.org/draft-07/schema#
title: OrgUnit
description: Managing your account's organizational units allows you to configure
  your users' access to services and custom settings. For more information about common
  organizational unit tasks, see the [Developer's Guide](https://developers.google.com/workspace/admin/directory/v1/guides/manage-org-units.html).
  The customer's organizational unit hierarchy is limited to 35 levels of depth.
type: object
properties:
  kind:
    description: The type of the API resource. For Orgunits resources, the value is
      `admin#directory#orgUnit`.
    default: admin#directory#orgUnit
    type: string
  name:
    description: The organizational unit's path name. For example, an organizational
      unit's name within the /corp/support/sales_support parent path is sales_support.
      Required.
    annotations:
      required:
      - directory.orgunits.insert
    type: string
  description:
    description: Description of the organizational unit.
    type: string
  etag:
    description: ETag of the resource.
    type: string
  blockInheritance:
    description: This field is deprecated and setting its value has no effect.
    deprecated: true
    type: boolean
  orgUnitId:
    description: The unique ID of the organizational unit.
    type: string
  orgUnitPath:
    description: The full path to the organizational unit. The `orgUnitPath` is a
      derived property. When listed, it is derived from `parentOrgunitPath` and organizational
      unit's `name`. For example, for an organizational unit named 'apps' under parent
      organization '/engineering', the orgUnitPath is '/engineering/apps'. In order
      to edit an `orgUnitPath`, either update the name of the organization or the
      `parentOrgunitPath`. A user's organizational unit determines which Google Workspace
      services the user has access to. If the user is moved to a new organization,
      the user's access changes. For more information about organization structures,
      see the [administration help center](https://support.google.com/a/answer/4352075).
      For more information about moving a user to a different organization, see [Update
      a user](https://developers.google.com/workspace/admin/directory/v1/guides/manage-users.html#update_user).
    type: string
  parentOrgUnitId:
    description: The unique ID of the parent organizational unit. Required, unless
      `parentOrgUnitPath` is set.
    type: string
  parentOrgUnitPath:
    description: The organizational unit's parent path. For example, /corp/sales is
      the parent path for /corp/sales/sales_support organizational unit. Required,
      unless `parentOrgUnitId` is set.
    type: string
