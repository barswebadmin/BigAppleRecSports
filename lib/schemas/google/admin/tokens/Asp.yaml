$schema: http://json-schema.org/draft-07/schema#
title: Asp
description: An application-specific password (ASP) is used with applications that
  do not accept a verification code when logging into the application on certain devices.
  The ASP access code is used instead of the login and password you commonly use when
  accessing an application through a browser. For more information about ASPs and
  how to create one, see the [help center](https://support.google.com/a/answer/2537800#asp).
type: object
properties:
  codeId:
    description: The unique ID of the ASP.
    type: integer
    format: int32
  name:
    description: The name of the application that the user, represented by their `userId`,
      entered when the ASP was created.
    type: string
  creationTime:
    description: The time when the ASP was created. Expressed in [Unix time](https://en.wikipedia.org/wiki/Epoch_time)
      format.
    type: string
    format: int64
  lastTimeUsed:
    description: The time when the ASP was last used. Expressed in [Unix time](https://en.wikipedia.org/wiki/Epoch_time)
      format.
    type: string
    format: int64
  userKey:
    description: The unique ID of the user who issued the ASP.
    type: string
  kind:
    description: The type of the API resource. This is always `admin#directory#asp`.
    default: admin#directory#asp
    type: string
  etag:
    description: ETag of the ASP.
    type: string
