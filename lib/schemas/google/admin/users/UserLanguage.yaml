$schema: http://json-schema.org/draft-07/schema#
title: UserLanguage
description: JSON template for a language entry.
type: object
properties:
  customLanguage:
    description: Other language. User can provide their own language name if there
      is no corresponding ISO 639 language code. If this is set, `languageCode` can't
      be set.
    type: string
  languageCode:
    description: ISO 639 string representation of a language. See [Language Codes](/admin-sdk/directory/v1/languages)
      for the list of supported codes. Valid language codes outside the supported
      set will be accepted by the API but may lead to unexpected behavior. Illegal
      values cause `SchemaException`. If this is set, `customLanguage` can't be set.
    type: string
  preference:
    description: Optional. If present, controls whether the specified `languageCode`
      is the user's preferred language. If `customLanguage` is set, this can't be
      set. Allowed values are `preferred` and `not_preferred`.
    type: string
