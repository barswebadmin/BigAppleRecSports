$schema: http://json-schema.org/draft-07/schema#
title: User
description: The Directory API allows you to create and manage your account's users,
  user aliases, and user Google profile photos. For more information about common
  tasks, see the [User Accounts Developer's Guide](https://developers.google.com/workspace/admin/directory/v1/guides/manage-users.html)
  and the [User Aliases Developer's Guide](https://developers.google.com/workspace/admin/directory/v1/guides/manage-user-aliases.html).
type: object
properties:
  id:
    description: The unique ID for the user. A user `id` can be used as a user request
      URI's `userKey`.
    type: string
  primaryEmail:
    description: The user's primary email address. This property is required in a
      request to create a user account. The `primaryEmail` must be unique and cannot
      be an alias of another user.
    annotations:
      required:
      - directory.users.insert
    type: string
  password:
    description: User's password
    type: string
    annotations:
      required:
      - directory.users.insert
  hashFunction:
    description: 'Stores the hash format of the `password` property. The following
      `hashFunction` values are allowed: * `MD5` - Accepts simple hex-encoded values.
      * `SHA-1` - Accepts simple hex-encoded values. * `crypt` - Compliant with the
      [C crypt library](https://en.wikipedia.org/wiki/Crypt_%28C%29). Supports the
      DES, MD5 (hash prefix `$1$`), SHA-256 (hash prefix `$5$`), and SHA-512 (hash
      prefix `$6$`) hash algorithms. If rounds are specified as part of the prefix,
      they must be 10,000 or fewer.'
    type: string
  isAdmin:
    description: Output only. Indicates a user with super administrator privileges.
      The `isAdmin` property can only be edited in the [Make a user an administrator](https://developers.google.com/workspace/admin/directory/v1/guides/manage-users.html#make_admin)
      operation ( [makeAdmin](https://developers.google.com/workspace/admin/directory/v1/reference/users/makeAdmin.html)
      method). If edited in the user [insert](https://developers.google.com/workspace/admin/directory/v1/reference/users/insert.html)
      or [update](https://developers.google.com/workspace/admin/directory/v1/reference/users/update.html)
      methods, the edit is ignored by the API service.
    readOnly: true
    type: boolean
  isDelegatedAdmin:
    description: Output only. Indicates if the user is a delegated administrator.
      Delegated administrators are supported by the API but cannot create or undelete
      users, or make users administrators. These requests are ignored by the API service.
      Roles and privileges for administrators are assigned using the [Admin console](https://support.google.com/a/answer/33325).
    readOnly: true
    type: boolean
  agreedToTerms:
    description: Output only. This property is `true` if the user has completed an
      initial login and accepted the Terms of Service agreement.
    readOnly: true
    type: boolean
  suspended:
    description: Indicates if user is suspended.
    type: boolean
  changePasswordAtNextLogin:
    description: Indicates if the user is forced to change their password at next
      login. This setting doesn't apply when [the user signs in via a third-party
      identity provider](https://support.google.com/a/answer/60224).
    type: boolean
  ipWhitelisted:
    description: If `true`, the user's IP address is subject to a deprecated IP address
      [`allowlist`](https://support.google.com/a/answer/60752) configuration.
    type: boolean
  name:
    description: Holds the given and family names of the user, and the read-only `fullName`
      value. The maximum number of characters in the `givenName` and in the `familyName`
      values is 60. In addition, name values support unicode/UTF-8 characters, and
      can contain spaces, letters (a-z), numbers (0-9), dashes (-), forward slashes
      (/), and periods (.). For more information about character usage rules, see
      the [administration help center](https://support.google.com/a/answer/9193374).
      Maximum allowed data size for this field is 1KB.
    annotations:
      required:
      - directory.users.insert
    $ref: UserName
  kind:
    description: Output only. The type of the API resource. For Users resources, the
      value is `admin#directory#user`.
    default: admin#directory#user
    readOnly: true
    type: string
  etag:
    description: Output only. ETag of the resource.
    readOnly: true
    type: string
  emails:
    description: The list of the user's email addresses. The maximum allowed data
      size for this field is 10KB. This excludes `publicKeyEncryptionCertificates`.
    type: any
  externalIds:
    description: The list of external IDs for the user, such as an employee or network
      ID. The maximum allowed data size for this field is 2KB.
    type: any
  relations:
    description: The list of the user's relationships to other users. The maximum
      allowed data size for this field is 2KB.
    type: any
  aliases:
    description: Output only. The list of the user's alias email addresses.
    readOnly: true
    type: array
    items:
      type: string
  isMailboxSetup:
    description: Output only. Indicates if the user's Google mailbox is created. This
      property is only applicable if the user has been assigned a Gmail license.
    readOnly: true
    type: boolean
  customerId:
    description: Output only. The customer ID to [retrieve all account users](https://developers.google.com/workspace/admin/directory/v1/guides/manage-users.html#get_all_users).
      You can use the alias `my_customer` to represent your account's `customerId`.
      As a reseller administrator, you can use the resold customer account's `customerId`.
      To get a `customerId`, use the account's primary domain in the `domain` parameter
      of a [users.list](https://developers.google.com/workspace/admin/directory/v1/reference/users/list)
      request.
    readOnly: true
    type: string
  addresses:
    description: The list of the user's addresses. The maximum allowed data size for
      this field is 10KB.
    type: any
  organizations:
    description: The list of organizations the user belongs to. The maximum allowed
      data size for this field is 10KB.
    type: any
  lastLoginTime:
    description: User's last login time. (Read-only)
    type: string
    format: date-time
    readOnly: true
  phones:
    description: The list of the user's phone numbers. The maximum allowed data size
      for this field is 1KB.
    type: any
  suspensionReason:
    description: Output only. Has the reason a user account is suspended either by
      the administrator or by Google at the time of suspension. The property is returned
      only if the `suspended` property is `true`.
    readOnly: true
    type: string
  thumbnailPhotoUrl:
    description: Output only. The URL of the user's profile photo. The URL might be
      temporary or private.
    readOnly: true
    type: string
  languages:
    description: The user's languages. The maximum allowed data size for this field
      is 1KB.
    type: any
  posixAccounts:
    description: The list of [POSIX](https://www.opengroup.org/austin/papers/posix_faq.html)
      account information for the user.
    type: any
  creationTime:
    description: User's G Suite account creation time. (Read-only)
    type: string
    format: date-time
    readOnly: true
  nonEditableAliases:
    description: Output only. The list of the user's non-editable alias email addresses.
      These are typically outside the account's primary domain or sub-domain.
    readOnly: true
    type: array
    items:
      type: string
  sshPublicKeys:
    description: A list of SSH public keys.
    type: any
  notes:
    description: Notes for the user.
    type: any
  websites:
    description: The user's websites. The maximum allowed data size for this field
      is 2KB.
    type: any
  locations:
    description: The user's locations. The maximum allowed data size for this field
      is 10KB.
    type: any
  includeInGlobalAddressList:
    description: Indicates if the user's profile is visible in the Google Workspace
      global address list when the contact sharing feature is enabled for the domain.
      For more information about excluding user profiles, see the [administration
      help center](https://support.google.com/a/answer/1285988).
    type: boolean
  keywords:
    description: The list of the user's keywords. The maximum allowed data size for
      this field is 1KB.
    type: any
  deletionTime:
    type: string
    format: date-time
    readOnly: true
  gender:
    description: The user's gender. The maximum allowed data size for this field is
      1KB.
    type: any
  thumbnailPhotoEtag:
    description: Output only. ETag of the user's photo (Read-only)
    readOnly: true
    type: string
  ims:
    description: The list of the user's Instant Messenger (IM) accounts. A user account
      can have multiple ims properties. But, only one of these ims properties can
      be the primary IM contact. The maximum allowed data size for this field is 2KB.
    type: any
  customSchemas:
    description: 'Custom fields of the user. The key is a `schema_name` and its values
      are `''field_name'': ''field_value''`.'
    type: object
    additionalProperties:
      $ref: UserCustomProperties
  isEnrolledIn2Sv:
    description: Output only. Is enrolled in 2-step verification (Read-only)
    readOnly: true
    type: boolean
  isEnforcedIn2Sv:
    description: Output only. Is 2-step verification enforced (Read-only)
    readOnly: true
    type: boolean
  archived:
    description: Indicates if user is archived.
    type: boolean
  orgUnitPath:
    description: The full path of the parent organization associated with the user.
      If the parent organization is the top-level, it is represented as a forward
      slash (`/`).
    type: string
  recoveryEmail:
    description: Recovery email of the user.
    type: string
  recoveryPhone:
    description: 'Recovery phone of the user. The phone number must be in the E.164
      format, starting with the plus sign (+). Example: *+16506661212*.'
    type: string
  isGuestUser:
    description: Immutable. Indicates if the inserted user is a guest.
    type: boolean
  guestAccountInfo:
    description: Immutable. Additional guest-related metadata fields
    $ref: GuestAccountInfo
