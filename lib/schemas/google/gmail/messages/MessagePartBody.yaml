$schema: http://json-schema.org/draft-07/schema#
title: MessagePartBody
description: The body of a single MIME message part.
type: object
properties:
  attachmentId:
    description: When present, contains the ID of an external attachment that can
      be retrieved in a separate `messages.attachments.get` request. When not present,
      the entire content of the message part body is contained in the data field.
    type: string
  size:
    description: Number of bytes for the message part data (encoding notwithstanding).
    type: integer
    format: int32
  data:
    description: The body data of a MIME message part as a base64url encoded string.
      May be empty for MIME container types that have no message body or when the
      body data is sent as a separate attachment. An attachment ID is present if the
      body data is contained in a separate attachment.
    type: string
    format: byte
