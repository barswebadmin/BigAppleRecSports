description: Lists the history of all changes to the given mailbox. History results
  are returned in chronological order (increasing `historyId`).
httpMethod: GET
path: gmail/v1/users/{userId}/history
scopes:
- https://mail.google.com/
- https://www.googleapis.com/auth/gmail.metadata
- https://www.googleapis.com/auth/gmail.modify
- https://www.googleapis.com/auth/gmail.readonly
parameters:
  userId:
    description: The user's email address. The special value `me` can be used to indicate
      the authenticated user.
    default: me
    location: path
    required: true
    type: string
  maxResults:
    description: Maximum number of history records to return. This field defaults
      to 100. The maximum allowed value for this field is 500.
    default: '100'
    location: query
    type: integer
    format: uint32
  pageToken:
    description: Page token to retrieve a specific page of results in the list.
    location: query
    type: string
  startHistoryId:
    description: Required. Returns history records after the specified `startHistoryId`.
      The supplied `startHistoryId` should be obtained from the `historyId` of a message,
      thread, or previous `list` response. History IDs increase chronologically but
      are not contiguous with random gaps in between valid IDs. Supplying an invalid
      or out of date `startHistoryId` typically returns an `HTTP 404` error code.
      A `historyId` is typically valid for at least a week, but in some rare circumstances
      may be valid for only a few hours. If you receive an `HTTP 404` error response,
      your application should perform a full sync. If you receive no `nextPageToken`
      in the response, there are no updates to retrieve and you can store the returned
      `historyId` for a future request.
    location: query
    type: string
    format: uint64
  labelId:
    description: Only return messages with a label matching the ID.
    location: query
    type: string
  historyTypes:
    description: History types to be returned by the function
    location: query
    repeated: true
    type: string
    enumDescriptions:
    - ''
    - ''
    - ''
    - ''
    enum:
    - messageAdded
    - messageDeleted
    - labelAdded
    - labelRemoved
response:
  $ref: ListHistoryResponse
