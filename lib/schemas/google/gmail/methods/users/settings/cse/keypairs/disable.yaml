description: Turns off a client-side encryption key pair. The authenticated user can
  no longer use the key pair to decrypt incoming CSE message texts or sign outgoing
  CSE mail. To regain access, use the EnableCseKeyPair to turn on the key pair. After
  30 days, you can permanently delete the key pair by using the ObliterateCseKeyPair
  method. For administrators managing identities and keypairs for users in their organization,
  requests require authorization with a [service account](https://developers.google.com/identity/protocols/OAuth2ServiceAccount)
  that has [domain-wide delegation authority](https://developers.google.com/identity/protocols/OAuth2ServiceAccount#delegatingauthority)
  to impersonate users with the `https://www.googleapis.com/auth/gmail.settings.basic`
  scope. For users managing their own identities and keypairs, requests require [hardware
  key encryption](https://support.google.com/a/answer/14153163) turned on and configured.
httpMethod: POST
path: gmail/v1/users/{userId}/settings/cse/keypairs/{keyPairId}:disable
scopes:
- https://www.googleapis.com/auth/gmail.settings.basic
- https://www.googleapis.com/auth/gmail.settings.sharing
request:
  $ref: DisableCseKeyPairRequest
parameters:
  userId:
    description: The requester's primary email address. To indicate the authenticated
      user, you can use the special value `me`.
    default: me
    location: path
    required: true
    type: string
  keyPairId:
    description: The identifier of the key pair to turn off.
    location: path
    required: true
    type: string
response:
  $ref: CseKeyPair
