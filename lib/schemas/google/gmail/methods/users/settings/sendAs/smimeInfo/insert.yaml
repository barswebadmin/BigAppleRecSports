description: Insert (upload) the given S/MIME config for the specified send-as alias.
  Note that pkcs12 format is required for the key.
httpMethod: POST
path: gmail/v1/users/{userId}/settings/sendAs/{sendAsEmail}/smimeInfo
scopes:
- https://www.googleapis.com/auth/gmail.settings.basic
- https://www.googleapis.com/auth/gmail.settings.sharing
request:
  $ref: SmimeInfo
parameters:
  userId:
    description: The user's email address. The special value `me` can be used to indicate
      the authenticated user.
    default: me
    location: path
    required: true
    type: string
  sendAsEmail:
    description: The email address that appears in the "From:" header for mail sent
      using this alias.
    location: path
    required: true
    type: string
response:
  $ref: SmimeInfo
