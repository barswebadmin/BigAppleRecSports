description: Moves the specified thread to the trash. Any messages that belong to
  the thread are also moved to the trash.
httpMethod: POST
path: gmail/v1/users/{userId}/threads/{id}/trash
scopes:
- https://mail.google.com/
- https://www.googleapis.com/auth/gmail.modify
parameters:
  userId:
    description: The user's email address. The special value `me` can be used to indicate
      the authenticated user.
    default: me
    location: path
    required: true
    type: string
  id:
    description: The ID of the thread to Trash.
    location: path
    required: true
    type: string
response:
  $ref: Thread
