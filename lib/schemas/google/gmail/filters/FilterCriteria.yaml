$schema: http://json-schema.org/draft-07/schema#
title: FilterCriteria
description: Message matching criteria.
type: object
properties:
  from:
    description: The sender's display name or email address.
    type: string
  to:
    description: The recipient's display name or email address. Includes recipients
      in the "to", "cc", and "bcc" header fields. You can use simply the local part
      of the email address. For example, "example" and "example@" both match "example@gmail.com".
      This field is case-insensitive.
    type: string
  subject:
    description: Case-insensitive phrase found in the message's subject. Trailing
      and leading whitespace are be trimmed and adjacent spaces are collapsed.
    type: string
  query:
    description: 'Only return messages matching the specified query. Supports the
      same query format as the Gmail search box. For example, `"from:someuser@example.com
      rfc822msgid: is:unread"`.'
    type: string
  negatedQuery:
    description: 'Only return messages not matching the specified query. Supports
      the same query format as the Gmail search box. For example, `"from:someuser@example.com
      rfc822msgid: is:unread"`.'
    type: string
  hasAttachment:
    description: Whether the message has any attachment.
    type: boolean
  excludeChats:
    description: Whether the response should exclude chats.
    type: boolean
  size:
    description: The size of the entire RFC822 message in bytes, including all headers
      and attachments.
    type: integer
    format: int32
  sizeComparison:
    description: How the message size in bytes should be in relation to the size field.
    type: string
    enumDescriptions:
    - ''
    - Find messages smaller than the given size.
    - Find messages larger than the given size.
    enum:
    - unspecified
    - smaller
    - larger
