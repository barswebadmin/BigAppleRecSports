$schema: http://json-schema.org/draft-07/schema#
title: SmimeInfo
description: An S/MIME email config.
type: object
properties:
  id:
    description: The immutable ID for the SmimeInfo.
    type: string
  issuerCn:
    description: The S/MIME certificate issuer's common name.
    type: string
  isDefault:
    description: Whether this SmimeInfo is the default one for this user's send-as
      address.
    type: boolean
  expiration:
    description: When the certificate expires (in milliseconds since epoch).
    type: string
    format: int64
  pem:
    description: PEM formatted X509 concatenated certificate string (standard base64
      encoding). Format used for returning key, which includes public key as well
      as certificate chain (not private key).
    type: string
  pkcs12:
    description: PKCS#12 format containing a single private/public key pair and certificate
      chain. This format is only accepted from client for creating a new SmimeInfo
      and is never returned, because the private key is not intended to be exported.
      PKCS#12 may be encrypted, in which case encryptedKeyPassword should be set appropriately.
    type: string
    format: byte
  encryptedKeyPassword:
    description: Encrypted key password, when key is encrypted.
    type: string
