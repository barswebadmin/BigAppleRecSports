$schema: http://json-schema.org/draft-07/schema#
title: VacationSettings
description: Vacation auto-reply settings for an account. These settings correspond
  to the "Vacation responder" feature in the web interface.
type: object
properties:
  enableAutoReply:
    description: Flag that controls whether Gmail automatically replies to messages.
    type: boolean
  responseSubject:
    description: Optional text to prepend to the subject line in vacation responses.
      In order to enable auto-replies, either the response subject or the response
      body must be nonempty.
    type: string
  responseBodyPlainText:
    description: Response body in plain text format. If both `response_body_plain_text`
      and `response_body_html` are specified, `response_body_html` will be used.
    type: string
  responseBodyHtml:
    description: Response body in HTML format. Gmail will sanitize the HTML before
      storing it. If both `response_body_plain_text` and `response_body_html` are
      specified, `response_body_html` will be used.
    type: string
  restrictToContacts:
    description: Flag that determines whether responses are sent to recipients who
      are not in the user's list of contacts.
    type: boolean
  restrictToDomain:
    description: Flag that determines whether responses are sent to recipients who
      are outside of the user's domain. This feature is only available for Google
      Workspace users.
    type: boolean
  startTime:
    description: An optional start time for sending auto-replies (epoch ms). When
      this is specified, Gmail will automatically reply only to messages that it receives
      after the start time. If both `startTime` and `endTime` are specified, `startTime`
      must precede `endTime`.
    type: string
    format: int64
  endTime:
    description: An optional end time for sending auto-replies (epoch ms). When this
      is specified, Gmail will automatically reply only to messages that it receives
      before the end time. If both `startTime` and `endTime` are specified, `startTime`
      must precede `endTime`.
    type: string
    format: int64
