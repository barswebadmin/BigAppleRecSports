$schema: http://json-schema.org/draft-07/schema#
title: PublishSettings
description: The publishing settings of a form.
type: object
properties:
  publishState:
    description: Optional. The publishing state of a form. When updating `publish_state`,
      both `is_published` and `is_accepting_responses` must be set. However, setting
      `is_accepting_responses` to `true` and `is_published` to `false` isn't supported
      and returns an error.
    $ref: PublishState
