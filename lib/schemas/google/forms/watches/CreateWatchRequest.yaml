$schema: http://json-schema.org/draft-07/schema#
title: CreateWatchRequest
description: Create a new watch.
type: object
properties:
  watch:
    description: Required. The watch object. No ID should be set on this object; use
      `watch_id` instead.
    $ref: Watch
  watchId:
    description: The ID to use for the watch. If specified, the ID must not already
      be in use. If not specified, an ID is generated. This value should be 4-63 characters,
      and valid characters are /a-z-/.
    type: string
