$schema: http://json-schema.org/draft-07/schema#
title: Grid
description: A grid of choices (radio or check boxes) with each row constituting a
  separate question. Each row has the same choices, which are shown as the columns.
type: object
properties:
  columns:
    description: Required. The choices shared by each question in the grid. In other
      words, the values of the columns. Only `CHECK_BOX` and `RADIO` choices are allowed.
    $ref: ChoiceQuestion
  shuffleQuestions:
    type: boolean
    description: If `true`, the questions are randomly ordered. In other words, the
      rows appear in a different order for every respondent.
