description: Watch for changes to CalendarList resources.
httpMethod: POST
path: users/me/calendarList/watch
scopes:
- https://www.googleapis.com/auth/calendar
- https://www.googleapis.com/auth/calendar.calendarlist
- https://www.googleapis.com/auth/calendar.calendarlist.readonly
- https://www.googleapis.com/auth/calendar.readonly
request:
  $ref: Channel
  parameterName: resource
parameters:
  maxResults:
    type: integer
    description: Maximum number of entries returned on one result page. By default
      the value is 100 entries. The page size can never be larger than 250 entries.
      Optional.
    format: int32
    minimum: '1'
    location: query
  minAccessRole:
    type: string
    description: The minimum access role for the user in the returned entries. Optional.
      The default is no restriction.
    enum:
    - freeBusyReader
    - owner
    - reader
    - writer
    enumDescriptions:
    - The user can read free/busy information.
    - The user can read and modify events and access control lists.
    - The user can read events that are not private.
    - The user can read and modify events.
    location: query
  pageToken:
    type: string
    description: Token specifying which result page to return. Optional.
    location: query
  showDeleted:
    type: boolean
    description: Whether to include deleted calendar list entries in the result. Optional.
      The default is False.
    location: query
  showHidden:
    type: boolean
    description: Whether to show hidden entries. Optional. The default is False.
    location: query
  syncToken:
    type: string
    description: 'Token obtained from the nextSyncToken field returned on the last
      page of results from the previous list request. It makes the result of this
      list request contain only entries that have changed since then. If only read-only
      fields such as calendar properties or ACLs have changed, the entry won''t be
      returned. All entries deleted and hidden since the previous list request will
      always be in the result set and it is not allowed to set showDeleted neither
      showHidden to False.

      To ensure client state consistency minAccessRole query parameter cannot be specified
      together with nextSyncToken.

      If the syncToken expires, the server will respond with a 410 GONE response code
      and the client should clear its storage and perform a full synchronization without
      any syncToken.

      Learn more about incremental synchronization.

      Optional. The default is to return all entries.'
    location: query
response:
  $ref: Channel
