description: Creates an access control rule.
httpMethod: POST
path: calendars/{calendarId}/acl
scopes:
- https://www.googleapis.com/auth/calendar
- https://www.googleapis.com/auth/calendar.acls
request:
  $ref: AclRule
parameters:
  calendarId:
    type: string
    description: Calendar identifier. To retrieve calendar IDs call the calendarList.list
      method. If you want to access the primary calendar of the currently logged in
      user, use the "primary" keyword.
    required: true
    location: path
  sendNotifications:
    type: boolean
    description: Whether to send notifications about the calendar sharing change.
      Optional. The default is True.
    location: query
response:
  $ref: AclRule
