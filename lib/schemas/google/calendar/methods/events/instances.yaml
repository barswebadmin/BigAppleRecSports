description: Returns instances of the specified recurring event.
httpMethod: GET
path: calendars/{calendarId}/events/{eventId}/instances
scopes:
- https://www.googleapis.com/auth/calendar
- https://www.googleapis.com/auth/calendar.app.created
- https://www.googleapis.com/auth/calendar.events
- https://www.googleapis.com/auth/calendar.events.freebusy
- https://www.googleapis.com/auth/calendar.events.owned
- https://www.googleapis.com/auth/calendar.events.owned.readonly
- https://www.googleapis.com/auth/calendar.events.public.readonly
- https://www.googleapis.com/auth/calendar.events.readonly
- https://www.googleapis.com/auth/calendar.readonly
parameters:
  alwaysIncludeEmail:
    type: boolean
    description: Deprecated and ignored. A value will always be returned in the email
      field for the organizer, creator and attendees, even if no real email address
      is available (i.e. a generated, non-working value will be provided).
    location: query
  calendarId:
    type: string
    description: Calendar identifier. To retrieve calendar IDs call the calendarList.list
      method. If you want to access the primary calendar of the currently logged in
      user, use the "primary" keyword.
    required: true
    location: path
  eventId:
    type: string
    description: Recurring event identifier.
    required: true
    location: path
  maxAttendees:
    type: integer
    description: The maximum number of attendees to include in the response. If there
      are more than the specified number of attendees, only the participant is returned.
      Optional.
    format: int32
    minimum: '1'
    location: query
  maxResults:
    type: integer
    description: Maximum number of events returned on one result page. By default
      the value is 250 events. The page size can never be larger than 2500 events.
      Optional.
    format: int32
    minimum: '1'
    location: query
  originalStart:
    type: string
    description: The original start time of the instance in the result. Optional.
    location: query
  pageToken:
    type: string
    description: Token specifying which result page to return. Optional.
    location: query
  showDeleted:
    type: boolean
    description: Whether to include deleted events (with status equals "cancelled")
      in the result. Cancelled instances of recurring events will still be included
      if singleEvents is False. Optional. The default is False.
    location: query
  timeMax:
    type: string
    description: Upper bound (exclusive) for an event's start time to filter by. Optional.
      The default is not to filter by start time. Must be an RFC3339 timestamp with
      mandatory time zone offset.
    format: date-time
    location: query
  timeMin:
    type: string
    description: Lower bound (inclusive) for an event's end time to filter by. Optional.
      The default is not to filter by end time. Must be an RFC3339 timestamp with
      mandatory time zone offset.
    format: date-time
    location: query
  timeZone:
    type: string
    description: Time zone used in the response. Optional. The default is the time
      zone of the calendar.
    location: query
response:
  $ref: Events
