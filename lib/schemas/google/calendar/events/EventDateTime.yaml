$schema: http://json-schema.org/draft-07/schema#
title: EventDateTime
description: ''
type: object
properties:
  date:
    type: string
    description: The date, in the format "yyyy-mm-dd", if this is an all-day event.
    format: date
  dateTime:
    type: string
    description: The time, as a combined date-time value (formatted according to RFC3339).
      A time zone offset is required unless a time zone is explicitly specified in
      timeZone.
    format: date-time
  timeZone:
    type: string
    description: The time zone in which the time is specified. (Formatted as an IANA
      Time Zone Database name, e.g. "Europe/Zurich".) For recurring events this field
      is required and specifies the time zone in which the recurrence is expanded.
      For single events this field is optional and indicates a custom time zone for
      the event start/end.
