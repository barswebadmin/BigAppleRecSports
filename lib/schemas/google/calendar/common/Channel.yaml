$schema: http://json-schema.org/draft-07/schema#
title: Channel
description: ''
type: object
properties:
  address:
    type: string
    description: The address where notifications are delivered for this channel.
  expiration:
    type: string
    description: Date and time of notification channel expiration, expressed as a
      Unix timestamp, in milliseconds. Optional.
    format: int64
  id:
    type: string
    description: A UUID or similar unique string that identifies this channel.
  kind:
    type: string
    description: Identifies this as a notification channel used to watch for changes
      to a resource, which is "api#channel".
    default: api#channel
  params:
    type: object
    description: Additional parameters controlling delivery channel behavior. Optional.
    additionalProperties:
      type: string
      description: Declares a new parameter by name.
  payload:
    type: boolean
    description: A Boolean value to indicate whether payload is wanted. Optional.
  resourceId:
    type: string
    description: An opaque ID that identifies the resource being watched on this channel.
      Stable across different API versions.
  resourceUri:
    type: string
    description: A version-specific identifier for the watched resource.
  token:
    type: string
    description: An arbitrary string delivered to the target address with each notification
      delivered over this channel. Optional.
  type:
    type: string
    description: The type of delivery mechanism used for this channel. Valid values
      are "web_hook" (or "webhook"). Both values refer to a channel where Http requests
      are used to deliver messages.
