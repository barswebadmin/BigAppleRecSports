$schema: http://json-schema.org/draft-07/schema#
title: FreeBusyRequest
description: ''
type: object
properties:
  calendarExpansionMax:
    type: integer
    description: Maximal number of calendars for which FreeBusy information is to
      be provided. Optional. Maximum value is 50.
    format: int32
  groupExpansionMax:
    type: integer
    description: Maximal number of calendar identifiers to be provided for a single
      group. Optional. An error is returned for a group with more members than this
      value. Maximum value is 100.
    format: int32
  items:
    type: array
    description: List of calendars and/or groups to query.
    items:
      $ref: FreeBusyRequestItem
  timeMax:
    type: string
    description: The end of the interval for the query formatted as per RFC3339.
    format: date-time
  timeMin:
    type: string
    description: The start of the interval for the query formatted as per RFC3339.
    format: date-time
  timeZone:
    type: string
    description: Time zone used in the response. Optional. The default is UTC.
    default: UTC
