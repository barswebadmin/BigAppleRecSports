$schema: http://json-schema.org/draft-07/schema#
title: CommentList
description: A list of comments on a file.
type: object
properties:
  kind:
    description: 'Identifies what kind of resource this is. Value: the fixed string
      `"drive#commentList"`.'
    default: drive#commentList
    type: string
  comments:
    description: The list of comments. If nextPageToken is populated, then this list
      may be incomplete and an additional page of results should be fetched.
    type: array
    items:
      $ref: Comment
  nextPageToken:
    description: The page token for the next page of comments. This will be absent
      if the end of the comments list has been reached. If the token is rejected for
      any reason, it should be discarded, and pagination should be restarted from
      the first page of results. The page token is typically valid for several hours.
      However, if new items are added or removed, your expected results might differ.
    type: string
