$schema: http://json-schema.org/draft-07/schema#
title: TeamDrive
description: 'Deprecated: use the drive collection instead.'
type: object
properties:
  id:
    description: The ID of this Team Drive which is also the ID of the top level folder
      of this Team Drive.
    type: string
  name:
    description: The name of this Team Drive.
    type: string
  colorRgb:
    description: The color of this Team Drive as an RGB hex string. It can only be
      set on a `drive.teamdrives.update` request that does not set `themeId`.
    type: string
  kind:
    description: 'Identifies what kind of resource this is. Value: the fixed string
      `"drive#teamDrive"`.'
    default: drive#teamDrive
    type: string
  backgroundImageLink:
    description: A short-lived link to this Team Drive's background image.
    type: string
  capabilities:
    description: Capabilities the current user has on this Team Drive.
    type: object
    properties:
      canAddChildren:
        description: Whether the current user can add children to folders in this
          Team Drive.
        type: boolean
      canComment:
        description: Whether the current user can comment on files in this Team Drive.
        type: boolean
      canCopy:
        description: Whether the current user can copy files in this Team Drive.
        type: boolean
      canDeleteTeamDrive:
        description: Whether the current user can delete this Team Drive. Attempting
          to delete the Team Drive may still fail if there are untrashed items inside
          the Team Drive.
        type: boolean
      canDownload:
        description: Whether the current user can download files in this Team Drive.
        type: boolean
      canEdit:
        description: Whether the current user can edit files in this Team Drive
        type: boolean
      canListChildren:
        description: Whether the current user can list the children of folders in
          this Team Drive.
        type: boolean
      canManageMembers:
        description: Whether the current user can add members to this Team Drive or
          remove them or change their role.
        type: boolean
      canReadRevisions:
        description: Whether the current user can read the revisions resource of files
          in this Team Drive.
        type: boolean
      canRemoveChildren:
        description: 'Deprecated: Use `canDeleteChildren` or `canTrashChildren` instead.'
        deprecated: true
        type: boolean
      canRename:
        description: Whether the current user can rename files or folders in this
          Team Drive.
        type: boolean
      canRenameTeamDrive:
        description: Whether the current user can rename this Team Drive.
        type: boolean
      canChangeTeamDriveBackground:
        description: Whether the current user can change the background of this Team
          Drive.
        type: boolean
      canShare:
        description: Whether the current user can share files or folders in this Team
          Drive.
        type: boolean
      canChangeCopyRequiresWriterPermissionRestriction:
        description: Whether the current user can change the `copyRequiresWriterPermission`
          restriction of this Team Drive.
        type: boolean
      canChangeDomainUsersOnlyRestriction:
        description: Whether the current user can change the `domainUsersOnly` restriction
          of this Team Drive.
        type: boolean
      canChangeSharingFoldersRequiresOrganizerPermissionRestriction:
        description: Whether the current user can change the `sharingFoldersRequiresOrganizerPermission`
          restriction of this Team Drive.
        type: boolean
      canChangeTeamMembersOnlyRestriction:
        description: Whether the current user can change the `teamMembersOnly` restriction
          of this Team Drive.
        type: boolean
      canDeleteChildren:
        description: Whether the current user can delete children from folders in
          this Team Drive.
        type: boolean
      canTrashChildren:
        description: Whether the current user can trash children from folders in this
          Team Drive.
        type: boolean
      canResetTeamDriveRestrictions:
        description: Whether the current user can reset the Team Drive restrictions
          to defaults.
        type: boolean
      canChangeDownloadRestriction:
        description: Whether the current user can change organizer-applied download
          restrictions of this shared drive.
        type: boolean
  themeId:
    description: The ID of the theme from which the background image and color will
      be set. The set of possible `teamDriveThemes` can be retrieved from a `drive.about.get`
      response. When not specified on a `drive.teamdrives.create` request, a random
      theme is chosen from which the background image and color are set. This is a
      write-only field; it can only be set on requests that don't set `colorRgb` or
      `backgroundImageFile`.
    type: string
  backgroundImageFile:
    description: An image file and cropping parameters from which a background image
      for this Team Drive is set. This is a write only field; it can only be set on
      `drive.teamdrives.update` requests that don't set `themeId`. When specified,
      all fields of the `backgroundImageFile` must be set.
    type: object
    properties:
      id:
        description: The ID of an image file in Drive to use for the background image.
        type: string
      xCoordinate:
        description: The X coordinate of the upper left corner of the cropping area
          in the background image. This is a value in the closed range of 0 to 1.
          This value represents the horizontal distance from the left side of the
          entire image to the left side of the cropping area divided by the width
          of the entire image.
        type: number
        format: float
      yCoordinate:
        description: The Y coordinate of the upper left corner of the cropping area
          in the background image. This is a value in the closed range of 0 to 1.
          This value represents the vertical distance from the top side of the entire
          image to the top side of the cropping area divided by the height of the
          entire image.
        type: number
        format: float
      width:
        description: The width of the cropped image in the closed range of 0 to 1.
          This value represents the width of the cropped image divided by the width
          of the entire image. The height is computed by applying a width to height
          aspect ratio of 80 to 9. The resulting image must be at least 1280 pixels
          wide and 144 pixels high.
        type: number
        format: float
  createdTime:
    description: The time at which the Team Drive was created (RFC 3339 date-time).
    type: string
    format: date-time
  restrictions:
    description: A set of restrictions that apply to this Team Drive or items inside
      this Team Drive.
    type: object
    properties:
      copyRequiresWriterPermission:
        description: Whether the options to copy, print, or download files inside
          this Team Drive, should be disabled for readers and commenters. When this
          restriction is set to `true`, it will override the similarly named field
          to `true` for any file inside this Team Drive.
        type: boolean
      domainUsersOnly:
        description: Whether access to this Team Drive and items inside this Team
          Drive is restricted to users of the domain to which this Team Drive belongs.
          This restriction may be overridden by other sharing policies controlled
          outside of this Team Drive.
        type: boolean
      teamMembersOnly:
        description: Whether access to items inside this Team Drive is restricted
          to members of this Team Drive.
        type: boolean
      adminManagedRestrictions:
        description: Whether administrative privileges on this Team Drive are required
          to modify restrictions.
        type: boolean
      sharingFoldersRequiresOrganizerPermission:
        description: If true, only users with the organizer role can share folders.
          If false, users with either the organizer role or the file organizer role
          can share folders.
        type: boolean
      downloadRestriction:
        description: Download restrictions applied by shared drive managers.
        $ref: DownloadRestriction
  orgUnitId:
    description: The organizational unit of this shared drive. This field is only
      populated on `drives.list` responses when the `useDomainAdminAccess` parameter
      is set to `true`.
    type: string
