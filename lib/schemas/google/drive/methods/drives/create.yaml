description: Creates a shared drive. For more information, see [Manage shared drives](https://developers.google.com/workspace/drive/api/guides/manage-shareddrives).
httpMethod: POST
path: drives
scopes:
- https://www.googleapis.com/auth/drive
request:
  $ref: Drive
parameters:
  requestId:
    description: Required. An ID, such as a random UUID, which uniquely identifies
      this user's request for idempotent creation of a shared drive. A repeated request
      by the same user and with the same request ID will avoid creating duplicates
      by attempting to create the same shared drive. If the shared drive already exists
      a 409 error will be returned.
    location: query
    required: true
    type: string
response:
  $ref: Drive
