description: Permanently deletes a file version. You can only delete revisions for
  files with binary content in Google Drive, like images or videos. Revisions for
  other files, like Google Docs or Sheets, and the last remaining file version can't
  be deleted. For more information, see [Manage file revisions](https://developers.google.com/drive/api/guides/manage-revisions).
httpMethod: DELETE
path: files/{fileId}/revisions/{revisionId}
scopes:
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/drive.appdata
- https://www.googleapis.com/auth/drive.file
parameters:
  fileId:
    description: The ID of the file.
    location: path
    required: true
    type: string
  revisionId:
    description: The ID of the revision.
    location: path
    required: true
    type: string
