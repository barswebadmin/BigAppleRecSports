description: Lists a file's revisions. For more information, see [Manage file revisions](https://developers.google.com/workspace/drive/api/guides/manage-revisions).
  **Important:** The list of revisions returned by this method might be incomplete
  for files with a large revision history, including frequently edited Google Docs,
  Sheets, and Slides. Older revisions might be omitted from the response, meaning
  the first revision returned may not be the oldest existing revision. The revision
  history visible in the Workspace editor user interface might be more complete than
  the list returned by the API.
httpMethod: GET
path: files/{fileId}/revisions
scopes:
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/drive.appdata
- https://www.googleapis.com/auth/drive.file
- https://www.googleapis.com/auth/drive.meet.readonly
- https://www.googleapis.com/auth/drive.metadata
- https://www.googleapis.com/auth/drive.metadata.readonly
- https://www.googleapis.com/auth/drive.photos.readonly
- https://www.googleapis.com/auth/drive.readonly
parameters:
  fileId:
    description: The ID of the file.
    location: path
    required: true
    type: string
  pageSize:
    description: The maximum number of revisions to return per page.
    default: '200'
    minimum: '1'
    maximum: '1000'
    location: query
    type: integer
    format: int32
  pageToken:
    description: The token for continuing a previous list request on the next page.
      This should be set to the value of 'nextPageToken' from the previous response.
    location: query
    type: string
response:
  $ref: RevisionList
