description: Exports a Google Workspace document to the requested MIME type and returns
  exported byte content. For more information, see [Download and export files](https://developers.google.com/workspace/drive/api/guides/manage-downloads).
  Note that the exported content is limited to 10 MB.
httpMethod: GET
path: files/{fileId}/export
scopes:
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/drive.file
- https://www.googleapis.com/auth/drive.meet.readonly
- https://www.googleapis.com/auth/drive.readonly
parameters:
  fileId:
    description: The ID of the file.
    location: path
    required: true
    type: string
  mimeType:
    description: Required. The MIME type of the format requested for this export.
      For a list of supported MIME types, see [Export MIME types for Google Workspace
      documents](/workspace/drive/api/guides/ref-export-formats).
    location: query
    required: true
    type: string
