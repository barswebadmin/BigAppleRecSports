$schema: http://json-schema.org/draft-07/schema#
title: Change
description: A change to a file or shared drive.
type: object
properties:
  kind:
    description: 'Identifies what kind of resource this is. Value: the fixed string
      `"drive#change"`.'
    default: drive#change
    type: string
  removed:
    description: Whether the file or shared drive has been removed from this list
      of changes, for example by deletion or loss of access.
    type: boolean
  file:
    description: The updated state of the file. Present if the type is file and the
      file has not been removed from this list of changes.
    $ref: File
  fileId:
    description: The ID of the file which has changed.
    type: string
  time:
    description: The time of this change (RFC 3339 date-time).
    type: string
    format: date-time
  driveId:
    description: The ID of the shared drive associated with this change.
    type: string
  type:
    description: 'Deprecated: Use `changeType` instead.'
    deprecated: true
    type: string
  teamDriveId:
    description: 'Deprecated: Use `driveId` instead.'
    deprecated: true
    type: string
  teamDrive:
    description: 'Deprecated: Use `drive` instead.'
    deprecated: true
    $ref: TeamDrive
  changeType:
    description: The type of the change. Possible values are `file` and `drive`.
    type: string
  drive:
    description: The updated state of the shared drive. Present if the changeType
      is drive, the user is still a member of the shared drive, and the shared drive
      has not been deleted.
    $ref: Drive
