$schema: http://json-schema.org/draft-07/schema#
title: ListAccessProposalsResponse
description: The response to an access proposal list request.
type: object
properties:
  accessProposals:
    description: The list of access proposals. This field is only populated in Drive
      API v3.
    type: array
    items:
      $ref: AccessProposal
  nextPageToken:
    description: The continuation token for the next page of results. This will be
      absent if the end of the results list has been reached. If the token is rejected
      for any reason, it should be discarded, and pagination should be restarted from
      the first page of results.
    type: string
