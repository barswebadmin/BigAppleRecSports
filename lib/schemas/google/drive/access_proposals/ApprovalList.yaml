$schema: http://json-schema.org/draft-07/schema#
title: ApprovalList
description: The response of an Approvals list request.
type: object
properties:
  kind:
    description: This is always drive#approvalList
    type: string
  items:
    description: The list of Approvals. If nextPageToken is populated, then this list
      may be incomplete and an additional page of results should be fetched.
    type: array
    items:
      $ref: Approval
  nextPageToken:
    description: The page token for the next page of Approvals. This will be absent
      if the end of the Approvals list has been reached. If the token is rejected
      for any reason, it should be discarded, and pagination should be restarted from
      the first page of results.
    type: string
