$schema: "http://json-schema.org/draft-07/schema#"
title: "Discount"
description: "Discount codes and promotional offers"
allOf:
  - $ref: "../primitives/dbRecordBase.yaml#/"
  - type: object
    properties:
      discountCode:
        type: string
        description: "User-facing discount code (e.g., 'EARLY10', 'STUDENT15')"

      shopifyDiscountId:
        type: string
        description: "Shopify discount ID if managed through Shopify"

      reason:
        type: string
        description: "Reason for the discount (e.g., 'Early bird registration', 'Student discount')"

      discountAmount:
        type: object
        properties:
          type:
            type: string
            enum: [percentage, amount]
            description: "Whether discount is a percentage or fixed amount"

          value:
            type: number
            minimum: 0
            description: "Percentage (0-100) or dollar amount value"

        required: [type, value]
        description: "Discount amount details"

      eligibilityDetails:
        type: object
        properties:
          start:
            type: string
            format: date-time
            description: "When this discount becomes valid"

          end:
            type: string
            format: date-time
            description: "When this discount expires"

          eligibleProducts:
            type: array
            items:
              allOf:
                - $ref: "../primitives/foreignKey.yaml#/"
                - properties:
                    table:
                      const: "products"
            description: "Array of product/program references this discount applies to (empty = all products)"

          eligibleMembers:
            type: array
            items:
              allOf:
                - $ref: "../primitives/foreignKey.yaml#/"
                - properties:
                    table:
                      const: "members"
            description: "Array of member references who can use this discount (empty = all members)"

          maximumUsesPerMember:
            type: integer
            minimum: 1
            description: "Maximum times each member can use this discount"

        required: [start, end, maximumUsesPerMember]
        description: "Eligibility and usage restrictions"

      status:
        type: string
        enum: [active, inactive, expired]
        default: active
        description: "Current status of the discount"

    required: [discountCode, reason, discountAmount, eligibilityDetails, status]

additionalProperties: true