query GetInventoryAtLocation($productId: ID!, $locationId: ID!) {
  product(id: $productId) {
    id
    variants(first: 100) {
      nodes {
        id
        inventoryItem {
          id
          inventoryLevel(locationId: $locationId) {
            quantities(names: ["available"]) {
              quantity
            }
          }
        }
      }
    }
  }
}
