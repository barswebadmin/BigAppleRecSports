query GetCustomers(
  $query: String
  $first: Int!
  $after: String
  $ordersFirst: Int = 5
) {
  customers(query: $query, first: $first, after: $after) {
    pageInfo {
      hasNextPage
      endCursor
    }
    nodes {
      id
      email
      phone
      firstName
      lastName
      displayName
      tags
      numberOfOrders
      orders(first: $ordersFirst, sortKey: PROCESSED_AT, reverse: true) {
        nodes {
          id
          name
          processedAt
          totalPriceSet {
            shopMoney {
              amount
              currencyCode
            }
          }
        }
      }
    }
  }
}
