query GetProduct($id: ID!) {
  product(id: $id) {
    id
    title
    handle
    status
    tags
    vendor
    descriptionHtml
    totalInventory
    variants(first: 100) {
      nodes {
        id
        title
        sku
        inventoryQuantity
        inventoryItem {
          id
        }
      }
    }
    media(first: 20) {
      nodes {
        id
        mediaContentType
        status
      }
    }
  }
}
