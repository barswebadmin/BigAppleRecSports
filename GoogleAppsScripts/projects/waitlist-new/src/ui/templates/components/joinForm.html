<!-- Join waitlist form -->
<div id="joinForm" class="form-section">
  <h2>Join the Waitlist</h2>
  <div id="joinMessage" class="message"></div>
  <form id="joinFormElement">
    <div class="form-group">
      <label for="firstName">First Name <span class="required">*</span></label>
      <input type="text" id="firstName" name="firstName" required>
    </div>
    <div class="form-group">
      <label for="lastName">Last Name <span class="required">*</span></label>
      <input type="text" id="lastName" name="lastName" required>
    </div>
    <div class="form-group">
      <label for="email">Email <span class="required">*</span></label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone">
    </div>
    <input type="hidden" name="productId" value="<?= this.productId ?>">
    <input type="hidden" name="league" value="<?= this.league ?>">
    <input type="hidden" name="source" value="<?= this.source ?>">
    <button type="submit" id="joinSubmit" class="primary-button">Join Waitlist</button>
    <button type="button" id="joinBack" class="back-button">← Back</button>
  </form>
</div>
