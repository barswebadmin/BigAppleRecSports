<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 12px; background: #f8f9fa; }

    #toolbar {
      padding: 8px 10px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #toolbar button {
      font-size: 11px;
      padding: 4px 8px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #fff;
    }
    #toolbar button:hover { background: #f0f0f0; }

    #status {
      padding: 6px 10px;
      font-size: 11px;
      color: #555;
      background: #fffbe6;
      border-bottom: 1px solid #e8d800;
      display: none;
    }
    #status.visible { display: block; }
    #status.error { background: #fff0f0; border-color: #f00; color: #c00; }
    #status.success { background: #f0fff0; border-color: #0a0; color: #060; }

    #content { overflow-x: hidden; }

    table { width: 100%; border-collapse: collapse; }
    th {
      background: #e8eaf6;
      padding: 6px 8px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      border-bottom: 2px solid #c5cae9;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    td { padding: 6px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
    tr:hover td { background: #f5f5f5; }

    .row-label { font-size: 11px; color: #333; line-height: 1.4; }
    .row-num { font-size: 10px; color: #999; }
    .product-link { font-size: 10px; color: #1565c0; }

    .btn-group { display: flex; gap: 4px; white-space: nowrap; }
    .btn {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 7px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-create  { background: #2e7d32; color: #fff; }
    .btn-update  { background: #1565c0; color: #fff; }
    .btn-delete  { background: #c62828; color: #fff; }
    .btn-create:not(:disabled):hover { background: #1b5e20; }
    .btn-update:not(:disabled):hover { background: #0d47a1; }
    .btn-delete:not(:disabled):hover { background: #b71c1c; }

    .loading { text-align: center; padding: 20px; color: #888; font-size: 12px; }
  </style>
</head>
<body>

<div id="toolbar">
  <strong>Actions</strong>
  <button onclick="loadRows()">↻ Refresh</button>
</div>
<div id="status"></div>
<div id="content">
  <div class="loading">Loading rows…</div>
</div>

<script>
  function setStatus(msg, type) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'visible' + (type ? ' ' + type : '');
  }
  function clearStatus() {
    var el = document.getElementById('status');
    el.className = '';
    el.textContent = '';
  }
  function setWorking(msg) { setStatus(msg || 'Working…'); }

  function loadRows() {
    document.getElementById('content').innerHTML = '<div class="loading">Loading rows…</div>';
    clearStatus();
    google.script.run
      .withSuccessHandler(renderRows)
      .withFailureHandler(function(err) {
        setStatus('Error loading rows: ' + err.message, 'error');
        document.getElementById('content').innerHTML = '';
      })
      .getSidebarRowData();
  }

  function renderRows(rows) {
    if (!rows || rows.length === 0) {
      document.getElementById('content').innerHTML = '<div class="loading">No data rows found.</div>';
      return;
    }

    var html = '<table><thead><tr><th>Row</th><th>League</th><th>Actions</th></tr></thead><tbody>';
    rows.forEach(function(r) {
      var hasProduct = r.hasProduct;
      var createDisabled = hasProduct ? ' disabled' : '';
      var actionDisabled = hasProduct ? '' : ' disabled';
      var linkHtml = hasProduct
        ? '<br><a class="product-link" href="' + r.productUrl + '" target="_blank">View product ↗</a>'
        : '';

      html += '<tr>';
      html += '<td><span class="row-num">' + r.row + '</span></td>';
      html += '<td><span class="row-label">' + escHtml(r.label) + '</span>' + linkHtml + '</td>';
      html += '<td><div class="btn-group">';
      html += '<button class="btn btn-create"' + createDisabled + ' onclick="doCreate(' + r.row + ')">Create</button>';
      html += '<button class="btn btn-update"' + actionDisabled + ' onclick="doUpdate(' + r.row + ')">Update</button>';
      html += '<button class="btn btn-delete"' + actionDisabled + ' onclick="doDelete(' + r.row + ')">Delete</button>';
      html += '</div></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('content').innerHTML = html;
    clearStatus();
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function doCreate(row) {
    if (!confirm('Create Shopify product for row ' + row + '?')) return;
    setWorking('Creating product for row ' + row + '…');
    google.script.run
      .withSuccessHandler(function() { setStatus('Done — check for alerts from the script.', 'success'); loadRows(); })
      .withFailureHandler(function(err) { setStatus('Error: ' + err.message, 'error'); })
      .sidebarCreateProduct(row);
  }

  function doUpdate(row) {
    if (!confirm('Update Shopify product for row ' + row + '? (Not yet implemented)')) return;
    setWorking('Updating…');
    google.script.run
      .withSuccessHandler(function() { setStatus('Done.', 'success'); })
      .withFailureHandler(function(err) { setStatus('Error: ' + err.message, 'error'); })
      .sidebarUpdateProduct(row);
  }

  function doDelete(row) {
    setWorking('Deleting…');
    google.script.run
      .withSuccessHandler(function() { setStatus('Done.', 'success'); loadRows(); })
      .withFailureHandler(function(err) { setStatus('Error: ' + err.message, 'error'); })
      .sidebarDeleteProduct(row);
  }

  loadRows();
</script>
</body>
</html>
