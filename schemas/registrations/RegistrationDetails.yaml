$schema: "http://json-schema.org/draft-07/schema#"
title: "RegistrationDetails"
description: "Program registration form fields and preferences"
allOf:
  - $ref: "../primitives/dbRecordBase.yaml#/"
  - type: object
    properties:

      programId:
        allOf:
          - $ref: "../primitives/foreignKey.yaml#/"
          - properties:
              table:
                const: "RegularSeason"
        description: "Foreign key reference to RegularSeason"

      registrationPeriod:
        type: string
        enum: [veteran, early, general, waitlist]

      playerExperience:
        type: object
        properties:
          selfRating:
            type: string
          hasPlayedThisSportWithBars:
            type: boolean
          hasPlayedThisSportElsewhere:
            type: boolean
          hasPlayedAnotherBarsSport:
            type: boolean

      buddyRequest:
        type: object
        properties:
          name:
            type: string
          emailAddress:
            type: string
            format: email
          registeredDivision:
            type: string

      refereeInterest:
        type: boolean

      socialChairInterest:
        type: boolean

      captainInterest:
        type: boolean

      mentorInterest:
        type: boolean

      pitcherInterest:
        type: boolean

      wtnbTeamInterest:
        type: boolean

      soberTeamInterest:
        type: boolean

      shirtSize:
        type: string
        enum: ["XS", "S", "M", "L", "XL", "XXL", "3XL", "4XL"]

    required: [programId, registrationPeriod]

additionalProperties: true