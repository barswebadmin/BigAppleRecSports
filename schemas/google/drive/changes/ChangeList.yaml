$schema: http://json-schema.org/draft-07/schema#
title: ChangeList
description: A list of changes for a user.
type: object
properties:
  kind:
    description: 'Identifies what kind of resource this is. Value: the fixed string
      `"drive#changeList"`.'
    default: drive#changeList
    type: string
  nextPageToken:
    description: The page token for the next page of changes. This will be absent
      if the end of the changes list has been reached. The page token doesn't expire.
    type: string
  newStartPageToken:
    description: The starting page token for future changes. This will be present
      only if the end of the current changes list has been reached. The page token
      doesn't expire.
    type: string
  changes:
    description: The list of changes. If nextPageToken is populated, then this list
      may be incomplete and an additional page of results should be fetched.
    type: array
    items:
      $ref: Change
