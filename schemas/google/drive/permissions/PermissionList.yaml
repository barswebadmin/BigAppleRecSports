$schema: http://json-schema.org/draft-07/schema#
title: PermissionList
description: A list of permissions for a file.
type: object
properties:
  nextPageToken:
    description: The page token for the next page of permissions. This field will
      be absent if the end of the permissions list has been reached. If the token
      is rejected for any reason, it should be discarded, and pagination should be
      restarted from the first page of results. The page token is typically valid
      for several hours. However, if new items are added or removed, your expected
      results might differ.
    type: string
  kind:
    description: 'Identifies what kind of resource this is. Value: the fixed string
      `"drive#permissionList"`.'
    default: drive#permissionList
    type: string
  permissions:
    description: The list of permissions. If `nextPageToken` is populated, then this
      list may be incomplete and an additional page of results should be fetched.
    type: array
    items:
      $ref: Permission
