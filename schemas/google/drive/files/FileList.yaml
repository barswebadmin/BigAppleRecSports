$schema: http://json-schema.org/draft-07/schema#
title: FileList
description: A list of files.
type: object
properties:
  nextPageToken:
    description: The page token for the next page of files. This will be absent if
      the end of the files list has been reached. If the token is rejected for any
      reason, it should be discarded, and pagination should be restarted from the
      first page of results. The page token is typically valid for several hours.
      However, if new items are added or removed, your expected results might differ.
    type: string
  kind:
    description: 'Identifies what kind of resource this is. Value: the fixed string
      `"drive#fileList"`.'
    default: drive#fileList
    type: string
  incompleteSearch:
    description: Whether the search process was incomplete. If true, then some search
      results might be missing, since all documents were not searched. This can occur
      when searching multiple drives with the `allDrives` corpora, but all corpora
      couldn't be searched. When this happens, it's suggested that clients narrow
      their query by choosing a different corpus such as `user` or `drive`.
    type: boolean
  files:
    description: The list of files. If `nextPageToken` is populated, then this list
      may be incomplete and an additional page of results should be fetched.
    type: array
    items:
      $ref: File
