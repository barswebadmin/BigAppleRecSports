$schema: http://json-schema.org/draft-07/schema#
title: Revision
description: The metadata for a revision to a file. Some resource methods (such as
  `revisions.update`) require a `revisionId`. Use the `revisions.list` method to retrieve
  the ID for a revision.
type: object
properties:
  id:
    description: Output only. The ID of the revision.
    type: string
  mimeType:
    description: Output only. The MIME type of the revision.
    type: string
  kind:
    description: 'Output only. Identifies what kind of resource this is. Value: the
      fixed string `"drive#revision"`.'
    default: drive#revision
    type: string
  published:
    description: Whether this revision is published. This is only applicable to Docs
      Editors files.
    type: boolean
  exportLinks:
    description: Output only. Links for exporting Docs Editors files to specific formats.
    type: object
    additionalProperties:
      type: string
  keepForever:
    description: Whether to keep this revision forever, even if it is no longer the
      head revision. If not set, the revision will be automatically purged 30 days
      after newer content is uploaded. This can be set on a maximum of 200 revisions
      for a file. This field is only applicable to files with binary content in Drive.
    type: boolean
  md5Checksum:
    description: Output only. The MD5 checksum of the revision's content. This is
      only applicable to files with binary content in Drive.
    type: string
  modifiedTime:
    description: The last time the revision was modified (RFC 3339 date-time).
    type: string
    format: date-time
  publishAuto:
    description: Whether subsequent revisions will be automatically republished. This
      is only applicable to Docs Editors files.
    type: boolean
  publishedOutsideDomain:
    description: Whether this revision is published outside the domain. This is only
      applicable to Docs Editors files.
    type: boolean
  publishedLink:
    description: Output only. A link to the published revision. This is only populated
      for Docs Editors files.
    type: string
  size:
    description: Output only. The size of the revision's content in bytes. This is
      only applicable to files with binary content in Drive.
    type: string
    format: int64
  originalFilename:
    description: Output only. The original filename used to create this revision.
      This is only applicable to files with binary content in Drive.
    type: string
  lastModifyingUser:
    description: Output only. The last user to modify this revision. This field is
      only populated when the last modification was performed by a signed-in user.
    $ref: User
