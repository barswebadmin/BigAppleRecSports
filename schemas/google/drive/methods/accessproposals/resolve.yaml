description: Approves or denies an access proposal. For more information, see [Manage
  pending access proposals](https://developers.google.com/workspace/drive/api/guides/pending-access).
httpMethod: POST
path: files/{fileId}/accessproposals/{proposalId}:resolve
scopes:
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/drive.file
request:
  $ref: ResolveAccessProposalRequest
parameters:
  fileId:
    description: Required. The ID of the item the request is on.
    location: path
    required: true
    type: string
  proposalId:
    description: Required. The ID of the access proposal to resolve.
    location: path
    required: true
    type: string
