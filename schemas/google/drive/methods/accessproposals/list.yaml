description: 'List the access proposals on a file. For more information, see [Manage
  pending access proposals](https://developers.google.com/workspace/drive/api/guides/pending-access).
  Note: Only approvers are able to list access proposals on a file. If the user isn''t
  an approver, a 403 error is returned.'
httpMethod: GET
path: files/{fileId}/accessproposals
scopes:
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/drive.file
- https://www.googleapis.com/auth/drive.metadata
- https://www.googleapis.com/auth/drive.metadata.readonly
- https://www.googleapis.com/auth/drive.readonly
parameters:
  fileId:
    description: Required. The ID of the item the request is on.
    location: path
    required: true
    type: string
  pageToken:
    description: Optional. The continuation token on the list of access requests.
    location: query
    type: string
  pageSize:
    description: Optional. The number of results per page.
    location: query
    type: integer
    format: int32
response:
  $ref: ListAccessProposalsResponse
