description: Lists the labels on a file. For more information, see [List labels on
  a file](https://developers.google.com/workspace/drive/api/guides/list-labels).
httpMethod: GET
path: files/{fileId}/listLabels
scopes:
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/drive.file
- https://www.googleapis.com/auth/drive.meet.readonly
- https://www.googleapis.com/auth/drive.metadata
- https://www.googleapis.com/auth/drive.metadata.readonly
- https://www.googleapis.com/auth/drive.readonly
parameters:
  fileId:
    description: The ID for the file.
    location: path
    required: true
    type: string
  maxResults:
    description: The maximum number of labels to return per page. When not set, defaults
      to 100.
    default: '100'
    minimum: '1'
    maximum: '100'
    location: query
    type: integer
    format: int32
  pageToken:
    description: The token for continuing a previous list request on the next page.
      This should be set to the value of `nextPageToken` from the previous response.
    location: query
    type: string
response:
  $ref: LabelList
