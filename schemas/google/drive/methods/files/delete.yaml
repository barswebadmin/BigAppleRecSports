description: Permanently deletes a file owned by the user without moving it to the
  trash. For more information, see [Trash or delete files and folders](https://developers.google.com/workspace/drive/api/guides/delete).
  If the file belongs to a shared drive, the user must be an `organizer` on the parent
  folder. If the target is a folder, all descendants owned by the user are also deleted.
httpMethod: DELETE
path: files/{fileId}
scopes:
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/drive.appdata
- https://www.googleapis.com/auth/drive.file
parameters:
  fileId:
    description: The ID of the file.
    location: path
    required: true
    type: string
  supportsAllDrives:
    description: Whether the requesting application supports both My Drives and shared
      drives.
    default: 'false'
    location: query
    type: boolean
  supportsTeamDrives:
    description: 'Deprecated: Use `supportsAllDrives` instead.'
    default: 'false'
    location: query
    deprecated: true
    type: boolean
  enforceSingleParent:
    description: 'Deprecated: If an item isn''t in a shared drive and its last parent
      is deleted but the item itself isn''t, the item will be placed under its owner''s
      root.'
    default: 'false'
    location: query
    deprecated: true
    type: boolean
