description: Lists a file's or shared drive's permissions. For more information, see
  [Share files, folders, and drives](https://developers.google.com/workspace/drive/api/guides/manage-sharing).
httpMethod: GET
path: files/{fileId}/permissions
scopes:
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/drive.file
- https://www.googleapis.com/auth/drive.meet.readonly
- https://www.googleapis.com/auth/drive.metadata
- https://www.googleapis.com/auth/drive.metadata.readonly
- https://www.googleapis.com/auth/drive.photos.readonly
- https://www.googleapis.com/auth/drive.readonly
parameters:
  fileId:
    description: The ID of the file or shared drive.
    location: path
    required: true
    type: string
  pageSize:
    description: The maximum number of permissions to return per page. When not set
      for files in a shared drive, at most 100 results will be returned. When not
      set for files that are not in a shared drive, the entire list will be returned.
    minimum: '1'
    maximum: '100'
    location: query
    type: integer
    format: int32
  pageToken:
    description: The token for continuing a previous list request on the next page.
      This should be set to the value of `nextPageToken` from the previous response.
    location: query
    type: string
  supportsAllDrives:
    description: Whether the requesting application supports both My Drives and shared
      drives.
    default: 'false'
    location: query
    type: boolean
  supportsTeamDrives:
    description: 'Deprecated: Use `supportsAllDrives` instead.'
    default: 'false'
    location: query
    deprecated: true
    type: boolean
  useDomainAdminAccess:
    description: 'Issue the request as a domain administrator. If set to `true`, and
      if the following additional conditions are met, the requester is granted access:
      1. The file ID parameter refers to a shared drive. 2. The requester is an administrator
      of the domain to which the shared drive belongs. For more information, see [Manage
      shared drives as domain administrators](https://developers.google.com/workspace/drive/api/guides/manage-shareddrives#manage-administrators).'
    default: 'false'
    location: query
    type: boolean
  includePermissionsForView:
    description: Specifies which additional view's permissions to include in the response.
      Only `published` is supported.
    location: query
    type: string
response:
  $ref: PermissionList
