description: Gets a revision's metadata or content by ID. For more information, see
  [Manage file revisions](https://developers.google.com/workspace/drive/api/guides/manage-revisions).
httpMethod: GET
path: files/{fileId}/revisions/{revisionId}
scopes:
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/drive.appdata
- https://www.googleapis.com/auth/drive.file
- https://www.googleapis.com/auth/drive.meet.readonly
- https://www.googleapis.com/auth/drive.metadata
- https://www.googleapis.com/auth/drive.metadata.readonly
- https://www.googleapis.com/auth/drive.photos.readonly
- https://www.googleapis.com/auth/drive.readonly
parameters:
  fileId:
    description: The ID of the file.
    location: path
    required: true
    type: string
  revisionId:
    description: The ID of the revision.
    location: path
    required: true
    type: string
  acknowledgeAbuse:
    description: Whether the user is acknowledging the risk of downloading known malware
      or other abusive files. This is only applicable when the `alt` parameter is
      set to `media` and the user is the owner of the file or an organizer of the
      shared drive in which the file resides.
    default: 'false'
    location: query
    type: boolean
response:
  $ref: Revision
