$schema: http://json-schema.org/draft-07/schema#
title: Border
description: A border along a cell.
type: object
properties:
  width:
    description: The width of the border, in pixels. Deprecated; the width is determined
      by the "style" field.
    deprecated: true
    format: int32
    type: integer
  style:
    enumDescriptions:
    - The style is not specified. Do not use this.
    - The border is dotted.
    - The border is dashed.
    - The border is a thin solid line.
    - The border is a medium solid line.
    - The border is a thick solid line.
    - No border. Used only when updating a border in order to erase it.
    - The border is two solid lines.
    type: string
    description: The style of the border.
    enum:
    - STYLE_UNSPECIFIED
    - DOTTED
    - DASHED
    - SOLID
    - SOLID_MEDIUM
    - SOLID_THICK
    - NONE
    - DOUBLE
  color:
    description: 'The color of the border. Deprecated: Use color_style.'
    deprecated: true
    $ref: Color
  colorStyle:
    $ref: ColorStyle
    description: The color of the border. If color is also set, this field takes precedence.
