$schema: http://json-schema.org/draft-07/schema#
title: IterativeCalculationSettings
description: Settings to control how circular dependencies are resolved with iterative
  calculation.
type: object
properties:
  maxIterations:
    description: When iterative calculation is enabled, the maximum number of calculation
      rounds to perform.
    format: int32
    type: integer
  convergenceThreshold:
    description: When iterative calculation is enabled and successive results differ
      by less than this threshold value, the calculation rounds stop.
    format: double
    type: number
