$schema: http://json-schema.org/draft-07/schema#
title: SheetProperties
description: Properties of a sheet.
type: object
properties:
  sheetId:
    type: integer
    description: The ID of the sheet. Must be non-negative. This field cannot be changed
      once set.
    format: int32
  index:
    type: integer
    description: The index of the sheet within the spreadsheet. When adding or updating
      sheet properties, if this field is excluded then the sheet is added or moved
      to the end of the sheet list. When updating sheet indices or inserting sheets,
      movement is considered in "before the move" indexes. For example, if there were
      three sheets (S1, S2, S3) in order to move S1 ahead of S2 the index would have
      to be set to 2. A sheet index update request is ignored if the requested index
      is identical to the sheets current index or if the requested new index is equal
      to the current sheet index + 1.
    format: int32
  gridProperties:
    $ref: GridProperties
    description: Additional properties of the sheet if this sheet is a grid. (If the
      sheet is an object sheet, containing a chart or image, then this field will
      be absent.) When writing it is an error to set any grid properties on non-grid
      sheets. If this sheet is a DATA_SOURCE sheet, this field is output only but
      contains the properties that reflect how a data source sheet is rendered in
      the UI, e.g. row_count.
  title:
    type: string
    description: The name of the sheet.
  tabColorStyle:
    $ref: ColorStyle
    description: The color of the tab in the UI. If tab_color is also set, this field
      takes precedence.
  tabColor:
    $ref: Color
    description: 'The color of the tab in the UI. Deprecated: Use tab_color_style.'
    deprecated: true
  rightToLeft:
    description: True if the sheet is an RTL sheet instead of an LTR sheet.
    type: boolean
  sheetType:
    enum:
    - SHEET_TYPE_UNSPECIFIED
    - GRID
    - OBJECT
    - DATA_SOURCE
    description: The type of sheet. Defaults to GRID. This field cannot be changed
      once set.
    type: string
    enumDescriptions:
    - Default value, do not use.
    - The sheet is a grid.
    - The sheet has no grid and instead has an object like a chart or image.
    - The sheet connects with an external DataSource and shows the preview of data.
  hidden:
    description: True if the sheet is hidden in the UI, false if it's visible.
    type: boolean
  dataSourceSheetProperties:
    readOnly: true
    description: Output only. If present, the field contains DATA_SOURCE sheet specific
      properties.
    $ref: DataSourceSheetProperties
