$schema: http://json-schema.org/draft-07/schema#
title: DataSourceTable
description: A data source table, which allows the user to import a static table of
  data from the DataSource into Sheets. This is also known as "Extract" in the Sheets
  editor.
type: object
properties:
  filterSpecs:
    description: Filter specifications in the data source table.
    items:
      $ref: FilterSpec
    type: array
  sortSpecs:
    description: Sort specifications in the data source table. The result of the data
      source table is sorted based on the sort specifications in order.
    items:
      $ref: SortSpec
    type: array
  dataSourceId:
    type: string
    description: The ID of the data source the data source table is associated with.
  rowLimit:
    type: integer
    description: The limit of rows to return. If not set, a default limit is applied.
      Please refer to the Sheets editor for the default and max limit.
    format: int32
  dataExecutionStatus:
    readOnly: true
    $ref: DataExecutionStatus
    description: Output only. The data execution status.
  columnSelectionType:
    type: string
    enumDescriptions:
    - The default column selection type, do not use.
    - Select columns specified by columns field.
    - Sync all current and future columns in the data source. If set, the data source
      table fetches all the columns in the data source at the time of refresh.
    enum:
    - DATA_SOURCE_TABLE_COLUMN_SELECTION_TYPE_UNSPECIFIED
    - SELECTED
    - SYNC_ALL
    description: The type to select columns for the data source table. Defaults to
      SELECTED.
  columns:
    description: Columns selected for the data source table. The column_selection_type
      must be SELECTED.
    items:
      $ref: DataSourceColumnReference
    type: array
