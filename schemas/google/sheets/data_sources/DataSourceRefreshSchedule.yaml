$schema: http://json-schema.org/draft-07/schema#
title: DataSourceRefreshSchedule
description: Schedule for refreshing the data source. Data sources in the spreadsheet
  are refreshed within a time interval. You can specify the start time by clicking
  the Scheduled Refresh button in the Sheets editor, but the interval is fixed at
  4 hours. For example, if you specify a start time of 8 AM , the refresh will take
  place between 8 AM and 12 PM every day.
type: object
properties:
  enabled:
    description: True if the refresh schedule is enabled, or false otherwise.
    type: boolean
  refreshScope:
    enum:
    - DATA_SOURCE_REFRESH_SCOPE_UNSPECIFIED
    - ALL_DATA_SOURCES
    description: The scope of the refresh. Must be ALL_DATA_SOURCES.
    type: string
    enumDescriptions:
    - Default value, do not use.
    - Refreshes all data sources and their associated data source objects in the spreadsheet.
  weeklySchedule:
    description: Weekly refresh schedule.
    $ref: DataSourceRefreshWeeklySchedule
  dailySchedule:
    description: Daily refresh schedule.
    $ref: DataSourceRefreshDailySchedule
  monthlySchedule:
    description: Monthly refresh schedule.
    $ref: DataSourceRefreshMonthlySchedule
  nextRun:
    readOnly: true
    description: Output only. The time interval of the next run.
    $ref: Interval
