$schema: http://json-schema.org/draft-07/schema#
title: DataSourceSheetProperties
description: Additional properties of a DATA_SOURCE sheet.
type: object
properties:
  dataExecutionStatus:
    description: The data execution status.
    $ref: DataExecutionStatus
  dataSourceId:
    description: ID of the DataSource the sheet is connected to.
    type: string
  columns:
    description: The columns displayed on the sheet, corresponding to the values in
      RowData.
    items:
      $ref: DataSourceColumn
    type: array
