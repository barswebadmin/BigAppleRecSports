$schema: http://json-schema.org/draft-07/schema#
title: DataSourceRefreshDailySchedule
description: A schedule for data to refresh every day in a given time interval.
type: object
properties:
  startTime:
    $ref: TimeOfDay
    description: The start time of a time interval in which a data source refresh
      is scheduled. Only `hours` part is used. The time interval size defaults to
      that in the Sheets editor.
