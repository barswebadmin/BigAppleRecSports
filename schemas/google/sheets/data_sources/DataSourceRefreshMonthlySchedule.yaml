$schema: http://json-schema.org/draft-07/schema#
title: DataSourceRefreshMonthlySchedule
description: A monthly schedule for data to refresh on specific days in the month
  in a given time interval.
type: object
properties:
  startTime:
    description: The start time of a time interval in which a data source refresh
      is scheduled. Only `hours` part is used. The time interval size defaults to
      that in the Sheets editor.
    $ref: TimeOfDay
  daysOfMonth:
    type: array
    description: Days of the month to refresh. Only 1-28 are supported, mapping to
      the 1st to the 28th day. At least one day must be specified.
    items:
      format: int32
      type: integer
