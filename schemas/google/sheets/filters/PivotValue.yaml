$schema: http://json-schema.org/draft-07/schema#
title: PivotValue
description: The definition of how a value in a pivot table should be calculated.
type: object
properties:
  sourceColumnOffset:
    description: The column offset of the source range that this value reads from.
      For example, if the source was `C10:E15`, a `sourceColumnOffset` of `0` means
      this value refers to column `C`, whereas the offset `1` would refer to column
      `D`.
    format: int32
    type: integer
  name:
    type: string
    description: A name to use for the value.
  formula:
    description: A custom formula to calculate the value. The formula must start with
      an `=` character.
    type: string
  dataSourceColumnReference:
    description: The reference to the data source column that this value reads from.
    $ref: DataSourceColumnReference
  calculatedDisplayType:
    description: If specified, indicates that pivot values should be displayed as
      the result of a calculation with another pivot value. For example, if calculated_display_type
      is specified as PERCENT_OF_GRAND_TOTAL, all the pivot values are displayed as
      the percentage of the grand total. In the Sheets editor, this is referred to
      as "Show As" in the value section of a pivot table.
    enum:
    - PIVOT_VALUE_CALCULATED_DISPLAY_TYPE_UNSPECIFIED
    - PERCENT_OF_ROW_TOTAL
    - PERCENT_OF_COLUMN_TOTAL
    - PERCENT_OF_GRAND_TOTAL
    enumDescriptions:
    - Default value, do not use.
    - Shows the pivot values as percentage of the row total values.
    - Shows the pivot values as percentage of the column total values.
    - Shows the pivot values as percentage of the grand total values.
    type: string
  summarizeFunction:
    description: A function to summarize the value. If formula is set, the only supported
      values are SUM and CUSTOM. If sourceColumnOffset is set, then `CUSTOM` is not
      supported.
    enum:
    - PIVOT_STANDARD_VALUE_FUNCTION_UNSPECIFIED
    - SUM
    - COUNTA
    - COUNT
    - COUNTUNIQUE
    - AVERAGE
    - MAX
    - MIN
    - MEDIAN
    - PRODUCT
    - STDEV
    - STDEVP
    - VAR
    - VARP
    - CUSTOM
    - NONE
    enumDescriptions:
    - The default, do not use.
    - Corresponds to the `SUM` function.
    - Corresponds to the `COUNTA` function.
    - Corresponds to the `COUNT` function.
    - Corresponds to the `COUNTUNIQUE` function.
    - Corresponds to the `AVERAGE` function.
    - Corresponds to the `MAX` function.
    - Corresponds to the `MIN` function.
    - Corresponds to the `MEDIAN` function.
    - Corresponds to the `PRODUCT` function.
    - Corresponds to the `STDEV` function.
    - Corresponds to the `STDEVP` function.
    - Corresponds to the `VAR` function.
    - Corresponds to the `VARP` function.
    - Indicates the formula should be used as-is. Only valid if PivotValue.formula
      was set.
    - Indicates that the value is already summarized, and the summarization function
      is not explicitly specified. Used for Looker data source pivot tables where
      the value is already summarized.
    type: string
