$schema: http://json-schema.org/draft-07/schema#
title: FilterCriteria
description: Criteria for showing or hiding rows in a filter or filter view.
type: object
properties:
  condition:
    description: A condition that must be `true` for values to be shown. (This does
      not override hidden_values -- if a value is listed there, it will still be hidden.)
    $ref: BooleanCondition
  visibleBackgroundColor:
    description: 'The background fill color to filter by; only cells with this fill
      color are shown. Mutually exclusive with visible_foreground_color. Deprecated:
      Use visible_background_color_style.'
    deprecated: true
    $ref: Color
  visibleBackgroundColorStyle:
    $ref: ColorStyle
    description: The background fill color to filter by; only cells with this fill
      color are shown. This field is mutually exclusive with visible_foreground_color,
      and must be set to an RGB-type color. If visible_background_color is also set,
      this field takes precedence.
  hiddenValues:
    description: Values that should be hidden.
    items:
      type: string
    type: array
  visibleForegroundColor:
    $ref: Color
    description: 'The foreground color to filter by; only cells with this foreground
      color are shown. Mutually exclusive with visible_background_color. Deprecated:
      Use visible_foreground_color_style.'
    deprecated: true
  visibleForegroundColorStyle:
    description: The foreground color to filter by; only cells with this foreground
      color are shown. This field is mutually exclusive with visible_background_color,
      and must be set to an RGB-type color. If visible_foreground_color is also set,
      this field takes precedence.
    $ref: ColorStyle
