$schema: http://json-schema.org/draft-07/schema#
title: PivotGroupSortValueBucket
description: Information about which values in a pivot group should be used for sorting.
type: object
properties:
  valuesIndex:
    type: integer
    description: The offset in the PivotTable.values list which the values in this
      grouping should be sorted by.
    format: int32
  buckets:
    type: array
    description: Determines the bucket from which values are chosen to sort. For example,
      in a pivot table with one row group & two column groups, the row group can list
      up to two values. The first value corresponds to a value within the first column
      group, and the second value corresponds to a value in the second column group.
      If no values are listed, this would indicate that the row should be sorted according
      to the "Grand Total" over the column groups. If a single value is listed, this
      would correspond to using the "Total" of that bucket.
    items:
      $ref: ExtendedValue
