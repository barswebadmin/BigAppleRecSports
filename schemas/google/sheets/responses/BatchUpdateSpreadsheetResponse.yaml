$schema: http://json-schema.org/draft-07/schema#
title: BatchUpdateSpreadsheetResponse
description: The reply for batch updating a spreadsheet.
type: object
properties:
  updatedSpreadsheet:
    $ref: Spreadsheet
    description: The spreadsheet after updates were applied. This is only set if BatchUpdateSpreadsheetRequest.include_spreadsheet_in_response
      is `true`.
  spreadsheetId:
    description: The spreadsheet the updates were applied to.
    type: string
  replies:
    type: array
    description: The reply of the updates. This maps 1:1 with the updates, although
      replies to some requests may be empty.
    items:
      $ref: Response
