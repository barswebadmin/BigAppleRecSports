$schema: http://json-schema.org/draft-07/schema#
title: GridRange
description: 'A range on a sheet. All indexes are zero-based. Indexes are half open,
  i.e. the start index is inclusive and the end index is exclusive -- [start_index,
  end_index). Missing indexes indicate the range is unbounded on that side. For example,
  if `"Sheet1"` is sheet ID 123456, then: `Sheet1!A1:A1 == sheet_id: 123456, start_row_index:
  0, end_row_index: 1, start_column_index: 0, end_column_index: 1` `Sheet1!A3:B4 ==
  sheet_id: 123456, start_row_index: 2, end_row_index: 4, start_column_index: 0, end_column_index:
  2` `Sheet1!A:B == sheet_id: 123456, start_column_index: 0, end_column_index: 2`
  `Sheet1!A5:B == sheet_id: 123456, start_row_index: 4, start_column_index: 0, end_column_index:
  2` `Sheet1 == sheet_id: 123456` The start index must always be less than or equal
  to the end index. If the start index equals the end index, then the range is empty.
  Empty ranges are typically not meaningful and are usually rendered in the UI as
  `#REF!`.'
type: object
properties:
  startRowIndex:
    description: The start row (inclusive) of the range, or not set if unbounded.
    format: int32
    type: integer
  sheetId:
    description: The sheet this range is on.
    format: int32
    type: integer
  endRowIndex:
    type: integer
    description: The end row (exclusive) of the range, or not set if unbounded.
    format: int32
  startColumnIndex:
    description: The start column (inclusive) of the range, or not set if unbounded.
    format: int32
    type: integer
  endColumnIndex:
    type: integer
    description: The end column (exclusive) of the range, or not set if unbounded.
    format: int32
