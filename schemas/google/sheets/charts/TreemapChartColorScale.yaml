$schema: http://json-schema.org/draft-07/schema#
title: TreemapChartColorScale
description: A color scale for a treemap chart.
type: object
properties:
  minValueColorStyle:
    description: 'The background color for cells with a color value less than or equal
      to minValue. Defaults to #dc3912 if not specified. If min_value_color is also
      set, this field takes precedence.'
    $ref: ColorStyle
  midValueColor:
    description: 'The background color for cells with a color value at the midpoint
      between minValue and maxValue. Defaults to #efe6dc if not specified. Deprecated:
      Use mid_value_color_style.'
    deprecated: true
    $ref: Color
  midValueColorStyle:
    description: 'The background color for cells with a color value at the midpoint
      between minValue and maxValue. Defaults to #efe6dc if not specified. If mid_value_color
      is also set, this field takes precedence.'
    $ref: ColorStyle
  maxValueColor:
    $ref: Color
    description: 'The background color for cells with a color value greater than or
      equal to maxValue. Defaults to #109618 if not specified. Deprecated: Use max_value_color_style.'
    deprecated: true
  minValueColor:
    description: 'The background color for cells with a color value less than or equal
      to minValue. Defaults to #dc3912 if not specified. Deprecated: Use min_value_color_style.'
    deprecated: true
    $ref: Color
  maxValueColorStyle:
    $ref: ColorStyle
    description: 'The background color for cells with a color value greater than or
      equal to maxValue. Defaults to #109618 if not specified. If max_value_color
      is also set, this field takes precedence.'
  noDataColorStyle:
    description: 'The background color for cells that have no color data associated
      with them. Defaults to #000000 if not specified. If no_data_color is also set,
      this field takes precedence.'
    $ref: ColorStyle
  noDataColor:
    $ref: Color
    description: 'The background color for cells that have no color data associated
      with them. Defaults to #000000 if not specified. Deprecated: Use no_data_color_style.'
    deprecated: true
