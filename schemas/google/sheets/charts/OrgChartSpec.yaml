$schema: http://json-schema.org/draft-07/schema#
title: OrgChartSpec
description: An org chart. Org charts require a unique set of labels in labels and
  may optionally include parent_labels and tooltips. parent_labels contain, for each
  node, the label identifying the parent node. tooltips contain, for each node, an
  optional tooltip. For example, to describe an OrgChart with Alice as the CEO, Bob
  as the President (reporting to Alice) and Cathy as VP of Sales (also reporting to
  Alice), have labels contain "Alice", "Bob", "Cathy", parent_labels contain "", "Alice",
  "Alice" and tooltips contain "CEO", "President", "VP Sales".
type: object
properties:
  nodeColor:
    description: 'The color of the org chart nodes. Deprecated: Use node_color_style.'
    deprecated: true
    $ref: Color
  parentLabels:
    $ref: ChartData
    description: The data containing the label of the parent for the corresponding
      node. A blank value indicates that the node has no parent and is a top-level
      node. This field is optional.
  tooltips:
    description: The data containing the tooltip for the corresponding node. A blank
      value results in no tooltip being displayed for the node. This field is optional.
    $ref: ChartData
  selectedNodeColor:
    description: 'The color of the selected org chart nodes. Deprecated: Use selected_node_color_style.'
    deprecated: true
    $ref: Color
  nodeColorStyle:
    description: The color of the org chart nodes. If node_color is also set, this
      field takes precedence.
    $ref: ColorStyle
  selectedNodeColorStyle:
    description: The color of the selected org chart nodes. If selected_node_color
      is also set, this field takes precedence.
    $ref: ColorStyle
  labels:
    description: The data containing the labels for all the nodes in the chart. Labels
      must be unique.
    $ref: ChartData
  nodeSize:
    enumDescriptions:
    - Default value, do not use.
    - The small org chart node size.
    - The medium org chart node size.
    - The large org chart node size.
    type: string
    description: The size of the org chart nodes.
    enum:
    - ORG_CHART_LABEL_SIZE_UNSPECIFIED
    - SMALL
    - MEDIUM
    - LARGE
