$schema: http://json-schema.org/draft-07/schema#
title: ChartAxisViewWindowOptions
description: The options that define a "view window" for a chart (such as the visible
  values in an axis).
type: object
properties:
  viewWindowMin:
    type: number
    description: The minimum numeric value to be shown in this view window. If unset,
      will automatically determine a minimum value that looks good for the data.
    format: double
  viewWindowMax:
    type: number
    description: The maximum numeric value to be shown in this view window. If unset,
      will automatically determine a maximum value that looks good for the data.
    format: double
  viewWindowMode:
    enumDescriptions:
    - The default view window mode used in the Sheets editor for this chart type.
      In most cases, if set, the default mode is equivalent to `PRETTY`.
    - Do not use. Represents that the currently set mode is not supported by the API.
    - Follows the min and max exactly if specified. If a value is unspecified, it
      will fall back to the `PRETTY` value.
    - Chooses a min and max that make the chart look good. Both min and max are ignored
      in this mode.
    type: string
    description: The view window's mode.
    enum:
    - DEFAULT_VIEW_WINDOW_MODE
    - VIEW_WINDOW_MODE_UNSUPPORTED
    - EXPLICIT
    - PRETTY
