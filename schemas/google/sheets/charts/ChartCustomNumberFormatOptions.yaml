$schema: http://json-schema.org/draft-07/schema#
title: ChartCustomNumberFormatOptions
description: Custom number formatting options for chart attributes.
type: object
properties:
  prefix:
    type: string
    description: Custom prefix to be prepended to the chart attribute. This field
      is optional.
  suffix:
    type: string
    description: Custom suffix to be appended to the chart attribute. This field is
      optional.
