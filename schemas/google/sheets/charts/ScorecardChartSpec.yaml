$schema: http://json-schema.org/draft-07/schema#
title: ScorecardChartSpec
description: A scorecard chart. Scorecard charts are used to highlight key performance
  indicators, known as KPIs, on the spreadsheet. A scorecard chart can represent things
  like total sales, average cost, or a top selling item. You can specify a single
  data value, or aggregate over a range of data. Percentage or absolute difference
  from a baseline value can be highlighted, like changes over time.
type: object
properties:
  baselineValueData:
    $ref: ChartData
    description: The data for scorecard baseline value. This field is optional.
  aggregateType:
    type: string
    enumDescriptions:
    - Default value, do not use.
    - Average aggregate function.
    - Count aggregate function.
    - Maximum aggregate function.
    - Median aggregate function.
    - Minimum aggregate function.
    - Sum aggregate function.
    enum:
    - CHART_AGGREGATE_TYPE_UNSPECIFIED
    - AVERAGE
    - COUNT
    - MAX
    - MEDIAN
    - MIN
    - SUM
    description: The aggregation type for key and baseline chart data in scorecard
      chart. This field is not supported for data source charts. Use the ChartData.aggregateType
      field of the key_value_data or baseline_value_data instead for data source charts.
      This field is optional.
  scaleFactor:
    description: Value to scale scorecard key and baseline value. For example, a factor
      of 10 can be used to divide all values in the chart by 10. This field is optional.
    format: double
    type: number
  numberFormatSource:
    description: The number format source used in the scorecard chart. This field
      is optional.
    enum:
    - CHART_NUMBER_FORMAT_SOURCE_UNDEFINED
    - FROM_DATA
    - CUSTOM
    enumDescriptions:
    - Default value, do not use.
    - Inherit number formatting from data.
    - Apply custom formatting as specified by ChartCustomNumberFormatOptions.
    type: string
  customFormatOptions:
    $ref: ChartCustomNumberFormatOptions
    description: Custom formatting options for numeric key/baseline values in scorecard
      chart. This field is used only when number_format_source is set to CUSTOM. This
      field is optional.
  keyValueData:
    $ref: ChartData
    description: The data for scorecard key value.
  baselineValueFormat:
    description: Formatting options for baseline value. This field is needed only
      if baseline_value_data is specified.
    $ref: BaselineValueFormat
  keyValueFormat:
    $ref: KeyValueFormat
    description: Formatting options for key value.
