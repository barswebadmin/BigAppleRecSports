$schema: http://json-schema.org/draft-07/schema#
title: ChartHistogramRule
description: Allows you to organize numeric values in a source data column into buckets
  of constant size.
type: object
properties:
  maxValue:
    description: The maximum value at which items are placed into buckets. Values
      greater than the maximum are grouped into a single bucket. If omitted, it is
      determined by the maximum item value.
    format: double
    type: number
  minValue:
    description: The minimum value at which items are placed into buckets. Values
      that are less than the minimum are grouped into a single bucket. If omitted,
      it is determined by the minimum item value.
    format: double
    type: number
  intervalSize:
    type: number
    description: The size of the buckets that are created. Must be positive.
    format: double
