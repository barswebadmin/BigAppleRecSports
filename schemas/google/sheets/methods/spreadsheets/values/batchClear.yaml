description: Clears one or more ranges of values from a spreadsheet. The caller must
  specify the spreadsheet ID and one or more ranges. Only values are cleared -- all
  other properties of the cell (such as formatting and data validation) are kept.
httpMethod: POST
path: v4/spreadsheets/{spreadsheetId}/values:batchClear
scopes:
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/drive.file
- https://www.googleapis.com/auth/spreadsheets
request:
  $ref: BatchClearValuesRequest
parameters:
  spreadsheetId:
    required: true
    description: The ID of the spreadsheet to update.
    location: path
    type: string
response:
  $ref: BatchClearValuesResponse
