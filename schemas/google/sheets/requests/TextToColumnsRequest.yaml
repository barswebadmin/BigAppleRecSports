$schema: http://json-schema.org/draft-07/schema#
title: TextToColumnsRequest
description: Splits a column of text into multiple columns, based on a delimiter in
  each cell.
type: object
properties:
  source:
    description: The source data range. This must span exactly one column.
    $ref: GridRange
  delimiterType:
    type: string
    enumDescriptions:
    - Default value. This value must not be used.
    - '","'
    - '";"'
    - '"."'
    - '" "'
    - A custom value as defined in delimiter.
    - Automatically detect columns.
    enum:
    - DELIMITER_TYPE_UNSPECIFIED
    - COMMA
    - SEMICOLON
    - PERIOD
    - SPACE
    - CUSTOM
    - AUTODETECT
    description: The delimiter type to use.
  delimiter:
    type: string
    description: The delimiter to use. Used only if delimiterType is CUSTOM.
