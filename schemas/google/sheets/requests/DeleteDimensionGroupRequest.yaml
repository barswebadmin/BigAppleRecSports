$schema: http://json-schema.org/draft-07/schema#
title: DeleteDimensionGroupRequest
description: Deletes a group over the specified range by decrementing the depth of
  the dimensions in the range. For example, assume the sheet has a depth-1 group over
  B:E and a depth-2 group over C:D. Deleting a group over D:E leaves the sheet with
  a depth-1 group over B:D and a depth-2 group over C:C.
type: object
properties:
  range:
    description: The range of the group to be deleted.
    $ref: DimensionRange
