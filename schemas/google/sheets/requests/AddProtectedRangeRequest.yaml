$schema: http://json-schema.org/draft-07/schema#
title: AddProtectedRangeRequest
description: Adds a new protected range.
type: object
properties:
  protectedRange:
    $ref: ProtectedRange
    description: The protected range to be added. The protectedRangeId field is optional;
      if one is not set, an id will be randomly generated. (It is an error to specify
      the ID of a range that already exists.)
