$schema: http://json-schema.org/draft-07/schema#
title: FindReplaceRequest
description: Finds and replaces data in cells over a range, sheet, or all sheets.
type: object
properties:
  matchCase:
    description: True if the search is case sensitive.
    type: boolean
  replacement:
    description: The value to use as the replacement.
    type: string
  allSheets:
    type: boolean
    description: True to find/replace over all sheets.
  find:
    type: string
    description: The value to search.
  range:
    description: The range to find/replace over.
    $ref: GridRange
  matchEntireCell:
    type: boolean
    description: True if the find value should match the entire cell.
  searchByRegex:
    type: boolean
    description: True if the find value is a regex. The regular expression and replacement
      should follow Java regex rules at https://docs.oracle.com/javase/8/docs/api/java/util/regex/Pattern.html.
      The replacement string is allowed to refer to capturing groups. For example,
      if one cell has the contents `"Google Sheets"` and another has `"Google Docs"`,
      then searching for `"o.* (.*)"` with a replacement of `"$1 Rocks"` would change
      the contents of the cells to `"GSheets Rocks"` and `"GDocs Rocks"` respectively.
  sheetId:
    description: The sheet to find/replace over.
    format: int32
    type: integer
  includeFormulas:
    description: True if the search should include cells with formulas. False to skip
      cells with formulas.
    type: boolean
