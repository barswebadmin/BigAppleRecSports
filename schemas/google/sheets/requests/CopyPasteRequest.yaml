$schema: http://json-schema.org/draft-07/schema#
title: CopyPasteRequest
description: Copies data from the source to the destination.
type: object
properties:
  source:
    $ref: GridRange
    description: The source range to copy.
  destination:
    $ref: GridRange
    description: The location to paste to. If the range covers a span that's a multiple
      of the source's height or width, then the data will be repeated to fill in the
      destination range. If the range is smaller than the source range, the entire
      source data will still be copied (beyond the end of the destination range).
  pasteOrientation:
    type: string
    enumDescriptions:
    - Paste normally.
    - Paste transposed, where all rows become columns and vice versa.
    enum:
    - NORMAL
    - TRANSPOSE
    description: How that data should be oriented when pasting.
  pasteType:
    enum:
    - PASTE_NORMAL
    - PASTE_VALUES
    - PASTE_FORMAT
    - PASTE_NO_BORDERS
    - PASTE_FORMULA
    - PASTE_DATA_VALIDATION
    - PASTE_CONDITIONAL_FORMATTING
    description: What kind of data to paste.
    type: string
    enumDescriptions:
    - Paste values, formulas, formats, and merges.
    - Paste the values ONLY without formats, formulas, or merges.
    - Paste the format and data validation only.
    - Like `PASTE_NORMAL` but without borders.
    - Paste the formulas only.
    - Paste the data validation only.
    - Paste the conditional formatting rules only.
