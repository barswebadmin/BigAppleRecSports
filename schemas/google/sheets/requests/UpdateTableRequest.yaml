$schema: http://json-schema.org/draft-07/schema#
title: UpdateTableRequest
description: Updates a table in the spreadsheet.
type: object
properties:
  table:
    $ref: Table
    description: Required. The table to update.
  fields:
    description: Required. The fields that should be updated. At least one field must
      be specified. The root `table` is implied and should not be specified. A single
      `"*"` can be used as short-hand for listing every field.
    format: google-fieldmask
    type: string
