$schema: http://json-schema.org/draft-07/schema#
title: AddFilterViewRequest
description: Adds a filter view.
type: object
properties:
  filter:
    $ref: FilterView
    description: The filter to add. The filterViewId field is optional. If one is
      not set, an ID will be randomly generated. (It is an error to specify the ID
      of a filter that already exists.)
