$schema: http://json-schema.org/draft-07/schema#
title: UpdateDeveloperMetadataRequest
description: A request to update properties of developer metadata. Updates the properties
  of the developer metadata selected by the filters to the values provided in the
  DeveloperMetadata resource. Callers must specify the properties they wish to update
  in the fields parameter, as well as specify at least one DataFilter matching the
  metadata they wish to update.
type: object
properties:
  fields:
    type: string
    description: The fields that should be updated. At least one field must be specified.
      The root `developerMetadata` is implied and should not be specified. A single
      `"*"` can be used as short-hand for listing every field.
    format: google-fieldmask
  dataFilters:
    description: The filters matching the developer metadata entries to update.
    items:
      $ref: DataFilter
    type: array
  developerMetadata:
    description: The value that all metadata matched by the data filters will be updated
      to.
    $ref: DeveloperMetadata
