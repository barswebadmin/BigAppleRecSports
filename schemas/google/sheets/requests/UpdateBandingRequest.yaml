$schema: http://json-schema.org/draft-07/schema#
title: UpdateBandingRequest
description: Updates properties of the supplied banded range.
type: object
properties:
  bandedRange:
    description: The banded range to update with the new properties.
    $ref: BandedRange
  fields:
    type: string
    description: The fields that should be updated. At least one field must be specified.
      The root `bandedRange` is implied and should not be specified. A single `"*"`
      can be used as short-hand for listing every field.
    format: google-fieldmask
