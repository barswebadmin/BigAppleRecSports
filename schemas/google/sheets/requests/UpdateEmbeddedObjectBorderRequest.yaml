$schema: http://json-schema.org/draft-07/schema#
title: UpdateEmbeddedObjectBorderRequest
description: Updates an embedded object's border property.
type: object
properties:
  objectId:
    description: The ID of the embedded object to update.
    format: int32
    type: integer
  border:
    $ref: EmbeddedObjectBorder
    description: The border that applies to the embedded object.
  fields:
    type: string
    description: The fields that should be updated. At least one field must be specified.
      The root `border` is implied and should not be specified. A single `"*"` can
      be used as short-hand for listing every field.
    format: google-fieldmask
