$schema: http://json-schema.org/draft-07/schema#
title: AddNamedRangeRequest
description: Adds a named range to the spreadsheet.
type: object
properties:
  namedRange:
    description: The named range to add. The namedRangeId field is optional; if one
      is not set, an id will be randomly generated. (It is an error to specify the
      ID of a range that already exists.)
    $ref: NamedRange
