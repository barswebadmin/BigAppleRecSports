$schema: http://json-schema.org/draft-07/schema#
title: UpdateEmbeddedObjectPositionRequest
description: Update an embedded object's position (such as a moving or resizing a
  chart or image).
type: object
properties:
  objectId:
    description: The ID of the object to moved.
    format: int32
    type: integer
  newPosition:
    description: An explicit position to move the embedded object to. If newPosition.sheetId
      is set, a new sheet with that ID will be created. If newPosition.newSheet is
      set to true, a new sheet will be created with an ID that will be chosen for
      you.
    $ref: EmbeddedObjectPosition
  fields:
    description: The fields of OverlayPosition that should be updated when setting
      a new position. Used only if newPosition.overlayPosition is set, in which case
      at least one field must be specified. The root `newPosition.overlayPosition`
      is implied and should not be specified. A single `"*"` can be used as short-hand
      for listing every field.
    format: google-fieldmask
    type: string
