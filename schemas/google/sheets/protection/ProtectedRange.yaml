$schema: http://json-schema.org/draft-07/schema#
title: ProtectedRange
description: A protected range.
type: object
properties:
  protectedRangeId:
    description: The ID of the protected range. This field is read-only.
    format: int32
    type: integer
  tableId:
    description: The table this protected range is backed by, if any. When writing,
      only one of range or named_range_id or table_id may be set.
    type: string
  editors:
    $ref: Editors
    description: The users and groups with edit access to the protected range. This
      field is only visible to users with edit access to the protected range and the
      document. Editors are not supported with warning_only protection.
  range:
    description: The range that is being protected. The range may be fully unbounded,
      in which case this is considered a protected sheet. When writing, only one of
      range or named_range_id or table_id may be set.
    $ref: GridRange
  description:
    description: The description of this protected range.
    type: string
  warningOnly:
    description: 'True if this protected range will show a warning when editing. Warning-based
      protection means that every user can edit data in the protected range, except
      editing will prompt a warning asking the user to confirm the edit. When writing:
      if this field is true, then editors are ignored. Additionally, if this field
      is changed from true to false and the `editors` field is not set (nor included
      in the field mask), then the editors will be set to all the editors in the document.'
    type: boolean
  unprotectedRanges:
    description: The list of unprotected ranges within a protected sheet. Unprotected
      ranges are only supported on protected sheets.
    items:
      $ref: GridRange
    type: array
  requestingUserCanEdit:
    description: True if the user who requested this protected range can edit the
      protected area. This field is read-only.
    type: boolean
  namedRangeId:
    type: string
    description: The named range this protected range is backed by, if any. When writing,
      only one of range or named_range_id or table_id may be set.
