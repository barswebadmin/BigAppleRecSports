$schema: http://json-schema.org/draft-07/schema#
title: SmtpMsa
description: Configuration for communication with an SMTP service.
type: object
properties:
  host:
    description: The hostname of the SMTP service. Required.
    type: string
  port:
    description: The port of the SMTP service. Required.
    type: integer
    format: int32
  username:
    description: The username that will be used for authentication with the SMTP service.
      This is a write-only field that can be specified in requests to create or update
      SendAs settings; it is never populated in responses.
    type: string
  password:
    description: The password that will be used for authentication with the SMTP service.
      This is a write-only field that can be specified in requests to create or update
      SendAs settings; it is never populated in responses.
    type: string
  securityMode:
    description: The protocol that will be used to secure communication with the SMTP
      service. Required.
    type: string
    enumDescriptions:
    - Unspecified security mode.
    - Communication with the remote SMTP service is unsecured. Requires port 25.
    - Communication with the remote SMTP service is secured using SSL.
    - Communication with the remote SMTP service is secured using STARTTLS.
    enum:
    - securityModeUnspecified
    - none
    - ssl
    - starttls
