$schema: http://json-schema.org/draft-07/schema#
title: WatchRequest
description: Set up or update a new push notification watch on this user's mailbox.
type: object
properties:
  labelIds:
    description: List of label_ids to restrict notifications about. By default, if
      unspecified, all changes are pushed out. If specified then dictates which labels
      are required for a push notification to be generated.
    type: array
    items:
      type: string
  labelFilterAction:
    description: Filtering behavior of `labelIds list` specified. This field is deprecated
      because it caused incorrect behavior in some cases; use `label_filter_behavior`
      instead.
    deprecated: true
    type: string
    enumDescriptions:
    - Only get push notifications for message changes relating to labelIds specified.
    - Get push notifications for all message changes except those relating to labelIds
      specified.
    enum:
    - include
    - exclude
  labelFilterBehavior:
    description: Filtering behavior of `labelIds list` specified. This field replaces
      `label_filter_action`; if set, `label_filter_action` is ignored.
    type: string
    enumDescriptions:
    - Only get push notifications for message changes relating to labelIds specified.
    - Get push notifications for all message changes except those relating to labelIds
      specified.
    enum:
    - include
    - exclude
  topicName:
    description: A fully qualified Google Cloud Pub/Sub API topic name to publish
      the events to. This topic name **must** already exist in Cloud Pub/Sub and you
      **must** have already granted gmail "publish" permission on it. For example,
      "projects/my-project-identifier/topics/my-topic-name" (using the Cloud Pub/Sub
      "v1" topic naming format). Note that the "my-project-identifier" portion must
      exactly match your Google developer project id (the one executing this watch
      request).
    type: string
