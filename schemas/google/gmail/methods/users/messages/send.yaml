description: Sends the specified message to the recipients in the `To`, `Cc`, and
  `Bcc` headers. For example usage, see [Sending email](https://developers.google.com/workspace/gmail/api/guides/sending).
httpMethod: POST
path: gmail/v1/users/{userId}/messages/send
scopes:
- https://mail.google.com/
- https://www.googleapis.com/auth/gmail.addons.current.action.compose
- https://www.googleapis.com/auth/gmail.compose
- https://www.googleapis.com/auth/gmail.modify
- https://www.googleapis.com/auth/gmail.send
request:
  $ref: Message
parameters:
  userId:
    description: The user's email address. The special value `me` can be used to indicate
      the authenticated user.
    default: me
    location: path
    required: true
    type: string
response:
  $ref: Message
