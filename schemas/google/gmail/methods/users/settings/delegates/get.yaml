description: Gets the specified delegate. Note that a delegate user must be referred
  to by their primary email address, and not an email alias. This method is only available
  to service account clients that have been delegated domain-wide authority.
httpMethod: GET
path: gmail/v1/users/{userId}/settings/delegates/{delegateEmail}
scopes:
- https://mail.google.com/
- https://www.googleapis.com/auth/gmail.modify
- https://www.googleapis.com/auth/gmail.readonly
- https://www.googleapis.com/auth/gmail.settings.basic
parameters:
  userId:
    description: User's email address. The special value "me" can be used to indicate
      the authenticated user.
    default: me
    location: path
    required: true
    type: string
  delegateEmail:
    description: The email address of the user whose delegate relationship is to be
      retrieved.
    location: path
    required: true
    type: string
response:
  $ref: Delegate
