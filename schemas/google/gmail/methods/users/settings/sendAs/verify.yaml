description: Sends a verification email to the specified send-as alias address. The
  verification status must be `pending`. This method is only available to service
  account clients that have been delegated domain-wide authority.
httpMethod: POST
path: gmail/v1/users/{userId}/settings/sendAs/{sendAsEmail}/verify
scopes:
- https://www.googleapis.com/auth/gmail.settings.sharing
parameters:
  userId:
    description: User's email address. The special value "me" can be used to indicate
      the authenticated user.
    default: me
    location: path
    required: true
    type: string
  sendAsEmail:
    description: The send-as alias to be verified.
    location: path
    required: true
    type: string
