description: Deletes the specified send-as alias. Revokes any verification that may
  have been required for using it. This method is only available to service account
  clients that have been delegated domain-wide authority.
httpMethod: DELETE
path: gmail/v1/users/{userId}/settings/sendAs/{sendAsEmail}
scopes:
- https://www.googleapis.com/auth/gmail.settings.sharing
parameters:
  userId:
    description: User's email address. The special value "me" can be used to indicate
      the authenticated user.
    default: me
    location: path
    required: true
    type: string
  sendAsEmail:
    description: The send-as alias to be deleted.
    location: path
    required: true
    type: string
