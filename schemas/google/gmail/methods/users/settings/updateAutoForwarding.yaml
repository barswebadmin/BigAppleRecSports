description: Updates the auto-forwarding setting for the specified account. A verified
  forwarding address must be specified when auto-forwarding is enabled. This method
  is only available to service account clients that have been delegated domain-wide
  authority.
httpMethod: PUT
path: gmail/v1/users/{userId}/settings/autoForwarding
scopes:
- https://www.googleapis.com/auth/gmail.settings.sharing
request:
  $ref: AutoForwarding
parameters:
  userId:
    description: User's email address. The special value "me" can be used to indicate
      the authenticated user.
    default: me
    location: path
    required: true
    type: string
response:
  $ref: AutoForwarding
