description: Deletes the specified forwarding address and revokes any verification
  that may have been required. This method is only available to service account clients
  that have been delegated domain-wide authority.
httpMethod: DELETE
path: gmail/v1/users/{userId}/settings/forwardingAddresses/{forwardingEmail}
scopes:
- https://www.googleapis.com/auth/gmail.settings.sharing
parameters:
  userId:
    description: User's email address. The special value "me" can be used to indicate
      the authenticated user.
    default: me
    location: path
    required: true
    type: string
  forwardingEmail:
    description: The forwarding address to be deleted.
    location: path
    required: true
    type: string
