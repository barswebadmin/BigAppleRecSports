description: Turns on a client-side encryption key pair that was turned off. The key
  pair becomes active again for any associated client-side encryption identities.
  For administrators managing identities and keypairs for users in their organization,
  requests require authorization with a [service account](https://developers.google.com/identity/protocols/OAuth2ServiceAccount)
  that has [domain-wide delegation authority](https://developers.google.com/identity/protocols/OAuth2ServiceAccount#delegatingauthority)
  to impersonate users with the `https://www.googleapis.com/auth/gmail.settings.basic`
  scope. For users managing their own identities and keypairs, requests require [hardware
  key encryption](https://support.google.com/a/answer/14153163) turned on and configured.
httpMethod: POST
path: gmail/v1/users/{userId}/settings/cse/keypairs/{keyPairId}:enable
scopes:
- https://www.googleapis.com/auth/gmail.settings.basic
- https://www.googleapis.com/auth/gmail.settings.sharing
request:
  $ref: EnableCseKeyPairRequest
parameters:
  userId:
    description: The requester's primary email address. To indicate the authenticated
      user, you can use the special value `me`.
    default: me
    location: path
    required: true
    type: string
  keyPairId:
    description: The identifier of the key pair to turn on.
    location: path
    required: true
    type: string
response:
  $ref: CseKeyPair
