description: Lists client-side encryption key pairs for an authenticated user. For
  administrators managing identities and keypairs for users in their organization,
  requests require authorization with a [service account](https://developers.google.com/identity/protocols/OAuth2ServiceAccount)
  that has [domain-wide delegation authority](https://developers.google.com/identity/protocols/OAuth2ServiceAccount#delegatingauthority)
  to impersonate users with the `https://www.googleapis.com/auth/gmail.settings.basic`
  scope. For users managing their own identities and keypairs, requests require [hardware
  key encryption](https://support.google.com/a/answer/14153163) turned on and configured.
httpMethod: GET
path: gmail/v1/users/{userId}/settings/cse/keypairs
scopes:
- https://mail.google.com/
- https://www.googleapis.com/auth/gmail.modify
- https://www.googleapis.com/auth/gmail.readonly
- https://www.googleapis.com/auth/gmail.settings.basic
- https://www.googleapis.com/auth/gmail.settings.sharing
parameters:
  userId:
    description: The requester's primary email address. To indicate the authenticated
      user, you can use the special value `me`.
    default: me
    location: path
    required: true
    type: string
  pageToken:
    description: Pagination token indicating which page of key pairs to return. If
      the token is not supplied, then the API will return the first page of results.
    location: query
    type: string
  pageSize:
    description: The number of key pairs to return. If not provided, the page size
      will default to 20 entries.
    default: '20'
    location: query
    type: integer
    format: int32
response:
  $ref: ListCseKeyPairsResponse
