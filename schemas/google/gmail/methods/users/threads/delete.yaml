description: Immediately and permanently deletes the specified thread. Any messages
  that belong to the thread are also deleted. This operation cannot be undone. Prefer
  `threads.trash` instead.
httpMethod: DELETE
path: gmail/v1/users/{userId}/threads/{id}
scopes:
- https://mail.google.com/
parameters:
  userId:
    description: The user's email address. The special value `me` can be used to indicate
      the authenticated user.
    default: me
    location: path
    required: true
    type: string
  id:
    description: ID of the Thread to delete.
    location: path
    required: true
    type: string
