$schema: http://json-schema.org/draft-07/schema#
title: History
description: A record of a change to the user's mailbox. Each history change may affect
  multiple messages in multiple ways.
type: object
properties:
  id:
    description: The mailbox sequence ID.
    type: string
    format: uint64
  messages:
    description: List of messages changed in this history record. The fields for specific
      change types, such as `messagesAdded` may duplicate messages in this field.
      We recommend using the specific change-type fields instead of this.
    type: array
    items:
      $ref: Message
  messagesAdded:
    description: Messages added to the mailbox in this history record.
    type: array
    items:
      $ref: HistoryMessageAdded
  messagesDeleted:
    description: Messages deleted (not Trashed) from the mailbox in this history record.
    type: array
    items:
      $ref: HistoryMessageDeleted
  labelsAdded:
    description: Labels added to messages in this history record.
    type: array
    items:
      $ref: HistoryLabelAdded
  labelsRemoved:
    description: Labels removed from messages in this history record.
    type: array
    items:
      $ref: HistoryLabelRemoved
