$schema: http://json-schema.org/draft-07/schema#
title: Label
description: Labels are used to categorize messages and threads within the user's
  mailbox. The maximum number of labels supported for a user's mailbox is 10,000.
type: object
properties:
  id:
    description: The immutable ID of the label.
    annotations:
      required:
      - gmail.users.labels.update
    type: string
  name:
    description: The display name of the label.
    annotations:
      required:
      - gmail.users.labels.create
      - gmail.users.labels.update
    type: string
  messageListVisibility:
    description: The visibility of messages with this label in the message list in
      the Gmail web interface.
    annotations:
      required:
      - gmail.users.labels.create
      - gmail.users.labels.update
    type: string
    enumDescriptions:
    - Show the label in the message list.
    - Do not show the label in the message list.
    enum:
    - show
    - hide
  labelListVisibility:
    description: The visibility of the label in the label list in the Gmail web interface.
    annotations:
      required:
      - gmail.users.labels.create
      - gmail.users.labels.update
    type: string
    enumDescriptions:
    - Show the label in the label list.
    - Show the label if there are any unread messages with that label.
    - Do not show the label in the label list.
    enum:
    - labelShow
    - labelShowIfUnread
    - labelHide
  type:
    description: The owner type for the label. User labels are created by the user
      and can be modified and deleted by the user and can be applied to any message
      or thread. System labels are internally created and cannot be added, modified,
      or deleted. System labels may be able to be applied to or removed from messages
      and threads under some circumstances but this is not guaranteed. For example,
      users can apply and remove the `INBOX` and `UNREAD` labels from messages and
      threads, but cannot apply or remove the `DRAFTS` or `SENT` labels from messages
      or threads.
    type: string
    enumDescriptions:
    - Labels created by Gmail.
    - Custom labels created by the user or application.
    enum:
    - system
    - user
  messagesTotal:
    description: The total number of messages with the label.
    type: integer
    format: int32
  messagesUnread:
    description: The number of unread messages with the label.
    type: integer
    format: int32
  threadsTotal:
    description: The total number of threads with the label.
    type: integer
    format: int32
  threadsUnread:
    description: The number of unread threads with the label.
    type: integer
    format: int32
  color:
    description: The color to assign to the label. Color is only available for labels
      that have their `type` set to `user`.
    $ref: LabelColor
