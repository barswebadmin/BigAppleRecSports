$schema: http://json-schema.org/draft-07/schema#
title: DomainAlias
description: ''
type: object
properties:
  kind:
    description: Kind of resource this is.
    default: admin#directory#domainAlias
    type: string
  parentDomainName:
    description: The parent domain name that the domain alias is associated with.
      This can either be a primary or secondary domain name within a customer.
    annotations:
      required:
      - directory.domains.insert
    type: string
  verified:
    description: Indicates the verification state of a domain alias. (Read-only)
    type: boolean
  creationTime:
    description: The creation time of the domain alias. (Read-only).
    type: string
    format: int64
  etag:
    description: ETag of the resource.
    type: string
  domainAliasName:
    description: The domain alias name.
    type: string
