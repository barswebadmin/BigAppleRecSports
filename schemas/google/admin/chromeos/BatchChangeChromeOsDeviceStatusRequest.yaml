$schema: http://json-schema.org/draft-07/schema#
title: BatchChangeChromeOsDeviceStatusRequest
description: A request for changing the status of a batch of ChromeOS devices.
type: object
properties:
  deviceIds:
    description: Required. List of the IDs of the ChromeOS devices to change. Maximum
      50.
    type: array
    items:
      type: string
  changeChromeOsDeviceStatusAction:
    description: Required. The action to take on the ChromeOS device in order to change
      its status.
    type: string
    enumDescriptions:
    - Default value. Value is unused.
    - "Deprovisions a ChromeOS device. If you have ChromeOS devices that are no longer\
      \ being used in your organization, you should deprovision them so that you\u2019\
      re no longer managing them. Deprovisioning the device removes all policies that\
      \ were on the device as well as device-level printers and the ability to use\
      \ the device as a kiosk. Depending on the upgrade that\u2019s associated with\
      \ the device this action might release the license back into the license pool;\
      \ which allows you to use the license on a different device."
    - "Disables a ChromeOS device. Use this action if a user loses their device or\
      \ it\u2019s stolen, this makes it such that the device is still managed, so\
      \ it will still receive policies, but no one can use it. Depending on the upgrade\
      \ that\u2019s associated with the device this action might release the license\
      \ back into the license pool; which allows you to use the license on a different\
      \ device."
    - Reenables a ChromeOS device to be used after being disabled. Reenables the device
      once it's no longer lost or it's been recovered. This allows the device to be
      used again. Depending on the upgrade associated with the device this might consume
      one license from the license pool, meaning that if there aren't enough licenses
      available the operation will fail.
    enum:
    - CHANGE_CHROME_OS_DEVICE_STATUS_ACTION_UNSPECIFIED
    - CHANGE_CHROME_OS_DEVICE_STATUS_ACTION_DEPROVISION
    - CHANGE_CHROME_OS_DEVICE_STATUS_ACTION_DISABLE
    - CHANGE_CHROME_OS_DEVICE_STATUS_ACTION_REENABLE
  deprovisionReason:
    description: Optional. The reason behind a device deprovision. Must be provided
      if 'changeChromeOsDeviceStatusAction' is set to 'CHANGE_CHROME_OS_DEVICE_STATUS_ACTION_DEPROVISION'.
      Otherwise, omit this field.
    type: string
    enumDescriptions:
    - The deprovision reason is unknown.
    - Same model replacement. You have return materials authorization (RMA) or you
      are replacing a malfunctioning device under warranty with the same device model.
    - The device was upgraded.
    - The device's domain was changed.
    - Service expired for the device.
    - The device was deprovisioned for a legacy reason that is no longer supported.
    - Different model replacement. You are replacing this device with an upgraded
      or newer device model.
    - Retiring from fleet. You are donating, discarding, or otherwise removing the
      device from use.
    - ChromeOS Flex upgrade transfer. This is a ChromeOS Flex device that you are
      replacing with a Chromebook within a year.
    - A reason was not required. For example, the licenses were returned to the customer's
      license pool.
    - The device was deprovisioned by the Repair Service Center. Can only be set by
      Repair Service Center during RMA.
    enumDeprecated:
    - false
    - false
    - true
    - true
    - true
    - true
    - false
    - false
    - false
    - false
    - false
    enum:
    - DEPROVISION_REASON_UNSPECIFIED
    - DEPROVISION_REASON_SAME_MODEL_REPLACEMENT
    - DEPROVISION_REASON_UPGRADE
    - DEPROVISION_REASON_DOMAIN_MOVE
    - DEPROVISION_REASON_SERVICE_EXPIRATION
    - DEPROVISION_REASON_OTHER
    - DEPROVISION_REASON_DIFFERENT_MODEL_REPLACEMENT
    - DEPROVISION_REASON_RETIRING_DEVICE
    - DEPROVISION_REASON_UPGRADE_TRANSFER
    - DEPROVISION_REASON_NOT_REQUIRED
    - DEPROVISION_REASON_REPAIR_CENTER
