$schema: http://json-schema.org/draft-07/schema#
title: Features
description: 'Public API: Resources.features'
type: object
properties:
  kind:
    description: Kind of resource this is.
    default: admin#directory#resources#features#featuresList
    type: string
  etag:
    description: ETag of the resource.
    type: string
  features:
    description: The Features in this page of results.
    type: array
    items:
      $ref: Feature
  nextPageToken:
    description: The continuation token, used to page through large result sets. Provide
      this value in a subsequent request to return the next page of results.
    type: string
