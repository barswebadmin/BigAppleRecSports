$schema: http://json-schema.org/draft-07/schema#
title: Member
description: A Google Groups member can be a user or another group. This member can
  be inside or outside of your account's domains. For more information about common
  group member tasks, see the [Developer's Guide](https://developers.google.com/workspace/admin/directory/v1/guides/manage-group-members).
type: object
properties:
  kind:
    description: The type of the API resource. For Members resources, the value is
      `admin#directory#member`.
    default: admin#directory#member
    type: string
  email:
    description: The member's email address. A member can be a user or another group.
      This property is required when adding a member to a group. The `email` must
      be unique and cannot be an alias of another group. If the email address is changed,
      the API automatically reflects the email address changes.
    type: string
  role:
    description: The member's role in a group. The API returns an error for cycles
      in group memberships. For example, if `group1` is a member of `group2`, `group2`
      cannot be a member of `group1`. For more information about a member's role,
      see the [administration help center](https://support.google.com/a/answer/167094).
    type: string
  etag:
    description: ETag of the resource.
    type: string
  type:
    description: The type of group member.
    type: string
  status:
    description: Status of member (Immutable)
    type: string
  delivery_settings:
    description: Defines mail delivery preferences of member. This field is only supported
      by `insert`, `update`, and `get` methods.
    type: string
  id:
    description: The unique ID of the group member. A member `id` can be used as a
      member request URI's `memberKey`.
    type: string
