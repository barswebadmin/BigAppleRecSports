description: Retrieves a role assignment.
httpMethod: GET
path: admin/directory/v1/customer/{customer}/roleassignments/{roleAssignmentId}
scopes:
- https://www.googleapis.com/auth/admin.directory.rolemanagement
- https://www.googleapis.com/auth/admin.directory.rolemanagement.readonly
parameters:
  customer:
    description: The unique ID for the customer's Google Workspace account. In case
      of a multi-domain account, to fetch all groups for a customer, use this field
      instead of `domain`. You can also use the `my_customer` alias to represent your
      account's `customerId`. The `customerId` is also returned as part of the [Users](https://developers.google.com/workspace/admin/directory/v1/reference/users)
      resource. You must provide either the `customer` or the `domain` parameter.
    location: path
    required: true
    type: string
  roleAssignmentId:
    description: Immutable ID of the role assignment.
    location: path
    required: true
    type: string
response:
  $ref: RoleAssignment
