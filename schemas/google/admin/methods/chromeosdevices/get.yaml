description: Retrieves a Chrome OS device's properties.
httpMethod: GET
path: admin/directory/v1/customer/{customerId}/devices/chromeos/{deviceId}
scopes:
- https://www.googleapis.com/auth/admin.directory.device.chromeos
- https://www.googleapis.com/auth/admin.directory.device.chromeos.readonly
parameters:
  customerId:
    description: The unique ID for the customer's Google Workspace account. As an
      account administrator, you can also use the `my_customer` alias to represent
      your account's `customerId`. The `customerId` is also returned as part of the
      [Users resource](https://developers.google.com/workspace/admin/directory/v1/reference/users).
    location: path
    required: true
    type: string
  deviceId:
    description: The unique ID of the device. The `deviceId`s are returned in the
      response from the [chromeosdevices.list](https://developers.google.com/workspace/admin/directory/v1/reference/chromeosdevices/list)
      method.
    location: path
    required: true
    type: string
  projection:
    description: Determines whether the response contains the full list of properties
      or only a subset.
    location: query
    type: string
    enumDescriptions:
    - Includes only the basic metadata fields (e.g., deviceId, serialNumber, status,
      and user)
    - Includes all metadata fields
    enum:
    - BASIC
    - FULL
response:
  $ref: ChromeOsDevice
