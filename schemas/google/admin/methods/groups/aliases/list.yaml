description: Lists all aliases for a group.
httpMethod: GET
path: admin/directory/v1/groups/{groupKey}/aliases
scopes:
- https://www.googleapis.com/auth/admin.directory.group
- https://www.googleapis.com/auth/admin.directory.group.readonly
parameters:
  groupKey:
    description: Identifies the group in the API request. The value can be the group's
      email address, group alias, or the unique group ID.
    location: path
    required: true
    type: string
response:
  $ref: Aliases
