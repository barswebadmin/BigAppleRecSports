description: Updates a user. This method supports patch semantics, meaning that you
  only need to include the fields you wish to update. Fields that are not present
  in the request will be preserved, and fields set to `null` will be cleared. For
  repeating fields that contain arrays, individual items in the array can't be patched
  piecemeal; they must be supplied in the request body with the desired values for
  all items. See the [user accounts guide](https://developers.google.com/workspace/admin/directory/v1/guides/manage-users#update_user)
  for more information.
httpMethod: PUT
path: admin/directory/v1/users/{userKey}
scopes:
- https://www.googleapis.com/auth/admin.directory.user
request:
  $ref: User
parameters:
  userKey:
    description: Identifies the user in the API request. The value can be the user's
      primary email address, alias email address, or unique user ID.
    location: path
    required: true
    type: string
response:
  $ref: User
