description: Signs a user out of all web and device sessions and reset their sign-in
  cookies. User will have to sign in by authenticating again.
httpMethod: POST
path: admin/directory/v1/users/{userKey}/signOut
scopes:
- https://www.googleapis.com/auth/admin.directory.user.security
parameters:
  userKey:
    description: Identifies the target user in the API request. The value can be the
      user's primary email address, alias email address, or unique user ID.
    location: path
    required: true
    type: string
