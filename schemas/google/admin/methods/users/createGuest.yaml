  in trying this feature.
httpMethod: POST
path: admin/directory/v1/users:createGuest
scopes:
- https://www.googleapis.com/auth/admin.directory.user
request:
  $ref: DirectoryUsersCreateGuestRequest
parameters: {}
response:
  $ref: User
