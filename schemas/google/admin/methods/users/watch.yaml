description: Watches for changes in users list.
httpMethod: POST
path: admin/directory/v1/users/watch
scopes:
- https://www.googleapis.com/auth/admin.directory.user
- https://www.googleapis.com/auth/admin.directory.user.readonly
- https://www.googleapis.com/auth/cloud-platform
request:
  $ref: Channel
parameters:
  domain:
    description: Name of the domain. Fill this field to get users from only this domain.
      To return all users in a multi-domain fill customer field instead."
    location: query
    type: string
  customer:
    description: Immutable ID of the Google Workspace account. In case of multi-domain,
      to fetch all users for a customer, fill this field instead of domain.
    location: query
    type: string
  event:
    description: Events to watch for.
    location: query
    type: string
    enumDescriptions:
    - User Created Event
    - User Deleted Event
    - User Admin Status Change Event
    - User Undeleted Event
    - User Updated Event
    enum:
    - add
    - delete
    - makeAdmin
    - undelete
    - update
  customFieldMask:
    description: Comma-separated list of schema names. All fields from these schemas
      are fetched. This should only be set when projection=custom.
    location: query
    type: string
  maxResults:
    description: Maximum number of results to return.
    default: '100'
    minimum: '1'
    maximum: '500'
    location: query
    type: integer
    format: int32
  orderBy:
    description: Column to use for sorting results
    location: query
    type: string
    enumDescriptions:
    - Primary email of the user.
    - User's family name.
    - User's given name.
    enum:
    - email
    - familyName
    - givenName
  pageToken:
    description: Token to specify next page in the list
    location: query
    type: string
  projection:
    description: What subset of fields to fetch for this user.
    default: basic
    location: query
    type: string
    enumDescriptions:
    - Do not include any custom fields for the user.
    - Include custom fields from schemas mentioned in customFieldMask.
    - Include all fields associated with this user.
    enum:
    - basic
    - custom
    - full
  query:
    description: Query string search. Contains one or more search clauses, each with
      a field, operator, and value. For complete documentation, go to [Search for
      users](https://developers.google.com/workspace/admin/directory/v1/guides/search-users).
    location: query
    type: string
  showDeleted:
    description: 'If set to true, retrieves the list of deleted users. (Default: false)'
    location: query
    type: string
  sortOrder:
    description: Whether to return results in ascending or descending order.
    location: query
    type: string
    enumDescriptions:
    - Ascending order.
    - Descending order.
    enum:
    - ASCENDING
    - DESCENDING
  viewType:
    description: Whether to fetch the administrator-only or domain-wide public view
      of the user. For more information, see [Retrieve a user as a non-administrator](https://developers.google.com/workspace/admin/directory/v1/guides/manage-users#retrieve_users_non_admin).
    default: admin_view
    location: query
    type: string
    enumDescriptions:
    - Results include both administrator-only and domain-public fields.
    - Results only include fields for the user that are publicly visible to other
      users in the domain.
    enum:
    - admin_view
    - domain_public
response:
  $ref: Channel
