description: Retrieves a paginated list of all user-owned mobile devices for an account.
  To retrieve a list that includes company-owned devices, use the Cloud Identity [Devices
  API](https://cloud.google.com/identity/docs/concepts/overview-devices) instead.
  This method times out after 60 minutes. For more information, see [Troubleshoot
  error codes](https://developers.google.com/workspace/admin/directory/v1/guides/troubleshoot-error-codes).
httpMethod: GET
path: admin/directory/v1/customer/{customerId}/devices/mobile
scopes:
- https://www.googleapis.com/auth/admin.directory.device.mobile
- https://www.googleapis.com/auth/admin.directory.device.mobile.action
- https://www.googleapis.com/auth/admin.directory.device.mobile.readonly
parameters:
  customerId:
    description: The unique ID for the customer's Google Workspace account. As an
      account administrator, you can also use the `my_customer` alias to represent
      your account's `customerId`. The `customerId` is also returned as part of the
      [Users resource](https://developers.google.com/workspace/admin/directory/v1/reference/users).
    location: path
    required: true
    type: string
  maxResults:
    description: Maximum number of results to return. Max allowed value is 100.
    default: '100'
    minimum: '1'
    maximum: '100'
    location: query
    type: integer
    format: int32
  orderBy:
    description: Device property to use for sorting results.
    location: query
    type: string
    enumDescriptions:
    - The serial number for a Google Sync mobile device. For Android devices, this
      is a software generated unique identifier.
    - The device owner's email address.
    - Last policy settings sync date time of the device.
    - The mobile device's model.
    - The device owner's user name.
    - The device's operating system.
    - The device status.
    - Type of the device.
    enum:
    - deviceId
    - email
    - lastSync
    - model
    - name
    - os
    - status
    - type
  pageToken:
    description: Token to specify next page in the list
    location: query
    type: string
  projection:
    description: Restrict information returned to a set of selected fields.
    location: query
    type: string
    enumDescriptions:
    - Includes only the basic metadata fields (e.g., deviceId, model, status, type,
      and status)
    - Includes all metadata fields
    enum:
    - BASIC
    - FULL
  query:
    description: Search string in the format given at https://developers.google.com/workspace/admin/directory/v1/search-operators
    location: query
    type: string
  sortOrder:
    description: Whether to return results in ascending or descending order. Must
      be used with the `orderBy` parameter.
    location: query
    type: string
    enumDescriptions:
    - Ascending order.
    - Descending order.
    enum:
    - ASCENDING
    - DESCENDING
response:
  $ref: MobileDevices
