description: Retrieves a mobile device's properties.
httpMethod: GET
path: admin/directory/v1/customer/{customerId}/devices/mobile/{resourceId}
scopes:
- https://www.googleapis.com/auth/admin.directory.device.mobile
- https://www.googleapis.com/auth/admin.directory.device.mobile.action
- https://www.googleapis.com/auth/admin.directory.device.mobile.readonly
parameters:
  customerId:
    description: The unique ID for the customer's Google Workspace account. As an
      account administrator, you can also use the `my_customer` alias to represent
      your account's `customerId`. The `customerId` is also returned as part of the
      [Users resource](https://developers.google.com/workspace/admin/directory/v1/reference/users).
    location: path
    required: true
    type: string
  resourceId:
    description: The unique ID the API service uses to identify the mobile device.
    location: path
    required: true
    type: string
  projection:
    description: Restrict information returned to a set of selected fields.
    location: query
    type: string
    enumDescriptions:
    - Includes only the basic metadata fields (e.g., deviceId, model, status, type,
      and status)
    - Includes all metadata fields
    enum:
    - BASIC
    - FULL
response:
  $ref: MobileDevice
