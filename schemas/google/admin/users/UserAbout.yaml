$schema: http://json-schema.org/draft-07/schema#
title: UserAbout
description: JSON template for About (notes) of a user in Directory API.
type: object
properties:
  contentType:
    description: About entry can have a type which indicates the content type. It
      can either be plain or html. By default, notes contents are assumed to contain
      plain text.
    type: string
  value:
    description: Actual value of notes.
    type: string
