$schema: http://json-schema.org/draft-07/schema#
title: Token
description: JSON template for token resource in Directory API.
type: object
properties:
  clientId:
    description: The Client ID of the application the token is issued to.
    type: string
  scopes:
    description: A list of authorization scopes the application is granted.
    type: array
    items:
      type: string
  userKey:
    description: The unique ID of the user that issued the token.
    type: string
  anonymous:
    description: Whether the application is registered with Google. The value is `true`
      if the application has an anonymous Client ID.
    type: boolean
  displayText:
    description: The displayable name of the application the token is issued to.
    type: string
  nativeApp:
    description: Whether the token is issued to an installed application. The value
      is `true` if the application is installed to a desktop or mobile device.
    type: boolean
  kind:
    description: The type of the API resource. This is always `admin#directory#token`.
    default: admin#directory#token
    type: string
  etag:
    description: ETag of the resource.
    type: string
