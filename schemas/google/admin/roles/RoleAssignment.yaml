$schema: http://json-schema.org/draft-07/schema#
title: RoleAssignment
description: Defines an assignment of a role.
type: object
properties:
  roleAssignmentId:
    description: ID of this roleAssignment.
    type: string
    format: int64
  roleId:
    description: The ID of the role that is assigned.
    type: string
    format: int64
  kind:
    description: The type of the API resource. This is always `admin#directory#roleAssignment`.
    default: admin#directory#roleAssignment
    type: string
  etag:
    description: ETag of the resource.
    type: string
  assignedTo:
    description: "The unique ID of the entity this role is assigned to\u2014either\
      \ the `user_id` of a user, the `group_id` of a group, or the `uniqueId` of a\
      \ service account as defined in [Identity and Access Management (IAM)](https://cloud.google.com/iam/docs/reference/rest/v1/projects.serviceAccounts)."
    type: string
  assigneeType:
    description: Output only. The type of the assignee (`USER` or `GROUP`).
    readOnly: true
    type: string
    enumDescriptions:
    - An individual user within the domain.
    - A group within the domain.
    enum:
    - user
    - group
  scopeType:
    description: The scope in which this role is assigned.
    type: string
  orgUnitId:
    description: If the role is restricted to an organization unit, this contains
      the ID for the organization unit the exercise of this role is restricted to.
    type: string
  condition:
    description: 'Optional. The condition associated with this role assignment. Note:
      Feature is available to Enterprise Standard, Enterprise Plus, Google Workspace
      for Education Plus and Cloud Identity Premium customers. A `RoleAssignment`
      with the `condition` field set will only take effect when the resource being
      accessed meets the condition. If `condition` is empty, the role (`role_id`)
      is applied to the actor (`assigned_to`) at the scope (`scope_type`) unconditionally.
      Currently, the following conditions are supported: - To make the `RoleAssignment`
      only applicable to [Security Groups](https://cloud.google.com/identity/docs/groups#group_types):
      `api.getAttribute(''cloudidentity.googleapis.com/groups.labels'', []).hasAny([''groups.security''])
      && resource.type == ''cloudidentity.googleapis.com/Group''` - To make the `RoleAssignment`
      not applicable to [Security Groups](https://cloud.google.com/identity/docs/groups#group_types):
      `!api.getAttribute(''cloudidentity.googleapis.com/groups.labels'', []).hasAny([''groups.security''])
      && resource.type == ''cloudidentity.googleapis.com/Group''` Currently, the condition
      strings have to be verbatim and they only work with the following [pre-built
      administrator roles](https://support.google.com/a/answer/2405986): - Groups
      Editor - Groups Reader The condition follows [Cloud IAM condition syntax](https://cloud.google.com/iam/docs/conditions-overview).
      - To make the `RoleAssignment` not applicable to [Locked Groups](https://cloud.google.com/identity/docs/groups#group_types):
      `!api.getAttribute(''cloudidentity.googleapis.com/groups.labels'', []).hasAny([''groups.locked''])
      && resource.type == ''cloudidentity.googleapis.com/Group''` This condition can
      also be used in conjunction with a Security-related condition.'
    type: string
