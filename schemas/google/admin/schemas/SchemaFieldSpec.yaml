$schema: http://json-schema.org/draft-07/schema#
title: SchemaFieldSpec
description: You can use schemas to add custom fields to user profiles. You can use
  these fields to store information such as the projects your users work on, their
  physical locations, their hire dates, or whatever else fits your business needs.
  For more information, see [Custom User Fields](https://developers.google.com/workspace/admin/directory/v1/guides/manage-schemas).
type: object
properties:
  fieldName:
    description: The name of the field.
    annotations:
      required:
      - directory.schemas.insert
      - directory.schemas.update
    type: string
  fieldId:
    description: The unique identifier of the field (Read-only)
    type: string
  fieldType:
    description: The type of the field.
    annotations:
      required:
      - directory.schemas.insert
      - directory.schemas.update
    type: string
  multiValued:
    description: 'A boolean specifying whether this is a multi-valued field or not.
      Default: `false`.'
    type: boolean
  kind:
    description: The kind of resource this is. For schema fields this is always `admin#directory#schema#fieldspec`.
    default: admin#directory#schema#fieldspec
    type: string
  etag:
    description: The ETag of the field.
    type: string
  indexed:
    description: 'Boolean specifying whether the field is indexed or not. Default:
      `true`.'
    default: 'true'
    type: boolean
  displayName:
    description: Display Name of the field.
    annotations:
      required:
      - directory.schemas.insert
      - directory.schemas.update
    type: string
  readAccessType:
    description: 'Specifies who can view values of this field. See [Retrieve users
      as a non-administrator](https://developers.google.com/workspace/admin/directory/v1/guides/manage-users#retrieve_users_non_admin)
      for more information. Note: It may take up to 24 hours for changes to this field
      to be reflected.'
    default: ALL_DOMAIN_USERS
    type: string
  numericIndexingSpec:
    description: Indexing spec for a numeric field. By default, only exact match queries
      will be supported for numeric fields. Setting the `numericIndexingSpec` allows
      range queries to be supported.
    type: object
    properties:
      minValue:
        description: Minimum value of this field. This is meant to be indicative rather
          than enforced. Values outside this range will still be indexed, but search
          may not be as performant.
        type: number
        format: double
      maxValue:
        description: Maximum value of this field. This is meant to be indicative rather
          than enforced. Values outside this range will still be indexed, but search
          may not be as performant.
        type: number
        format: double
