$schema: http://json-schema.org/draft-07/schema#
title: Schema
description: The type of API resource. For Schema resources, this is always `admin#directory#schema`.
type: object
properties:
  schemaId:
    description: The unique identifier of the schema (Read-only)
    type: string
  schemaName:
    description: 'The schema''s name. Each `schema_name` must be unique within a customer.
      Reusing a name results in a `409: Entity already exists` error.'
    annotations:
      required:
      - directory.schemas.insert
    type: string
  fields:
    description: A list of fields in the schema.
    annotations:
      required:
      - directory.schemas.insert
      - directory.schemas.update
    type: array
    items:
      $ref: SchemaFieldSpec
  displayName:
    description: Display name for the schema.
    annotations:
      required:
      - directory.schemas.insert
    type: string
  kind:
    description: Kind of resource this is.
    default: admin#directory#schema
    type: string
  etag:
    description: The ETag of the resource.
    type: string
