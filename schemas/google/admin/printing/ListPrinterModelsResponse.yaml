$schema: http://json-schema.org/draft-07/schema#
title: ListPrinterModelsResponse
description: Response for listing allowed printer models.
type: object
properties:
  printerModels:
    description: Printer models that are currently allowed to be configured for ChromeOs.
      Some printers may be added or removed over time.
    type: array
    items:
      $ref: PrinterModel
  nextPageToken:
    description: A token, which can be sent as `page_token` to retrieve the next page.
      If this field is omitted, there are no subsequent pages.
    type: string
