$schema: http://json-schema.org/draft-07/schema#
title: CreatePrinterRequest
description: Request for adding a new printer.
type: object
properties:
  parent:
    description: 'Required. The name of the customer. Format: customers/{customer_id}'
    type: string
  printer:
    description: Required. A printer to create. If you want to place the printer under
      particular OU then populate printer.org_unit_id filed. Otherwise the printer
      will be placed under root OU.
    $ref: Printer
