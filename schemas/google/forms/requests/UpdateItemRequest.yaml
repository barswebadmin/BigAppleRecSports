$schema: http://json-schema.org/draft-07/schema#
title: UpdateItemRequest
description: Update an item in a form.
type: object
properties:
  updateMask:
    description: Required. Only values named in this mask are changed.
    format: google-fieldmask
    type: string
  item:
    description: Required. New values for the item. Note that item and question IDs
      are used if they are provided (and are in the field mask). If an ID is blank
      (and in the field mask) a new ID is generated. This means you can modify an
      item by getting the form via forms.get, modifying your local copy of that item
      to be how you want it, and using UpdateItemRequest to write it back, with the
      IDs being the same (or not in the field mask).
    $ref: Item
  location:
    description: Required. The location identifying the item to update.
    $ref: Location
