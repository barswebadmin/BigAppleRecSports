$schema: http://json-schema.org/draft-07/schema#
title: PublishState
description: The publishing state of a form.
type: object
properties:
  isPublished:
    description: Required. Whether the form is published and visible to others.
    type: boolean
  isAcceptingResponses:
    description: Required. Whether the form accepts responses. If `is_published` is
      set to `false`, this field is forced to `false`.
    type: boolean
