$schema: http://json-schema.org/draft-07/schema#
title: Watch
description: A watch for events for a form. When the designated event happens, a notification
  will be published to the specified target. The notification's attributes will include
  a `formId` key that has the ID of the watched form and an `eventType` key that has
  the string of the type. Messages are sent with at-least-once delivery and are only
  dropped in extraordinary circumstances. Typically all notifications should be reliably
  delivered within a few seconds; however, in some situations notifications may be
  delayed. A watch expires seven days after it is created unless it is renewed with
  watches.renew
type: object
properties:
  target:
    description: Required. Where to send the notification.
    $ref: WatchTarget
  eventType:
    enumDescriptions:
    - Unspecified event type. This value should not be used.
    - The schema event type. A watch with this event type will be notified about changes
      to form content and settings.
    - The responses event type. A watch with this event type will be notified when
      form responses are submitted.
    type: string
    description: Required. Which event type to watch for.
    enum:
    - EVENT_TYPE_UNSPECIFIED
    - SCHEMA
    - RESPONSES
  id:
    type: string
    description: Output only. The ID of this watch. See notes on CreateWatchRequest.watch_id.
    readOnly: true
  state:
    type: string
    readOnly: true
    enumDescriptions:
    - Unspecified state.
    - Watch is active.
    - The watch is suspended due to an error that may be resolved. The watch will
      continue to exist until it expires. To attempt to reactivate the watch a call
      can be made to watches.renew
    description: Output only. The current state of the watch. Additional details about
      suspended watches can be found by checking the `error_type`.
    enum:
    - STATE_UNSPECIFIED
    - ACTIVE
    - SUSPENDED
  createTime:
    description: Output only. Timestamp of when this was created.
    readOnly: true
    format: google-datetime
    type: string
  expireTime:
    type: string
    readOnly: true
    format: google-datetime
    description: Output only. Timestamp for when this will expire. Each watches.renew
      call resets this to seven days in the future.
  errorType:
    description: Output only. The most recent error type for an attempted delivery.
      To begin watching the form again a call can be made to watches.renew which also
      clears this error information.
    enum:
    - ERROR_TYPE_UNSPECIFIED
    - PROJECT_NOT_AUTHORIZED
    - NO_USER_ACCESS
    - OTHER_ERRORS
    enumDescriptions:
    - Unspecified error type.
    - The cloud project does not have access to the form being watched. This occurs
      if the user has revoked the authorization for your project to access their form(s).
      Watches with this error will not be retried. To attempt to begin watching the
      form again a call can be made to watches.renew
    - The user that granted access no longer has access to the form being watched.
      Watches with this error will not be retried. To attempt to begin watching the
      form again a call can be made to watches.renew
    - Another type of error has occurred. Whether notifications will continue depends
      on the watch state.
    readOnly: true
    type: string
