$schema: http://json-schema.org/draft-07/schema#
title: Form
description: A Google Forms document. A form is created in Drive, and deleting a form
  or changing its access protections is done via the [Drive API](https://developers.google.com/drive/api/v3/about-sdk).
type: object
properties:
  publishSettings:
    readOnly: true
    $ref: PublishSettings
    description: Output only. The publishing settings for a form. This field isn't
      set for legacy forms because they don't have the publish_settings field. All
      newly created forms support publish settings. Forms with publish_settings value
      set can call SetPublishSettings API to publish or unpublish the form.
  items:
    description: Required. A list of the form's items, which can include section headers,
      questions, embedded media, etc.
    items:
      $ref: Item
    type: array
  settings:
    description: The form's settings. This must be updated with UpdateSettingsRequest;
      it is ignored during CreateForm and UpdateFormInfoRequest.
    $ref: FormSettings
  revisionId:
    type: string
    description: 'Output only. The revision ID of the form. Used in the WriteControl
      in update requests to identify the revision on which the changes are based.
      The format of the revision ID may change over time, so it should be treated
      opaquely. A returned revision ID is only guaranteed to be valid for 24 hours
      after it has been returned and cannot be shared across users. If the revision
      ID is unchanged between calls, then the form *content* has not changed. Conversely,
      a changed ID (for the same form and user) usually means the form *content* has
      been updated; however, a changed ID can also be due to internal factors such
      as ID format changes. Form content excludes form metadata, including: * sharing
      settings (who has access to the form) * publish_settings (if the form supports
      publishing and if it is published)'
    readOnly: true
  responderUri:
    type: string
    readOnly: true
    description: Output only. The form URI to share with responders. This opens a
      page that allows the user to submit responses but not edit the questions. For
      forms that have publish_settings value set, this is the published form URI.
  linkedSheetId:
    type: string
    readOnly: true
    description: Output only. The ID of the linked Google Sheet which is accumulating
      responses from this Form (if such a Sheet exists).
  info:
    description: Required. The title and description of the form.
    $ref: Info
  formId:
    readOnly: true
    description: Output only. The form ID.
    type: string
