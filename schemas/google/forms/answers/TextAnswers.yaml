$schema: http://json-schema.org/draft-07/schema#
title: TextAnswers
description: A question's answers as text.
type: object
properties:
  answers:
    readOnly: true
    items:
      $ref: TextAnswer
    description: Output only. Answers to a question. For multiple-value ChoiceQuestions,
      each answer is a separate value.
    type: array
