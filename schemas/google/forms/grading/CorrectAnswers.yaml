$schema: http://json-schema.org/draft-07/schema#
title: CorrectAnswers
description: The answer key for a question.
type: object
properties:
  answers:
    description: A list of correct answers. A quiz response can be automatically graded
      based on these answers. For single-valued questions, a response is marked correct
      if it matches any value in this list (in other words, multiple correct answers
      are possible). For multiple-valued (`CHECKBOX`) questions, a response is marked
      correct if it contains exactly the values in this list.
    items:
      $ref: CorrectAnswer
    type: array
