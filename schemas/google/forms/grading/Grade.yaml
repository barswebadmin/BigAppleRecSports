$schema: http://json-schema.org/draft-07/schema#
title: Grade
description: Grade information associated with a respondent's answer to a question.
type: object
properties:
  score:
    type: number
    description: Output only. The numeric score awarded for the answer.
    readOnly: true
    format: double
  feedback:
    readOnly: true
    $ref: Feedback
    description: Output only. Additional feedback given for an answer.
  correct:
    type: boolean
    readOnly: true
    description: Output only. Whether the question was answered correctly or not.
      A zero-point score is not enough to infer incorrectness, since a correctly answered
      question could be worth zero points.
