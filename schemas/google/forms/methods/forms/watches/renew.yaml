description: Renew an existing watch for seven days. The state of the watch after
  renewal is `ACTIVE`, and the `expire_time` is seven days from the renewal. Renewing
  a watch in an error state (e.g. `SUSPENDED`) succeeds if the error is no longer
  present, but fail otherwise. After a watch has expired, RenewWatch returns `NOT_FOUND`.
httpMethod: POST
path: v1/forms/{formId}/watches/{watchId}:renew
scopes:
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/drive.file
- https://www.googleapis.com/auth/drive.readonly
- https://www.googleapis.com/auth/forms.body
- https://www.googleapis.com/auth/forms.body.readonly
- https://www.googleapis.com/auth/forms.responses.readonly
request:
  $ref: RenewWatchRequest
parameters:
  watchId:
    description: Required. The ID of the Watch to renew.
    type: string
    location: path
    required: true
  formId:
    description: Required. The ID of the Form.
    type: string
    location: path
    required: true
response:
  $ref: Watch
