description: Updates the publish settings of a form. Legacy forms aren't supported
  because they don't have the `publish_settings` field.
httpMethod: POST
path: v1/forms/{formId}:setPublishSettings
scopes:
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/drive.file
- https://www.googleapis.com/auth/forms.body
request:
  $ref: SetPublishSettingsRequest
parameters:
  formId:
    description: Required. The ID of the form. You can get the id from Form.form_id
      field.
    type: string
    location: path
    required: true
response:
  $ref: SetPublishSettingsResponse
