$schema: http://json-schema.org/draft-07/schema#
title: CalendarNotification
description: ''
type: object
properties:
  method:
    type: string
    description: "The method used to deliver the notification. The possible value\
      \ is:  \n- \"email\" - Notifications are sent via email.  \nRequired when adding\
      \ a notification."
  type:
    type: string
    description: "The type of notification. Possible values are:  \n- \"eventCreation\"\
      \ - Notification sent when a new event is put on the calendar. \n- \"eventChange\"\
      \ - Notification sent when an event is changed. \n- \"eventCancellation\" -\
      \ Notification sent when an event is cancelled. \n- \"eventResponse\" - Notification\
      \ sent when an attendee responds to the event invitation. \n- \"agenda\" - An\
      \ agenda with the events of the day (sent out in the morning).  \nRequired when\
      \ adding a notification."
