$schema: http://json-schema.org/draft-07/schema#
title: Calendar
description: ''
type: object
properties:
  autoAcceptInvitations:
    type: boolean
    description: Whether this calendar automatically accepts invitations. Only valid
      for resource calendars.
  conferenceProperties:
    $ref: ConferenceProperties
    description: Conferencing properties for this calendar, for example what types
      of conferences are allowed.
  dataOwner:
    type: string
    description: The email of the owner of the calendar. Set only for secondary calendars.
      Read-only.
  description:
    type: string
    description: Description of the calendar. Optional.
  etag:
    type: string
    description: ETag of the resource.
  id:
    type: string
    description: Identifier of the calendar. To retrieve IDs call the calendarList.list()
      method.
  kind:
    type: string
    description: Type of the resource ("calendar#calendar").
    default: calendar#calendar
  location:
    type: string
    description: Geographic location of the calendar as free-form text. Optional.
  summary:
    type: string
    description: Title of the calendar.
    annotations:
      required:
      - calendar.calendars.insert
  timeZone:
    type: string
    description: The time zone of the calendar. (Formatted as an IANA Time Zone Database
      name, e.g. "Europe/Zurich".) Optional.
