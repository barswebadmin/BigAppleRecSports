$schema: http://json-schema.org/draft-07/schema#
title: Setting
description: ''
type: object
properties:
  etag:
    type: string
    description: ETag of the resource.
  id:
    type: string
    description: The id of the user setting.
  kind:
    type: string
    description: Type of the resource ("calendar#setting").
    default: calendar#setting
  value:
    type: string
    description: Value of the user setting. The format of the value depends on the
      ID of the setting. It must always be a UTF-8 string of length up to 1024 characters.
