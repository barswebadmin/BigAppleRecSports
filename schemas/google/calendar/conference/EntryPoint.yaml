$schema: http://json-schema.org/draft-07/schema#
title: EntryPoint
description: ''
type: object
properties:
  accessCode:
    type: string
    description: 'The access code to access the conference. The maximum length is
      128 characters.

      When creating new conference data, populate only the subset of {meetingCode,
      accessCode, passcode, password, pin} fields that match the terminology that
      the conference provider uses. Only the populated fields should be displayed.

      Optional.'
  entryPointFeatures:
    type: array
    description: Features of the entry point, such as being toll or toll-free. One
      entry point can have multiple features. However, toll and toll-free cannot be
      both set on the same entry point.
    items:
      type: string
  entryPointType:
    type: string
    description: "The type of the conference entry point.\nPossible values are:  \n\
      - \"video\" - joining a conference over HTTP. A conference can have zero or\
      \ one video entry point.\n- \"phone\" - joining a conference by dialing a phone\
      \ number. A conference can have zero or more phone entry points.\n- \"sip\"\
      \ - joining a conference over SIP. A conference can have zero or one sip entry\
      \ point.\n- \"more\" - further conference joining instructions, for example\
      \ additional phone numbers. A conference can have zero or one more entry point.\
      \ A conference with only a more entry point is not a valid conference."
  label:
    type: string
    description: "The label for the URI. Visible to end users. Not localized. The\
      \ maximum length is 512 characters.\nExamples:  \n- for video: meet.google.com/aaa-bbbb-ccc\n\
      - for phone: +1 123 268 2601\n- for sip: 12345678@altostrat.com\n- for more:\
      \ should not be filled  \nOptional."
  meetingCode:
    type: string
    description: 'The meeting code to access the conference. The maximum length is
      128 characters.

      When creating new conference data, populate only the subset of {meetingCode,
      accessCode, passcode, password, pin} fields that match the terminology that
      the conference provider uses. Only the populated fields should be displayed.

      Optional.'
  passcode:
    type: string
    description: 'The passcode to access the conference. The maximum length is 128
      characters.

      When creating new conference data, populate only the subset of {meetingCode,
      accessCode, passcode, password, pin} fields that match the terminology that
      the conference provider uses. Only the populated fields should be displayed.'
  password:
    type: string
    description: 'The password to access the conference. The maximum length is 128
      characters.

      When creating new conference data, populate only the subset of {meetingCode,
      accessCode, passcode, password, pin} fields that match the terminology that
      the conference provider uses. Only the populated fields should be displayed.

      Optional.'
  pin:
    type: string
    description: 'The PIN to access the conference. The maximum length is 128 characters.

      When creating new conference data, populate only the subset of {meetingCode,
      accessCode, passcode, password, pin} fields that match the terminology that
      the conference provider uses. Only the populated fields should be displayed.

      Optional.'
  regionCode:
    type: string
    description: 'The CLDR/ISO 3166 region code for the country associated with this
      phone access. Example: "SE" for Sweden.

      Calendar backend will populate this field only for EntryPointType.PHONE.'
  uri:
    type: string
    description: "The URI of the entry point. The maximum length is 1300 characters.\n\
      Format:  \n- for video, http: or https: schema is required.\n- for phone, tel:\
      \ schema is required. The URI should include the entire dial sequence (e.g.,\
      \ tel:+12345678900,,,123456789;1234).\n- for sip, sip: schema is required, e.g.,\
      \ sip:12345678@myprovider.com.\n- for more, http: or https: schema is required."
