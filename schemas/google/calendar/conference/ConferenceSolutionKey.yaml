$schema: http://json-schema.org/draft-07/schema#
title: ConferenceSolutionKey
description: ''
type: object
properties:
  type:
    type: string
    description: "The conference solution type.\nIf a client encounters an unfamiliar\
      \ or empty type, it should still be able to display the entry points. However,\
      \ it should disallow modifications.\nThe possible values are:  \n- \"eventHangout\"\
      \ for Hangouts for consumers (deprecated; existing events may show this conference\
      \ solution type but new conferences cannot be created)\n- \"eventNamedHangout\"\
      \ for classic Hangouts for Google Workspace users (deprecated; existing events\
      \ may show this conference solution type but new conferences cannot be created)\n\
      - \"hangoutsMeet\" for Google Meet (http://meet.google.com)\n- \"addOn\" for\
      \ 3P conference providers"
