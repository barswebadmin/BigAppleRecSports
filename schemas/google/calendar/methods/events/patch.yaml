description: Updates an event. This method supports patch semantics.
httpMethod: PATCH
path: calendars/{calendarId}/events/{eventId}
scopes:
- https://www.googleapis.com/auth/calendar
- https://www.googleapis.com/auth/calendar.app.created
- https://www.googleapis.com/auth/calendar.events
- https://www.googleapis.com/auth/calendar.events.owned
request:
  $ref: Event
parameters:
  alwaysIncludeEmail:
    type: boolean
    description: Deprecated and ignored. A value will always be returned in the email
      field for the organizer, creator and attendees, even if no real email address
      is available (i.e. a generated, non-working value will be provided).
    location: query
  calendarId:
    type: string
    description: Calendar identifier. To retrieve calendar IDs call the calendarList.list
      method. If you want to access the primary calendar of the currently logged in
      user, use the "primary" keyword.
    required: true
    location: path
  conferenceDataVersion:
    type: integer
    description: Version number of conference data supported by the API client. Version
      0 assumes no conference data support and ignores conference data in the event's
      body. Version 1 enables support for copying of ConferenceData as well as for
      creating new conferences using the createRequest field of conferenceData. The
      default is 0.
    format: int32
    minimum: '0'
    maximum: '1'
    location: query
  eventId:
    type: string
    description: Event identifier.
    required: true
    location: path
  maxAttendees:
    type: integer
    description: The maximum number of attendees to include in the response. If there
      are more than the specified number of attendees, only the participant is returned.
      Optional.
    format: int32
    minimum: '1'
    location: query
  sendNotifications:
    type: boolean
    description: 'Deprecated. Please use sendUpdates instead.


      Whether to send notifications about the event update (for example, description
      changes, etc.). Note that some emails might still be sent even if you set the
      value to false. The default is false.'
    location: query
  sendUpdates:
    type: string
    description: Guests who should receive notifications about the event update (for
      example, title changes, etc.).
    enum:
    - all
    - externalOnly
    - none
    enumDescriptions:
    - Notifications are sent to all guests.
    - Notifications are sent to non-Google Calendar guests only.
    - No notifications are sent. For calendar migration tasks, consider using the
      Events.import method instead.
    location: query
  supportsAttachments:
    type: boolean
    description: Whether API client performing operation supports event attachments.
      Optional. The default is False.
    location: query
response:
  $ref: Event
