description: Returns all user settings for the authenticated user.
httpMethod: GET
path: users/me/settings
scopes:
- https://www.googleapis.com/auth/calendar
- https://www.googleapis.com/auth/calendar.readonly
- https://www.googleapis.com/auth/calendar.settings.readonly
parameters:
  maxResults:
    type: integer
    description: Maximum number of entries returned on one result page. By default
      the value is 100 entries. The page size can never be larger than 250 entries.
      Optional.
    format: int32
    minimum: '1'
    location: query
  pageToken:
    type: string
    description: Token specifying which result page to return. Optional.
    location: query
  syncToken:
    type: string
    description: 'Token obtained from the nextSyncToken field returned on the last
      page of results from the previous list request. It makes the result of this
      list request contain only entries that have changed since then.

      If the syncToken expires, the server will respond with a 410 GONE response code
      and the client should clear its storage and perform a full synchronization without
      any syncToken.

      Learn more about incremental synchronization.

      Optional. The default is to return all entries.'
    location: query
response:
  $ref: Settings
