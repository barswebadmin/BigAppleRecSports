description: Watch for changes to ACL resources.
httpMethod: POST
path: calendars/{calendarId}/acl/watch
scopes:
- https://www.googleapis.com/auth/calendar
- https://www.googleapis.com/auth/calendar.acls
- https://www.googleapis.com/auth/calendar.acls.readonly
request:
  $ref: Channel
  parameterName: resource
parameters:
  calendarId:
    type: string
    description: Calendar identifier. To retrieve calendar IDs call the calendarList.list
      method. If you want to access the primary calendar of the currently logged in
      user, use the "primary" keyword.
    required: true
    location: path
  maxResults:
    type: integer
    description: Maximum number of entries returned on one result page. By default
      the value is 100 entries. The page size can never be larger than 250 entries.
      Optional.
    format: int32
    minimum: '1'
    location: query
  pageToken:
    type: string
    description: Token specifying which result page to return. Optional.
    location: query
  showDeleted:
    type: boolean
    description: Whether to include deleted ACLs in the result. Deleted ACLs are represented
      by role equal to "none". Deleted ACLs will always be included if syncToken is
      provided. Optional. The default is False.
    location: query
  syncToken:
    type: string
    description: 'Token obtained from the nextSyncToken field returned on the last
      page of results from the previous list request. It makes the result of this
      list request contain only entries that have changed since then. All entries
      deleted since the previous list request will always be in the result set and
      it is not allowed to set showDeleted to False.

      If the syncToken expires, the server will respond with a 410 GONE response code
      and the client should clear its storage and perform a full synchronization without
      any syncToken.

      Learn more about incremental synchronization.

      Optional. The default is to return all entries.'
    location: query
response:
  $ref: Channel
