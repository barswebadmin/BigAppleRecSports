$schema: http://json-schema.org/draft-07/schema#
title: EventOutOfOfficeProperties
description: ''
type: object
properties:
  autoDeclineMode:
    type: string
    description: Whether to decline meeting invitations which overlap Out of office
      events. Valid values are declineNone, meaning that no meeting invitations are
      declined; declineAllConflictingInvitations, meaning that all conflicting meeting
      invitations that conflict with the event are declined; and declineOnlyNewConflictingInvitations,
      meaning that only new conflicting meeting invitations which arrive while the
      Out of office event is present are to be declined.
  declineMessage:
    type: string
    description: Response message to set if an existing event or new invitation is
      automatically declined by Calendar.
