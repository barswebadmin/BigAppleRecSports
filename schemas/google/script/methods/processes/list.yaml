description: List information about processes made by or on behalf of a user, such
  as process type and current status.
httpMethod: GET
path: v1/processes
scopes:
- https://www.googleapis.com/auth/script.processes
parameters:
  userProcessFilter.projectName:
    type: string
    description: Optional field used to limit returned processes to those originating
      from projects with project names containing a specific string.
    location: query
  userProcessFilter.deploymentId:
    description: Optional field used to limit returned processes to those originating
      from projects with a specific deployment ID.
    location: query
    type: string
  userProcessFilter.startTime:
    type: string
    description: Optional field used to limit returned processes to those that were
      started on or after the given timestamp.
    location: query
    format: google-datetime
  userProcessFilter.scriptId:
    type: string
    description: Optional field used to limit returned processes to those originating
      from projects with a specific script ID.
    location: query
  userProcessFilter.endTime:
    format: google-datetime
    description: Optional field used to limit returned processes to those that completed
      on or before the given timestamp.
    location: query
    type: string
  userProcessFilter.statuses:
    description: Optional field used to limit returned processes to those having one
      of the specified process statuses.
    location: query
    repeated: true
    enumDescriptions:
    - Unspecified status.
    - The process is currently running.
    - The process has paused.
    - The process has completed.
    - The process was cancelled.
    - The process failed.
    - The process timed out.
    - Process status unknown.
    - The process is delayed, waiting for quota.
    - AppsScript executions are disabled by Admin.
    type: string
    enum:
    - PROCESS_STATUS_UNSPECIFIED
    - RUNNING
    - PAUSED
    - COMPLETED
    - CANCELED
    - FAILED
    - TIMED_OUT
    - UNKNOWN
    - DELAYED
    - EXECUTION_DISABLED
  userProcessFilter.functionName:
    description: Optional field used to limit returned processes to those originating
      from a script function with the given function name.
    location: query
    type: string
  pageSize:
    description: The maximum number of returned processes per page of results. Defaults
      to 50.
    location: query
    type: integer
    format: int32
  pageToken:
    description: The token for continuing a previous list request on the next page.
      This should be set to the value of `nextPageToken` from a previous response.
    location: query
    type: string
  userProcessFilter.types:
    description: Optional field used to limit returned processes to those having one
      of the specified process types.
    location: query
    repeated: true
    enumDescriptions:
    - Unspecified type.
    - The process was started from an add-on entry point.
    - The process was started using the Apps Script API.
    - The process was started from a time-based trigger.
    - The process was started from an event-based trigger.
    - The process was started from a web app entry point.
    - The process was started using the Apps Script IDE.
    - The process was started from a G Suite simple trigger.
    - The process was started from a G Suite menu item.
    - The process was started as a task in a batch job.
    type: string
    enum:
    - PROCESS_TYPE_UNSPECIFIED
    - ADD_ON
    - EXECUTION_API
    - TIME_DRIVEN
    - TRIGGER
    - WEBAPP
    - EDITOR
    - SIMPLE_TRIGGER
    - MENU
    - BATCH_TASK
  userProcessFilter.userAccessLevels:
    type: string
    enum:
    - USER_ACCESS_LEVEL_UNSPECIFIED
    - NONE
    - READ
    - WRITE
    - OWNER
    enumDescriptions:
    - User access level unspecified
    - The user has no access.
    - The user has read-only access.
    - The user has write access.
    - The user is an owner.
    repeated: true
    description: Optional field used to limit returned processes to those having one
      of the specified user access levels.
    location: query
response:
  $ref: ListUserProcessesResponse
