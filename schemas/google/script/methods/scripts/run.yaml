description: ''
httpMethod: POST
path: v1/scripts/{scriptId}:run
scopes:
- https://mail.google.com/
- https://www.google.com/calendar/feeds
- https://www.google.com/m8/feeds
- https://www.googleapis.com/auth/admin.directory.group
- https://www.googleapis.com/auth/admin.directory.user
- https://www.googleapis.com/auth/documents
- https://www.googleapis.com/auth/drive
- https://www.googleapis.com/auth/forms
- https://www.googleapis.com/auth/forms.currentonly
- https://www.googleapis.com/auth/groups
- https://www.googleapis.com/auth/spreadsheets
- https://www.googleapis.com/auth/userinfo.email
request:
  $ref: ExecutionRequest
parameters:
  scriptId:
    required: true
    type: string
    description: The script ID of the script to be executed. Find the script ID on
      the **Project settings** page under "IDs." As multiple executable APIs can be
      deployed in new IDE for same script, this field should be populated with DeploymentID
      generated while deploying in new IDE instead of script ID.
    location: path
response:
  $ref: Operation
