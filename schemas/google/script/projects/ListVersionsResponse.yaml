$schema: http://json-schema.org/draft-07/schema#
title: ListVersionsResponse
description: Response with the list of the versions for the specified script project.
type: object
properties:
  versions:
    description: The list of versions.
    type: array
    items:
      $ref: Version
  nextPageToken:
    description: The token use to fetch the next page of records. if not exist in
      the response, that means no more versions to list.
    type: string
