$schema: "http://json-schema.org/draft-07/schema#"
title: "Shopify Product"
description: "Product and Variant from Shopify Admin GraphQL API"

definitions:
    productStatus:
        type: string
        enum: [ACTIVE, ARCHIVED, DRAFT]

    Variant:
        type: object
        properties:
            id:
                $ref: "./_primitives.yaml#/definitions/shopifyGid"
            title:
                type: string
            price:
                type: string
            compareAtPrice:
                type: string
            inventoryQuantity:
                type: integer
            inventoryManagement:
                type: string
            inventoryItem:
                type: object
                properties:
                    id:
                        $ref: "./_primitives.yaml#/definitions/shopifyGid"
                required: [id]
        required: [id]

    Product:
        type: object
        properties:
            id:
                $ref: "./_primitives.yaml#/definitions/shopifyGid"
            title:
                type: string
            handle:
                type: string
            status:
                $ref: "#/definitions/productStatus"
            descriptionHtml:
                type: string
            tags:
                type: array
                items:
                    type: string
            createdAt:
                $ref: "../primitives/isoDateTime.yaml"
            updatedAt:
                $ref: "../primitives/isoDateTime.yaml"
            publishedAt:
                $ref: "../primitives/isoDateTime.yaml"
            totalInventory:
                type: integer
            variants:
                type: object
                properties:
                    nodes:
                        type: array
                        items:
                            $ref: "#/definitions/Variant"
            media:
                type: object
                properties:
                    nodes:
                        type: array
                        items:
                            type: object
                            properties:
                                id:
                                    $ref: "./_primitives.yaml#/definitions/shopifyGid"
                            required: [id]
        required: [id]
