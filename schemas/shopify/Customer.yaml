$schema: "http://json-schema.org/draft-07/schema#"
title: "Shopify Customer"
description: "Customer from Shopify Admin GraphQL API"

definitions:
    address:
        type: object
        properties:
            address1:
                type: string
            address2:
                type: string
            city:
                type: string
            province:
                type: string
            country:
                type: string
            zip:
                type: string

    Customer:
        type: object
        properties:
            id:
                $ref: "./_primitives.yaml#/definitions/shopifyGid"
            email:
                type: string
                format: email
            firstName:
                type: string
            lastName:
                type: string
            phone:
                type: string
            tags:
                type: array
                items:
                    type: string
            note:
                type: string
            state:
                type: string
                enum: [DISABLED, INVITED, ENABLED, DECLINED]
            createdAt:
                $ref: "../primitives/isoDateTime.yaml"
            updatedAt:
                $ref: "../primitives/isoDateTime.yaml"
            defaultAddress:
                $ref: "#/definitions/address"
        required: [id]
