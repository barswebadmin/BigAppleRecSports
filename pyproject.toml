[build-system]
requires = ["setuptools>=45", "setuptools-scm[toml]>=6.2"]
build-backend = "setuptools.build_meta"

[project]
name = "bars"
version = "1.0.0"
description = "Big Apple Rec Sports - Backend & CLI"
requires-python = ">=3.11,<3.12"
dependencies = [
    "click>=8.1.7",
    "click-aliases>=1.0.5",
    "click-extra>=0.15.0",
    "questionary>=2.0.0",
    "rich>=13.7.0",
    "sgqlc>=17.0",
    "beautifulsoup4==4.12.3",
    "google-api-python-client==2.154.0",
    "google-auth==2.37.0",
    "google-auth-httplib2==0.2.0",
    "google-auth-oauthlib==1.2.1",
    "lxml==5.3.0",
    "pydantic==2.10.4",
    "python-dateutil==2.9.0",
    "python-dotenv==1.0.1",
    "PyYAML==6.0.2",
    "requests==2.32.3",
    "slack-bolt==1.20.1",
    "slack-sdk==3.30.0",
]

[project.scripts]
bars = "bars_cli.main:cli"

[tool.setuptools]
packages = ["bars_cli", "bars_cli.commands", "backend", "backend.shared", "backend.config", "backend.modules"]

[tool.pyright]
typeCheckingMode = "basic"
reportMissingModuleSource = "none"

[tool.pyright.diagnosticSeverityOverrides]
reportMissingImports = "error"
reportImportCycles = "error"
reportUnusedImport = "warning"
reportUndefinedVariable = "error"

[tool.pytest.ini_options]
pythonpath = [
    "backend"
]

testpaths = ["backend/routers/tests"]
addopts = "-v --tb=short" 

[tool.ariadne-codegen]
schema_path = "backend/modules/integrations/shopify/core/fetched_schema.json"
queries_path = "backend/modules/integrations/shopify/builders"
target_package_path = "backend/modules/integrations/shopify/generated_client"
client_name = "ShopifyGeneratedClient"
python_version = "3.11"
include_comments = true 