[build-system]
requires = ["setuptools>=45", "setuptools-scm[toml]>=6.2"]
build-backend = "setuptools.build_meta"

[project]
name = "bars"
version = "1.0.0"
description = "Big Apple Rec Sports - Backend & CLI"
requires-python = ">=3.11"
dependencies = [
    "boto3>=1.42.0",
    "click>=8.1.7",
    "click-aliases>=1.0.5",
    "click-extra>=0.15.0",
    "click-shell>=2.1",
    "httpx>=0.27.0",
    "pydantic>=2.12.0",
    "questionary>=2.0.0",
    "rich>=13.7.0",
    "sgqlc>=17.0",
    "validator-collection>=1.5.0",
    "beautifulsoup4==4.12.3",
    "google-api-python-client==2.154.0",
    "google-auth==2.37.0",
    "google-auth-httplib2==0.2.0",
    "google-auth-oauthlib==1.2.1",
    "lxml==5.3.0",
    "python-dateutil==2.9.0",
    "python-dotenv==1.0.1",
    "PyYAML==6.0.2",
    "requests==2.32.3",
    "slack-bolt==1.20.1",
    "slack-sdk==3.30.0",
]

[project.scripts]
bars = "bars_cli.main:cli"

[tool.setuptools]
packages = ["bars_cli", "bars_cli.commands", "bars_cli._core"]

[tool.pyright]
typeCheckingMode = "basic"
reportMissingImports = true
reportMissingModuleSource = "none"
pythonVersion = "3.11"
pythonPlatform = "All"
# Use backend venv for backend files
venvPath = "backend"
venv = ".venv"
# Include pipx venv for scripts and bars_cli (where boto3 is installed)
extraPaths = ["/Users/jrandazzo/.local/pipx/venvs/bars-cli/lib/python3.11/site-packages"]
include = ["**/*.py"]
exclude = ["**/__pycache__", "**/.venv", "**/node_modules", "**/lambda/**"]

executionEnvironments = [
    # Backend uses its own .venv
    { root = "backend", pythonVersion = "3.11", pythonPlatform = "All", extraPaths = [] },
    # Scripts and bars_cli use pipx venv (where boto3 is installed)
    { root = "scripts", pythonVersion = "3.11", pythonPlatform = "All", extraPaths = ["/Users/jrandazzo/.local/pipx/venvs/bars-cli/lib/python3.11/site-packages"] },
    { root = "bars_cli", pythonVersion = "3.11", pythonPlatform = "All", extraPaths = ["/Users/jrandazzo/.local/pipx/venvs/bars-cli/lib/python3.11/site-packages"] }
]

[tool.pyright.diagnosticSeverityOverrides]
reportMissingImports = "error"
reportImportCycles = "error"
reportUnusedImport = "warning"
reportUndefinedVariable = "error"

[tool.pytest.ini_options]
pythonpath = [
    "backend"
]

testpaths = ["backend/routers/tests"]
addopts = "-v --tb=short" 
