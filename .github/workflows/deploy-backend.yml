name: Deploy Backend to Render

# Prevent duplicate runs: use branch name for consistency across push/PR events
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      # Backend code changes
      - 'backend/**'
      # Configuration and deployment files
      - '.github/workflows/**'
      - 'Makefile'
      # Exclude documentation and non-deployment files
      - '!**/*.md'
      - '!**/tests/**'
      - '!**/*.test.js'
      - '!**/*.test.py'

  # Allow manual deployment
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual deployment'

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          echo "📦 Installing Python dependencies..."
          pip install boto3 requests

      - name: Sync secrets to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          PARAMETER_PREFIX: /bars/
        run: |
          python3 scripts/secrets/sync_render_secrets.py --from-ssm

      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to Render successful!"
          else
            echo "❌ Deployment to Render failed!"
            exit 1
          fi
      
      - name: Deployment Summary
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "📊 === DEPLOYMENT SUMMARY ==="
          echo "🌐 Service: bars-backend"
          echo "🎯 Environment: production"
          echo "🔧 Reason: ${{ github.event.inputs.reason || 'Manual deployment' }}"
          echo "📱 Branch: ${{ github.ref_name }}"
          echo "🔗 Commit: ${{ github.sha }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "🕐 Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "🔄 Trigger type: ${{ github.event_name }}"
          echo "=========================="

  notify:
    name: Notify deployment status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        run: |
          echo "🚀 BARS Backend deployed successfully to Render!"
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Notify failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ BARS Backend deployment failed!"
          echo "Check the deployment logs for details."
          exit 1
