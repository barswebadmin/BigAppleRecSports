name: Deploy Backend to Render

# Prevent duplicate runs: use branch name for consistency across push/PR events
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual deployment'

# TODO: Future enhancement - Add pull_request trigger for preview/staging deployments
# This would allow testing deployments before merging PRs.
# Requirements:
#   - Staging/preview environment in Render (separate service or environment)
#   - Staging-specific secrets (RENDER_STAGING_API_KEY, RENDER_STAGING_SERVICE_ID)
#   - Environment variable to distinguish staging vs production
#   - Update sync_render_secrets.py to support staging environment
#   - Consider auto-cleanup of staging deployments after PR merge/close
# Example trigger:
#   pull_request:
#     branches: [main]
#     paths:
#       - 'backend/**'
#     types: [opened, synchronize, reopened]

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Get Python version
        id: python-version
        run: echo "version=$(python scripts/ci/get_python_version.py)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ steps.python-version.outputs.version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: python scripts/ci/install_dependencies.py deploy


      - name: Deploy to Render (with version increment)
        id: deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          PARAMETER_PREFIX: /bars/
          CI: 'true'
          GITHUB_ACTIONS: 'true'
        run: |
          python3 scripts/deployment/deploy_backend.py --from-ssm
          echo "success=true" >> $GITHUB_OUTPUT

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ steps.deploy.outputs.success }}" == "true" ]; then
            echo "✅ Deployment to Render successful!"
          else
            echo "❌ Deployment to Render failed!"
            exit 1
          fi
      
      - name: Deployment Summary
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "📊 === DEPLOYMENT SUMMARY ==="
          echo "🌐 Service: bars-backend"
          echo "🎯 Environment: production"
          echo "🔧 Reason: ${{ github.event.inputs.reason || 'Manual deployment' }}"
          echo "📱 Branch: ${{ github.ref_name }}"
          echo "🔗 Commit: ${{ github.sha }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "🕐 Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "🔄 Trigger type: ${{ github.event_name }}"
          echo "=========================="

  notify:
    name: Notify deployment status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        run: |
          echo "🚀 BARS Backend deployed successfully to Render!"
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Notify failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ BARS Backend deployment failed!"
          echo "Check the deployment logs for details."
          exit 1
