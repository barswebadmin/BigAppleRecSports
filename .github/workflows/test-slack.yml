name: Test Slack App

on:
  push:
    branches: [main]
    paths:
      - 'slack-apps/registrations/**'
      - '.github/workflows/test-slack.yml'
  pull_request:
    branches: [main]
    paths:
      - 'slack-apps/registrations/**'
      - '.github/workflows/test-slack.yml'
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-slack:
    name: Slack App Tests
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'push' || github.event_name == 'pull_request') && !startsWith(github.head_ref || github.ref_name, 'dependabot/') }}

    defaults:
      run:
        working-directory: slack-apps/registrations

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Deno tests
        run: deno task test
