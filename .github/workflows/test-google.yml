name: Test Google Apps Scripts

on:
  push:
    branches: [main]
    paths:
      - 'google-apps-scripts/**'
      - '.github/workflows/test-google.yml'
  pull_request:
    branches: [main]
    paths:
      - 'google-apps-scripts/**'
      - '.github/workflows/test-google.yml'
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-google:
    name: Google Apps Scripts Tests
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'push' || github.event_name == 'pull_request') && !startsWith(github.head_ref || github.ref_name, 'dependabot/') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Python version
        id: python-version
        run: echo "version=$(python scripts/ci/get_python_version.py)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ steps.python-version.outputs.version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: |
          cd google-apps-scripts
          pnpm install --frozen-lockfile

      - name: Compile Google Apps Scripts
        id: compile
        run: python scripts/ci/run_script.py scripts.compilation.compile_main compile_gas

      - name: Run GAS tests
        if: steps.compile.outcome == 'success'
        run: bash google-apps-scripts/tests/run_tests.sh
