name: Version Management

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/version-management.yml'
      - 'backend/**'
      - 'lambda/functions/**'
      - '!backend/version.json'
      - '!lambda/functions/**/version.json'
  workflow_dispatch:

# Prevent duplicate runs: cancel in-progress runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:

  update-version-on-main:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install backend dependencies
      run: |
        echo "📦 Installing backend dependencies..."
        cd backend
        pip install -r requirements.txt

    - name: Configure Git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Detect changed components and determine bump types
      id: detect-changes
      run: |
        # Get changed files in the merge commit
        PREV_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
        CURRENT_SHA=$(git rev-parse HEAD)
        
        if [ -n "$PREV_SHA" ]; then
          CHANGED_FILES=$(git diff --name-only "$PREV_SHA".."$CURRENT_SHA" 2>/dev/null || echo "")
        else
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD 2>/dev/null || echo "")
        fi
        
        echo "Changed files in merge:"
        echo "$CHANGED_FILES"
        
        # Store all changed files (excluding version files) for changelog
        ALL_CHANGED=$(echo "$CHANGED_FILES" | grep -v 'version\.json$' || true)
        echo "CHANGED_FILES<<EOF" >> $GITHUB_OUTPUT
        echo "$ALL_CHANGED" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        # Get commit messages
        COMMIT_MESSAGES=$(git log --oneline -20 "$PREV_SHA".."$CURRENT_SHA" 2>/dev/null || git log --oneline -20 HEAD~1..HEAD 2>/dev/null || echo "")
        echo "COMMIT_MESSAGES<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMIT_MESSAGES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        # Function to determine bump type from commit messages and files
        determine_bump_type() {
          local files="$1"
          local messages="$2"
          
          # Check for breaking changes
          if echo "$messages" | grep -qiE "BREAKING|breaking change|major"; then
            echo "major"
            return
          fi
          
          # Check for features
          if echo "$messages" | grep -qiE "feat:|feature:|add:|new:"; then
            echo "minor"
            return
          fi
          
          # Check for critical file changes
          if echo "$files" | grep -qE "(main\.py|config\.py|requirements\.txt)" && \
             echo "$files" | grep -qE "(routers/|models/)"; then
            echo "major"
            return
          fi
          
          # Check for API changes
          if echo "$files" | grep -qE "(routers/|models/)"; then
            echo "minor"
            return
          fi
          
          # Check for fixes
          if echo "$messages" | grep -qiE "fix:|bugfix:|patch:|hotfix:"; then
            echo "patch"
            return
          fi
          
          # Default to patch if there are any changes
          if [ -n "$files" ]; then
            echo "patch"
          else
            echo "build"
          fi
        }
        
        # Check for backend changes
        BACKEND_CHANGES=$(echo "$CHANGED_FILES" | grep -E '^backend/' | grep -v 'version\.json$' || true)
        
        if [ -n "$BACKEND_CHANGES" ]; then
          echo "backend-changed=true" >> $GITHUB_OUTPUT
          BACKEND_BUMP=$(determine_bump_type "$BACKEND_CHANGES" "$COMMIT_MESSAGES")
          echo "backend-bump=$BACKEND_BUMP" >> $GITHUB_OUTPUT
          echo "✅ Backend changes detected - bump: $BACKEND_BUMP"
        else
          echo "backend-changed=false" >> $GITHUB_OUTPUT
          echo "ℹ️  No backend changes"
        fi
        
        # Check for lambda function changes
        LAMBDA_CHANGES=$(echo "$CHANGED_FILES" | grep -E '^lambda/functions/' | grep -v 'version\.json$' || true)
        
        if [ -n "$LAMBDA_CHANGES" ]; then
          echo "lambda-changed=true" >> $GITHUB_OUTPUT
          echo "✅ Lambda function changes detected"
          
          # Extract unique lambda function names and determine bump for each
          LAMBDA_UPDATES=""
          for func in $(echo "$LAMBDA_CHANGES" | sed -E 's|^lambda/functions/([^/]+)/.*|\1|' | sort -u); do
            FUNC_FILES=$(echo "$LAMBDA_CHANGES" | grep "^lambda/functions/$func/" || true)
            FUNC_BUMP=$(determine_bump_type "$FUNC_FILES" "$COMMIT_MESSAGES")
            
            VERSION_FILE="lambda/functions/$func/version.json"
            
            if [ -z "$LAMBDA_UPDATES" ]; then
              LAMBDA_UPDATES="$func:$VERSION_FILE:$FUNC_BUMP"
            else
              LAMBDA_UPDATES="$LAMBDA_UPDATES $func:$VERSION_FILE:$FUNC_BUMP"
            fi
            
            echo "   - $func: $FUNC_BUMP"
          done
          
          echo "lambda-updates=$LAMBDA_UPDATES" >> $GITHUB_OUTPUT
        else
          echo "lambda-changed=false" >> $GITHUB_OUTPUT
          echo "ℹ️  No lambda function changes"
        fi

    - name: Update versions
      if: steps.detect-changes.outputs.backend-changed == 'true' || steps.detect-changes.outputs.lambda-changed == 'true'
      run: |
        # Build command arguments
        CMD_ARGS=""
        
        # Add backend arguments if changed
        if [ "${{ steps.detect-changes.outputs.backend-changed }}" == "true" ]; then
          CMD_ARGS="$CMD_ARGS --backend-version-file backend/version.json"
          CMD_ARGS="$CMD_ARGS --backend-bump ${{ steps.detect-changes.outputs.backend-bump }}"
        fi
        
        # Add lambda function arguments if changed
        if [ "${{ steps.detect-changes.outputs.lambda-changed }}" == "true" ]; then
          LAMBDA_UPDATES="${{ steps.detect-changes.outputs.lambda-updates }}"
          for update in $LAMBDA_UPDATES; do
            CMD_ARGS="$CMD_ARGS --lambda-update $update"
          done
        fi
        
        # Add commit messages and changed files
        CMD_ARGS="$CMD_ARGS --commit-messages '${{ steps.detect-changes.outputs.COMMIT_MESSAGES }}'"
        CMD_ARGS="$CMD_ARGS --changed-files '${{ steps.detect-changes.outputs.CHANGED_FILES }}'"
        
        # Add commit-and-push flag for CI
        CMD_ARGS="$CMD_ARGS --commit-and-push"
        
        # Execute the script
        echo "Running: python3 scripts/deployment/version_manager.py $CMD_ARGS"
        python3 scripts/deployment/version_manager.py $CMD_ARGS
      env:
        SHOPIFY_URL_ADMIN_DOMAIN: test-store.myshopify.com
        SHOPIFY_TOKEN: test_token
        ENVIRONMENT: test
