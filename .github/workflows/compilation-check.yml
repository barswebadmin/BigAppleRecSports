name: Compilation Check

on:
  # Only run on PRs targeting main (use pull_request_target to ensure base workflow is used), and on direct pushes to main
  pull_request_target:
    branches: [ main ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ main ]

# Minimal permissions for safety with pull_request_target
permissions:
  contents: read
  pull-requests: read

# Prevent duplicate runs: use branch name for consistency across push/PR events
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  compilation-check:
    runs-on: ubuntu-latest

    outputs:
      backend-compiled: ${{ steps.backend-compile.outputs.success }}
      gas-compiled: ${{ steps.gas-compile.outputs.success }}
      lambda-compiled: ${{ steps.lambda-compile.outputs.success }}

    steps:
    - uses: actions/checkout@v4
      with:
        # Ensure we test the PR code, not base, when using pull_request_target
        ref: ${{ github.event.pull_request.head.sha }}

    # Backend Compilation Check
    - name: Check Backend Compilation
      id: backend-compile
      continue-on-error: true
      run: |
        echo "🔍 Checking Backend compilation..."

        # Set up Python and install backend requirements
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

        cd backend

        # Set minimal environment variables for compilation
        export SHOPIFY_STORE_ID="test-store-id"
        export SHOPIFY_TOKEN_ADMIN="test_token"
        export SHOPIFY_LOCATION_ID="test-location-id"
        export ENVIRONMENT="test"
        export SLACK_BOT_TOKEN_REFUNDS="test_slack_token"

        # Check if Python files compile without syntax errors
        echo "📋 Checking Python syntax..."
        python -m py_compile config.py
        python -m py_compile main.py

        # Check if modules can be imported (basic compilation check)
        echo "📋 Checking module imports..."
        python -c "
        import sys
        sys.path.append('.')
        try:
            from config import config
            print('✅ Config module imports successfully')
            from main import app
            print('✅ Main FastAPI app imports successfully')
            from modules.orders import OrdersService
            print('✅ Orders service imports successfully')
            from modules.integrations.slack.slack_service import SlackService
            print('✅ Slack service imports successfully')
            from routers.refunds import router as refunds_router
            print('✅ Refunds router imports successfully')
            print('✅ Backend compilation successful!')
        except Exception as e:
            print(f'❌ Backend compilation failed: {e}')
            sys.exit(1)
        "

        echo "success=true" >> $GITHUB_OUTPUT
        echo "✅ Backend compilation check passed"

    - name: Check Google Apps Scripts Compilation
      id: gas-compile
      continue-on-error: true
      run: |
        echo "🔍 Checking Google Apps Scripts compilation..."
        cd GoogleAppsScripts

        # Set up Node.js for GAS testing
        npm install -g @google/clasp || true

        # Validate JSON manifests
        echo "📋 Validating appsscript.json files..."
        find . -name "appsscript.json" -exec python3 -m json.tool {} \; > /dev/null
        echo "✅ All appsscript.json files are valid JSON"

        # Check for basic JavaScript syntax errors in main files
        echo "📋 Checking JavaScript syntax..."
        node <<'NODE'
        const fs = require('fs');
        const path = require('path');

        function checkJSFile(filePath) {
          try {
            const content = fs.readFileSync(filePath, 'utf8');
            // Basic syntax check - try to parse as function body
            new Function(content);
            console.log(`✅ ${filePath} syntax OK`);
            return true;
          } catch (error) {
            console.log(`❌ ${filePath} syntax error: ${error.message}`);
            return false;
          }
        }

        let allValid = true;
        const projects = ['process-refunds-exchanges', 'create-products-from-registration-info', 'leadership-discount-codes'];

        for (const project of projects) {
          const srcDir = path.join('projects', project, 'src');
          if (fs.existsSync(srcDir)) {
            const files = fs.readdirSync(srcDir).filter(f => f.endsWith('.gs'));
            for (const file of files) {
              if (!checkJSFile(path.join(srcDir, file))) {
                allValid = false;
              }
            }
          }
        }

        if (!allValid) {
          console.log('❌ GAS compilation failed due to syntax errors');
          process.exit(1);
        }

        console.log('✅ Google Apps Scripts compilation successful!');
        NODE

        # Skipping no-undef lint in CI; run locally instead for fuller context
        echo "ℹ️ Skipping GAS no-undef lint in CI (run locally)"

        echo "success=true" >> $GITHUB_OUTPUT
        echo "✅ Google Apps Scripts compilation check passed"

    - name: Check Lambda Functions Compilation
      id: lambda-compile
      continue-on-error: true
      run: |
        echo "🔍 Checking Lambda Functions compilation..."
        cd lambda-functions

        # Set up Python for Lambda functions
        python -m pip install --upgrade pip

        # Check each Lambda function directory
        echo "📋 Checking Lambda function syntax..."
        for dir in */; do
          echo "🔍 Checking ${dir}..."
          cd "$dir"

          # Check Python syntax
          python -m py_compile *.py 2>/dev/null || {
            echo "❌ Syntax error in ${dir}"
            cd ..
            continue
          }

          # Try to import the lambda_function module
          python -c "
          import sys
          try:
              import lambda_function
              print('✅ ${dir} imports successfully')
          except Exception as e:
              print('❌ ${dir} import failed: {}'.format(e))
              sys.exit(1)
          " || {
            echo "❌ Import error in ${dir}"
            cd ..
            continue
          }

          cd ..
        done

        echo "success=true" >> $GITHUB_OUTPUT
        echo "✅ Lambda Functions compilation check passed"

    # Summary step
    - name: Compilation Summary
      env:
        BACKEND_STATUS: ${{ steps.backend-compile.outputs.success == 'true' && '✅ PASSED' || '❌ FAILED' }}
        GAS_STATUS: ${{ steps.gas-compile.outputs.success == 'true' && '✅ PASSED' || '❌ FAILED' }}
        LAMBDA_STATUS: ${{ steps.lambda-compile.outputs.success == 'true' && '✅ PASSED' || '❌ FAILED' }}
        BACKEND_OK: ${{ steps.backend-compile.outputs.success }}
        GAS_OK: ${{ steps.gas-compile.outputs.success }}
        LAMBDA_OK: ${{ steps.lambda-compile.outputs.success }}
      run: |
        echo "📊 Compilation Check Summary:"
        echo "Backend: ${BACKEND_STATUS}"
        echo "Google Apps Scripts: ${GAS_STATUS}"
        echo "Lambda Functions: ${LAMBDA_STATUS}"

        # Fail the job if any compilation failed
        if [ "${BACKEND_OK}" != "true" ] || [ "${GAS_OK}" != "true" ] || [ "${LAMBDA_OK}" != "true" ]; then
          echo "❌ One or more compilation checks failed"
          exit 1
        fi

        echo "✅ All compilation checks passed!"



  # Base branch (main) checks - run only on PRs to compare against base
  compilation-check-base:
    if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha != github.event.pull_request.head.sha }}
    runs-on: ubuntu-latest

    outputs:
      backend-compiled: ${{ steps.backend-compile.outputs.success }}
      gas-compiled: ${{ steps.gas-compile.outputs.success }}
      lambda-compiled: ${{ steps.lambda-compile.outputs.success }}

    steps:
    - uses: actions/checkout@v4
      with:
        # Check out the base branch (e.g., main)
        ref: ${{ github.event.pull_request.base.sha }}

    # Backend Compilation Check (base)
    - name: Check Backend Compilation (base)
      id: backend-compile
      continue-on-error: true
      run: |
        echo "🔍 Checking Backend compilation (base)..."
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        cd backend
        export SHOPIFY_STORE="test-store.myshopify.com"
        export SHOPIFY_TOKEN="test_token"
        export ENVIRONMENT="test"
        export SLACK_REFUNDS_BOT_TOKEN="test_slack_token"
        echo "📋 Checking Python syntax..."
        python -m py_compile config.py
        python -m py_compile main.py
        echo "📋 Checking module imports..."
        python -c "
        import sys
        sys.path.append('.')
        try:
            from config import config
            print('✅ Config module imports successfully')
            from main import app
            print('✅ Main FastAPI app imports successfully')
            from modules.orders import OrdersService
            print('✅ Orders service imports successfully')
            from modules.integrations.slack.slack_service import SlackService
            print('✅ Slack service imports successfully')
            try:
                from routers.refunds import router as refunds_router
                print('✅ Refunds router imports successfully')
            except Exception as _e:
                print('ℹ️ Refunds router not present (expected after refactor)')
            print('✅ Backend compilation successful!')
        except Exception as e:
            print(f'❌ Backend compilation failed: {e}')
            sys.exit(1)
        "
        echo "success=true" >> $GITHUB_OUTPUT
        echo "✅ Backend compilation check (base) passed"

    - name: Check Google Apps Scripts Compilation (base)
      id: gas-compile
      continue-on-error: true
      run: |
        echo "🔍 Checking Google Apps Scripts compilation (base)..."
        cd GoogleAppsScripts
        npm install -g @google/clasp || true
        echo "📋 Validating appsscript.json files..."
        find . -name "appsscript.json" -exec python3 -m json.tool {} \; > /dev/null
        echo "✅ All appsscript.json files are valid JSON"
        echo "📋 Checking JavaScript syntax..."
        node <<'NODE'
        const fs = require('fs');
        const path = require('path');
        function checkJSFile(filePath) {
          try {
            const content = fs.readFileSync(filePath, 'utf8');
            new Function(content);
            console.log(`✅ ${filePath} syntax OK`);
            return true;
          } catch (error) {
            console.log(`❌ ${filePath} syntax error: ${error.message}`);
            return false;
          }
        }
        let allValid = true;
        const projects = ['process-refunds-exchanges', 'create-products-from-registration-info', 'leadership-discount-codes'];
        for (const project of projects) {
          const srcDir = path.join('projects', project, 'src');
          if (fs.existsSync(srcDir)) {
            const files = fs.readdirSync(srcDir).filter(f => f.endsWith('.gs'));
            for (const file of files) {
              if (!checkJSFile(path.join(srcDir, file))) {
                allValid = false;
              }
            }
          }
        }
        if (!allValid) {
          console.log('❌ GAS compilation failed due to syntax errors');
          process.exit(1);
        }
        console.log('✅ Google Apps Scripts compilation successful!');
        NODE

        # Skipping no-undef lint in CI; run locally instead for fuller context
        echo "ℹ️ Skipping GAS no-undef lint in CI (run locally)"
        echo "success=true" >> $GITHUB_OUTPUT
        echo "✅ Google Apps Scripts compilation check (base) passed"

    - name: Check Lambda Functions Compilation (base)
      id: lambda-compile
      continue-on-error: true
      run: |
        echo "🔍 Checking Lambda Functions compilation (base)..."
        cd lambda-functions
        python -m pip install --upgrade pip
        echo "📋 Checking Lambda function syntax..."
        for dir in */; do
          echo "🔍 Checking ${dir}..."
          cd "$dir"
          python -m py_compile *.py 2>/dev/null || { echo "❌ Syntax error in ${dir}"; cd ..; continue; }
          python -c "
          import sys
          try:
              import lambda_function
              print('✅ ${dir} imports successfully')
          except Exception as e:
              print('❌ ${dir} import failed: {}'.format(e))
              sys.exit(1)
          " || { echo "❌ Import error in ${dir}"; cd ..; continue; }
          cd ..
        done
        echo "success=true" >> $GITHUB_OUTPUT
        echo "✅ Lambda Functions compilation check (base) passed"
