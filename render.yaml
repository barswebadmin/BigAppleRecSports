services:
  - type: web
    name: bars-backend
    env: python
    rootDir: backend
    buildCommand: pip install -e ../shared_utilities && pip install -e .
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RENDER
        value: "true"
      - key: ENVIRONMENT
        value: "production"